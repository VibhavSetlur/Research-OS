  language: "en-US"

api_keys:
  semantic_scholar: ""
  pubmed: ""
  crossref: ""
  firecrawl: ""
  serpapi: ""

domain_hints:
  expected_columns: [patient_id, age, sex, exposure, outcome, follow_up_days]
  expected_file_extensions: [.csv, .sav, .dta, .parquet]
  biases_to_monitor:
    - selection bias (cohort definition)
    - confounding by indication
    - attrition / loss-to-follow-up
