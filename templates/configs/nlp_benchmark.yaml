# NLP Benchmark / Modelling — preset researcher_config.yaml
# Copy to inputs/researcher_config.yaml.

project_name: "NLP Benchmark Study"
research_question: ""
domain: "nlp"
hypotheses: []

researcher:
  name: ""
  field: "natural language processing"
  expertise_level: "intermediate"
  institution: ""
  orcid: ""

interaction:
  autonomy_level: "supervised"

model_profile: "medium"

runtime:
  shared_server: true            # default: GPU clusters
  long_running_threshold_seconds: 300
  default_n_for_sampling: 1000

research_goal:
  output_types: ["paper"]
  target_venue: "conference"
  reporting_standard: "Model Card / Datasheet for Datasets"
  suggested_methodology: "machine_learning"
  suggested_protocols:
    - "methodology/methodology_selection"
    - "methodology/machine_learning"

writing_preferences:
  citation_style: "acl"
  language: "en-US"

api_keys:
  semantic_scholar: ""
  pubmed: ""
  crossref: ""
  firecrawl: ""
  serpapi: ""

domain_hints:
  expected_columns: [text, label, document_id, tokens, language]
  expected_file_extensions: [.txt, .json, .jsonl, .csv, .parquet, .arrow]
  biases_to_monitor:
    - dataset bias / spurious correlations
    - train/test contamination (esp. with web-scale data)
    - annotator agreement / label noise
    - language and dialect coverage
    - leakage from pretraining corpora
