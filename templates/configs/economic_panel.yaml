api_keys:
  semantic_scholar: ""
  pubmed: ""
  crossref: ""
  firecrawl: ""
  serpapi: ""

domain_hints:
  expected_columns: [country, year, gdp, inflation, unemployment, interest_rate]
  expected_file_extensions: [.dta, .csv, .xlsx, .parquet]
