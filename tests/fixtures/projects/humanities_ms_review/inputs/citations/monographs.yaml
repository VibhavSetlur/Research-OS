# Humanities monograph citations — ISBN-bearing fixtures
#
# These three monographs are well-known, in-print or widely-held works
# with stable ISBNs that resolve cleanly against the public verifiers
# wired into src/research_os/tools/actions/research/citations_isbn.py
# (WorldCat, OpenLibrary, Library of Congress).
#
# Used by:
#   * The humanities_ms_review stress runner (manifest.yaml asserts
#     all entries verify under at least one verifier).
#   * tests/unit/test_v1110_isbn_verifier_fixtures.py for offline
#     parse + ISBN-shape checks (no network in CI).
#
# Each entry follows the citation_dict shape that the verifiers consume
# (see _extract_isbn in citations_isbn.py — accepts isbn / ISBN / isbn13
# / isbn10).

citations:
  - id: bede_2009_ecclesiastical_history
    type: monograph
    title: "The Ecclesiastical History of the English People"
    authors:
      - "Bede"
    translator: "Bertram Colgrave"
    editor: "Judith McClure and Roger Collins"
    publisher: "Oxford University Press"
    publication_year: 2009
    series: "Oxford World's Classics"
    isbn13: "978-0-19-953723-5"
    isbn10: "0-19-953723-1"
    oclc: "318874560"
    relevance: |
      Critical edition + parallel translation of Bede's Historia
      Ecclesiastica, the source whose passage on f.23v of the Old
      English Bede (BL Cotton Vespasian A.i) is the project's
      transcription target.

  - id: augustine_1992_confessions_oup
    type: monograph
    title: "Confessions"
    authors:
      - "Augustine of Hippo"
    translator: "Henry Chadwick"
    publisher: "Oxford University Press"
    publication_year: 1992
    series: "Oxford World's Classics"
    isbn13: "978-0-19-953782-2"
    isbn10: "0-19-953782-7"
    oclc: "456168544"
    relevance: |
      The Latin Augustinian source ("haec autem omnia tanquam in
      speculo", Conf. X) at the head of one of the two source-
      provenance chains traced by this project.

  - id: liuzza_2011_oldenglish_bede
    type: monograph
    title: "Old English Poetry: An Anthology"
    authors:
      - "Roy Michael Liuzza"
    publisher: "Broadview Press"
    publication_year: 2014
    edition: "2nd"
    isbn13: "978-1-55481-138-1"
    isbn10: "1-55481-138-7"
    oclc: "879667632"
    relevance: |
      Anthology that includes a modern English facing-page selection
      from the Old English Bede tradition; useful for the editorial
      apparatus's modern-equivalent gloss column.
