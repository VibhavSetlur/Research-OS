id: fmea_protocol
name: FMEA — Failure Mode and Effects Analysis
version: '1.9.3'
schema_version: '2.0'
scope_tags:
  domain: [engineering]
  audience: [auditor, maintainer]
  workflow_shape: [experiment_pipeline]
last_reviewed: '2026-06-04'
description: |
  Per-component / per-function enumeration of failure modes,
  scored on severity × occurrence × detection to a Risk Priority
  Number, then mitigated and re-scored. The output is a living
  table that drives design changes + test priorities + maintenance
  schedules.

  This protocol exists because the engineering failure mode of skipping
  FMEA is invisible: products ship, the unsexy failure modes
  (housing crack at -20°C; firmware reboot when battery <2.7V; gear
  backlash after 50k cycles) don't show up in nominal-condition
  tests, they show up six months in to customers.

trigger: |
  Researcher says any of: "do an FMEA", "failure mode analysis",
  "what could go wrong", "rpn", "safety analysis",
  "risk priority number".

prerequisites:
  - A design exists at the component / function level (block
    diagram, BOM, or functional decomposition).
  - Scoring rubric is in workspace/engineering/fmea/rubric.md OR a
    project-default rubric is used (provided below).

editorial_voice:
  mode: hybrid
  rules:
    - "A failure mode without a defined effect is not an FMEA row;
       it is a worry. Effect must be observable + measurable."
    - "RPN sorting is a triage tool, not a publishing format. The
       reader of the FMEA cares about mitigations, not numbers."
    - "FMEA is dead the moment the design changes without an FMEA
       review. Wire FMEA review into design_iteration's
       on-revision checklist."

quality_bar:
  severity_scale: "1 (negligible) … 10 (catastrophic / loss of life)"
  occurrence_scale: "1 (once in N=10^6 units) … 10 (>1 in 2 units)"
  detection_scale: "1 (always caught at QA) … 10 (never caught before release)"
  rpn_action_threshold: 100
  rpn_critical_threshold: 200
  required_columns:
    - id
    - function
    - failure_mode
    - effect
    - cause
    - severity
    - occurrence
    - detection
    - rpn
    - mitigation
  mitigation_must_resolve_rpn_above: 100

steps:
  - id: decompose_system
    name: Decompose the system into functions / components
    description: |
      List the system's functions OR components (one row per FMEA
      table entry). Granularity tradeoff: too coarse → failure
      modes get lumped; too fine → table explodes. Rule of thumb:
      one row per replaceable assembly OR per discrete function.

  - id: enumerate_failure_modes
    name: For each row, enumerate failure modes
    description: |
      For each function/component:
        - "fails to perform function" (always include)
        - "performs function partially / intermittently"
        - "performs function but degraded over time"
        - "external causes" (temperature, vibration, power)
      Brainstorm with the responsible engineer; involve a
      maintenance / QA voice.

  - id: score_severity_occurrence_detection
    name: Score severity × occurrence × detection
    description: |
      Use the project's rubric (or default below). Document the
      reasoning per row in workspace/engineering/fmea/scoring_notes.md
      — peer-reviewable scoring beats single-rater scoring.
      RPN = severity × occurrence × detection (1-1000 range).

  - id: mitigate_high_rpn
    name: Mitigate rows above the action threshold
    description: |
      For RPN ≥ 100: write a mitigation that REDUCES at least one
      of (occurrence, detection). Severity rarely changes (it's
      intrinsic to the failure mode).
      For RPN ≥ 200 (critical): mitigation is mandatory + design
      review required before progressing.

  - id: render_table
    name: Render the FMEA table
    description: |
      tool_engineering_fmea_render(spec_path='inputs/engineering/fmea.yaml')
      → workspace/engineering/fmea/<stem>.{csv,md,xlsx} sorted by RPN.
      High-priority rows (RPN ≥ 100) bolded in Markdown.

  - id: re_score_post_mitigation
    name: Re-score post-mitigation + close out
    description: |
      After implementing each mitigation, re-score occurrence and
      detection. Document the new RPN. The FMEA is "closed" when
      every row's mitigated RPN is below the action threshold OR
      a documented waiver explains why it cannot be reduced (rare
      and requires senior engineer sign-off).

expected_outputs:
  - workspace/engineering/fmea/<stem>.csv
  - workspace/engineering/fmea/<stem>.md
  - workspace/engineering/fmea/scoring_notes.md
  - workspace/engineering/fmea/rubric.md

next_protocol: engineering/safety/fault_tree_analysis
next_protocol_kind: forward_default
on_failure: null
