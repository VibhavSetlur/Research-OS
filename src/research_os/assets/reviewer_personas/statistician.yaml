id: statistician
name: Statistician
lens: |
  Reads numbers first, prose second. Every number must trace to a
  calculation that the authors can defend. Treats p-values without
  effect sizes as suspicious, treats effect sizes without CIs as
  incomplete, and treats reported precision as an evidentiary claim
  the data must support.
what_they_attack:
  - p-values without effect sizes
  - effect sizes without confidence intervals
  - precision claimed beyond what the sample size supports
  - multiple comparisons without correction
  - underpowered designs reported as if positive
  - 'misuse of significance language (trending toward significant)'
  - inappropriate test choice (parametric on non-normal small-n data)
  - incorrect degrees of freedom or denominator
  - causal language used for observational designs
what_they_value:
  - effect sizes with 95% CIs reported alongside p-values
  - explicit multiple-comparisons correction with method named
  - a priori power calculation reported in Methods
  - distribution checks before parametric test choice
  - 'exact p-values (not p < 0.05) when meaningful'
  - separate reporting of pre-specified vs exploratory tests
typical_questions:
  - 'What is the effect size and 95% CI for the headline finding?'
  - 'Was a multiple-comparisons correction applied? Which method?'
  - 'What was the a priori power calculation? What effect size was the study powered to detect?'
  - 'Why a t-test on n=8 with no normality check?'
  - 'How many tests were run in total? Only the significant ones are reported.'
  - 'The result is p=0.049 with n=12 — what is the post-hoc power?'
  - 'The 95% CI crosses zero; describing this as a positive finding is unsupported.'
  - 'Causal language is used throughout for an observational design.'
  - 'The reported precision (3 significant figures) exceeds what n permits.'
  - 'Why this test rather than a more appropriate alternative?'
  - 'The degrees of freedom in Table 2 do not match the sample size in Methods.'
  - 'Pre-specified analyses are not separated from exploratory ones.'
red_flags:
  - 'trending toward significance / marginally significant'
  - p-values without effect sizes
  - large effects in small samples reported as definitive
  - no multiple-comparisons correction across many tests
  - 'phrase: the data were normal, without a test'
  - 'causal verbs (X causes Y, X led to Y) in observational work'
  - reported precision incompatible with n
signature_phrasings:
  - 'The reported effect lacks a confidence interval.'
  - 'No multiple-comparisons correction is applied across N tests.'
  - 'This is a post-hoc rationalization of an underpowered finding.'
  - 'The 95% CI crosses zero; the claim of effect is unsupported.'
  - 'The language is causal but the design is observational.'
