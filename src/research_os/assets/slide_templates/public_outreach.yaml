id: public_outreach
name: Public outreach talk
audience: teaching
duration_minutes: 20
slide_target_min: 10
slide_target_max: 14
tone: didactic
description: |
  A talk for a non-expert audience. No jargon. Every technical term
  the AI emits must be replaced with a plain-language equivalent in
  speaker notes. Worked-problem slide in the middle keeps the audience
  active.

slides:
  - id: title
    type: title
    title: "{plain_language_title}"
    source: synthesis_spec
    speaker_notes: |
      Title rewritten for a non-expert ear. The official title goes
      in the abstract; THIS title goes here.

  - id: hook
    type: focus
    title: "{hook_question}"
    source: hook
    speaker_notes: |
      Open with a question or vivid image the audience already cares
      about. 30 seconds. No technical setup.

  - id: why_you_should_care
    type: content
    title: "Why this matters to you"
    source: motivation
    speaker_notes: |
      Tie the research question to something the audience encounters
      in daily life or in the news.

  - id: concept_in_one_picture
    type: figure
    title: "The idea"
    source: concept_figure
    speaker_notes: |
      A figure a child could read. NO axis labels in technical units.
      Replace logs / odds-ratios / latent dimensions with a metaphor.

  - id: what_we_did
    type: content
    title: "What we did"
    source: methods_plain
    speaker_notes: |
      Plain-language method. "We looked at X people / images / genes
      and asked Y." Avoid every method-name.

  - id: what_we_found
    type: figure
    title: "What we found"
    source: focal_figure_plain
    speaker_notes: |
      The finding in a plain-axis figure. Read the number aloud and
      give a real-world comparison ("about the size of a basketball
      court").

  - id: worked_example
    type: content
    title: "Worked example: {example_topic}"
    source: example
    speaker_notes: |
      Walk the audience through ONE concrete case. The audience
      stays awake when they can predict the next step. 2 minutes.

  - id: common_misconception
    type: content
    title: "What this does NOT mean"
    source: limitations_plain
    speaker_notes: |
      Pre-empt the misreading the headline would invite. "This does
      NOT mean X." Critical for outreach: misquotes start here.

  - id: what_next
    type: content
    title: "What happens next"
    source: future_plain
    speaker_notes: |
      Next research step, in plain language. Avoid grant-speak.

  - id: how_to_engage
    type: content
    title: "How to learn more"
    source: outreach_links
    speaker_notes: |
      Where to read, where to ask, where to follow up. A book / podcast
      recommendation if relevant.

  - id: takeaway
    type: focus
    title: "{plain_takeaway_sentence}"
    source: opening_claim
    speaker_notes: |
      The one sentence the audience leaves with. Plain. Memorable.

  - id: qa
    type: section
    title: "Questions?"
    source: q_and_a
    speaker_notes: |
      Repeat each question back into the mic before answering — the
      back row cannot hear the asker. Smile.
