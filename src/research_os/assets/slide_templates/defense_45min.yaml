id: defense_45min
name: Dissertation defense — 45 minutes
audience: defense
duration_minutes: 45
slide_target_min: 30
slide_target_max: 38
tone: formal_thorough
description: |
  Dissertation defense. Each chapter is a mini-arc. The committee will
  ask about every decision; the backup deck is half the work. Templates
  are scaffolds — fill chapter slugs from synthesis_spec.yaml or the
  thesis chapter dirs.

slides:
  - id: title
    type: title
    title: "{thesis_title}"
    source: synthesis_spec
    speaker_notes: |
      Read title. Name yourself, committee, date. 30 seconds.

  - id: overview_roadmap
    type: content
    title: "Roadmap"
    source: thesis_structure
    speaker_notes: |
      One slide listing the four chapters + the one-sentence claim of
      each. The committee uses this as their checklist.

  - id: motivation_field
    type: content
    title: "The question this dissertation answers"
    source: research_question
    speaker_notes: |
      Frame the field-level question in 60 seconds. Cite three prior
      works and the gap each leaves open.

  - id: contributions
    type: content
    title: "Contributions"
    source: contributions
    speaker_notes: |
      Three to five bullets. Each bullet IS a chapter contribution.
      The committee scores you against this list.

  - id: background_concept_1
    type: figure
    title: "Background: {concept_1}"
    source: background_figure_1
    speaker_notes: |
      Establish vocabulary the committee needs but the field assumes.

  - id: background_concept_2
    type: figure
    title: "Background: {concept_2}"
    source: background_figure_2
    speaker_notes: |
      Second concept. Pick the one your defenses will pivot on most.

  - id: ch1_setup
    type: section
    title: "Chapter 1: {ch1_title}"
    source: ch1
    speaker_notes: |
      Section divider. Pause for 2 seconds — the committee resets here.

  - id: ch1_question
    type: content
    title: "Chapter 1 question"
    source: ch1_question
    speaker_notes: |
      One sentence chapter-question.

  - id: ch1_method
    type: figure
    title: "Chapter 1 method"
    source: ch1_method_figure
    speaker_notes: |
      Schematic. Name the design decision.

  - id: ch1_result
    type: figure
    title: "Chapter 1 result"
    source: ch1_result_figure
    speaker_notes: |
      Headline + number aloud.

  - id: ch1_takeaway
    type: focus
    title: "{ch1_takeaway}"
    source: ch1_takeaway
    speaker_notes: |
      One-sentence summary of the chapter.

  - id: ch2_setup
    type: section
    title: "Chapter 2: {ch2_title}"
    source: ch2
    speaker_notes: |
      Section divider.

  - id: ch2_question
    type: content
    title: "Chapter 2 question"
    source: ch2_question
    speaker_notes: |
      Chapter question.

  - id: ch2_method
    type: figure
    title: "Chapter 2 method"
    source: ch2_method_figure
    speaker_notes: |
      Method schematic.

  - id: ch2_result
    type: figure
    title: "Chapter 2 result"
    source: ch2_result_figure
    speaker_notes: |
      Result. Read the number.

  - id: ch2_takeaway
    type: focus
    title: "{ch2_takeaway}"
    source: ch2_takeaway
    speaker_notes: |
      Chapter summary.

  - id: ch3_setup
    type: section
    title: "Chapter 3: {ch3_title}"
    source: ch3
    speaker_notes: |
      Section divider.

  - id: ch3_question
    type: content
    title: "Chapter 3 question"
    source: ch3_question
    speaker_notes: |
      Chapter question.

  - id: ch3_method
    type: figure
    title: "Chapter 3 method"
    source: ch3_method_figure
    speaker_notes: |
      Method schematic.

  - id: ch3_result
    type: figure
    title: "Chapter 3 result"
    source: ch3_result_figure
    speaker_notes: |
      Result.

  - id: ch3_takeaway
    type: focus
    title: "{ch3_takeaway}"
    source: ch3_takeaway
    speaker_notes: |
      Chapter summary.

  - id: ch4_setup
    type: section
    title: "Chapter 4: {ch4_title}"
    source: ch4
    speaker_notes: |
      Section divider.

  - id: ch4_question
    type: content
    title: "Chapter 4 question"
    source: ch4_question
    speaker_notes: |
      Chapter question.

  - id: ch4_method
    type: figure
    title: "Chapter 4 method"
    source: ch4_method_figure
    speaker_notes: |
      Method schematic.

  - id: ch4_result
    type: figure
    title: "Chapter 4 result"
    source: ch4_result_figure
    speaker_notes: |
      Result.

  - id: ch4_takeaway
    type: focus
    title: "{ch4_takeaway}"
    source: ch4_takeaway
    speaker_notes: |
      Chapter summary.

  - id: synthesis_across_chapters
    type: content
    title: "Synthesis across chapters"
    source: synthesis
    speaker_notes: |
      The one slide that ties the four chapters into a dissertation
      rather than four papers.

  - id: impact
    type: content
    title: "Impact"
    source: impact
    speaker_notes: |
      Where this work changes the field. Two bullets, concrete.

  - id: limitations
    type: content
    title: "Limitations"
    source: limitations
    speaker_notes: |
      Be ruthless. Committee respects clarity here.

  - id: future
    type: content
    title: "Future work"
    source: future_work
    speaker_notes: |
      Three directions, ranked by what you would do first.

  - id: acknowledgements
    type: content
    title: "Acknowledgements"
    source: acknowledgements
    speaker_notes: |
      Advisor, committee, lab, funders, family. Pause.

  - id: qa
    type: section
    title: "Questions?"
    source: q_and_a
    speaker_notes: |
      Hand to the committee chair. Backup slides follow.

  - id: backup_method_detail
    type: figure
    title: "Backup: method detail"
    source: backup
    speaker_notes: |
      Equations + edge-case behaviour.

  - id: backup_alt_method
    type: figure
    title: "Backup: alternative methods we ablated"
    source: backup
    speaker_notes: |
      Pre-empts "did you try X?".

  - id: backup_sensitivity
    type: figure
    title: "Backup: sensitivity sweep"
    source: backup
    speaker_notes: |
      Robustness across hyperparameters.

  - id: backup_dead_ends
    type: figure
    title: "Backup: what we tried that did not work"
    source: backup
    speaker_notes: |
      Honest dead-end log. Committee always asks.

  - id: backup_compute_cost
    type: content
    title: "Backup: compute + wall-clock"
    source: backup
    speaker_notes: |
      Resource accounting.

  - id: backup_data_provenance
    type: figure
    title: "Backup: data provenance"
    source: backup
    speaker_notes: |
      Inclusion / exclusion criteria, sample sizes.

  - id: backup_ethics
    type: content
    title: "Backup: ethics + IRB"
    source: backup
    speaker_notes: |
      IRB approval, consent process.

  - id: backup_publications
    type: content
    title: "Backup: publications + talks"
    source: backup
    speaker_notes: |
      List of papers + talks produced by this work.

  - id: backup_thanks
    type: focus
    title: "Thank you"
    source: closing
    speaker_notes: |
      Genuine close.
