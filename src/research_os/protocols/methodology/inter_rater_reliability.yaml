id: inter_rater_reliability
name: Inter-rater Reliability (IRR) — design + computation + reporting
version: '1.9.3'
schema_version: '2.0'
last_reviewed: '2026-06-02'
description: |
  When more than one rater applies categorical (or ordinal, or
  continuous) judgements to the same data — coding qualitative
  transcripts, scoring student essays, annotating images, labelling
  training data, classifying clinical events — the reliability of the
  rating process must be demonstrated. Without IRR, the field has no
  evidence that the labels are reproducible.

  This protocol scaffolds the REASONING about (a) WHICH agreement
  statistic fits the rating task, (b) WHAT threshold is defensible
  for the field, (c) HOW the rating sample is drawn, and (d) HOW to
  report. It does not pick a single threshold — those vary by field
  and use.

  References: Cohen (1960), Krippendorff (2018), Hallgren (2012),
  Gisev et al. (2013), Hayes & Krippendorff (2007), McHugh (2012).

trigger: |
  Any of:
    - ≥2 raters / coders / annotators will independently judge the
      same data,
    - researcher says "IRR", "inter-rater", "inter-coder", "kappa",
      "Krippendorff's alpha", "ICC", "agreement", "annotation
      reliability",
    - methodology/coding_scheme_development reaches the calibration
      step,
    - audit_and_validation flags a multi-rater dataset without an
      IRR report.

prerequisites:
  - ≥2 trained raters identified.
  - A rating scheme exists (codebook, rubric, annotation guide).
  - A sampling plan for the IRR subset is drafted (or this protocol
    will draft one).

editorial_voice:
  rules:
    - "Pick the statistic that matches the rating task. Cohen's
       kappa = 2 raters, nominal. Fleiss' kappa = ≥3 raters,
       nominal, free-marginal. Krippendorff's alpha = any number
       of raters, any level of measurement, handles missing data.
       ICC = continuous ratings (with sub-types ICC(1,1), ICC(2,1),
       ICC(3,1) etc. — pick by the rater design)."
    - "Thresholds vary by field. 'Substantial' agreement (κ ≥ 0.61
       in Landis & Koch 1977) is a heuristic, not a law. Some
       clinical fields require κ ≥ 0.80; some text classification
       work accepts κ ≥ 0.60. State the threshold + cite a field
       standard or justify the choice."
    - "Agreement is not validity. Two raters can perfectly agree on
       a wrong label. IRR is necessary, not sufficient. Validity
       (do the codes capture what they claim to capture?) is a
       separate question — typically argued via theoretical
       grounding + audit by a domain expert."
    - "Prevalence matters. When one category dominates (>80%),
       kappa shrinks even with high observed agreement (the kappa
       paradox). Report observed agreement, prevalence-adjusted
       kappa (PABAK), and the marginal distribution alongside
       kappa."

steps:
  - id: characterize_rating_task
    name: Characterise the rating task
    description: |
      Capture:
        - how many raters? (2 vs ≥3 changes the statistic)
        - nominal / ordinal / interval / ratio?
        - mutually exclusive codes per segment, or multi-label?
        - how many categories? (binary vs many-class affects
          sensitivity)
        - missing / unrateable allowed? (Krippendorff handles missing;
          kappa does not without imputation)
        - what is the UNIT being rated? (transcript line / paragraph /
          turn / utterance / image / clinical event)

      Write workspace/.qualitative/irr_design.md with this profile.

  - id: pick_statistic
    name: Pick the agreement statistic that fits the task
    description: |
      Reason through the choice:

        COHEN'S KAPPA — exactly 2 raters, nominal codes, complete data.
          Most familiar; reports chance-corrected agreement.

        FLEISS' KAPPA — ≥3 raters, nominal, free-marginal (raters
          may differ in which categories they use).

        KRIPPENDORFF'S ALPHA — any number of raters, any level of
          measurement (nominal / ordinal / interval / ratio /
          bipolar), handles missing data + disagreement weighting.
          The most flexible; reported in computational fields.

        ICC (Intraclass Correlation Coefficient) — continuous
          ratings. Sub-type matters:
            ICC(1,1) one-way random: each subject rated by different
                random raters
            ICC(2,1) two-way random: all subjects rated by same
                random raters
            ICC(3,1) two-way mixed: all subjects rated by same
                fixed raters (no generalisation)
          Pick by the rater design (Shrout & Fleiss 1979,
          McGraw & Wong 1996).

        WEIGHTED KAPPA — ordinal codes where partial agreement
          matters (e.g. Likert ratings). Linear or quadratic
          weights; quadratic is standard in clinical work.

        AGREEMENT ON MULTI-LABEL CODES — F1, Jaccard, or
          Krippendorff's alpha-binary per code (treat each code as
          a binary present/absent decision).

      Document the choice + the citation that justifies it for the
      task type.

  - id: sampling_plan
    name: Plan the IRR sample (how many units, drawn how)
    description: |
      IRR is computed on a SAMPLE of the corpus (typically the full
      corpus is too large for double-coding). Decide:
        - SAMPLE SIZE — Hallgren (2012) recommends ≥20% of the
          corpus or ≥30-50 units, whichever is larger. Higher for
          rare categories (need enough cases per cell).
        - SAMPLING METHOD — random vs stratified by participant /
          time / category. Stratification helps rare categories.
        - INDEPENDENCE — raters must not see each other's codes
          before reconciliation. Specify the workflow.
        - TIMING — IRR computed once after calibration freeze, or
          periodically throughout coding? Periodic catches drift.

      Document in workspace/.qualitative/irr_design.md.

  - id: pick_threshold
    name: Pick the acceptable threshold + field justification
    description: |
      State the threshold the project will defend + WHY:

        Common field heuristics (cite the source you adopt):
          Landis & Koch 1977 — κ < 0 (poor), 0-0.20 (slight),
            0.21-0.40 (fair), 0.41-0.60 (moderate),
            0.61-0.80 (substantial), 0.81-1.00 (almost perfect).
          McHugh 2012 — argues clinical use requires ≥ 0.80.
          Krippendorff 2004 — α ≥ 0.80 for confirmatory use;
            α ≥ 0.667 acceptable for tentative conclusions.

      The threshold is NOT a vibes call. State the field convention
      (cite a methodology paper or a published study in the same
      area) and commit to it BEFORE running. Lowering the threshold
      after seeing the result is a researcher degree of freedom.

      Research-OS defaults (single source of truth — every other
      protocol that references κ should cite this protocol):
        - LIGHT gate (exploratory / formative work): κ >= 0.60
          (fair-to-moderate floor; documents IRR was measured).
        - NORMAL gate (default for thematic / codebook coding):
          κ >= 0.70 (Landis & Koch 'substantial' floor; this is the
          BLOCKER threshold in qualitative_quality_audit).
        - STRICT gate (clinical / confirmatory work): κ >= 0.80
          (McHugh 2012; Krippendorff confirmatory α).
      Pack-side `per_code_kappa_minimum` defaults follow the NORMAL
      gate (0.70); override only with a documented rationale.

  - id: compute_agreement
    name: Compute agreement on the IRR sample
    description: |
      Write tool_python_exec (or tool_r_exec) script:
        Python — sklearn.metrics.cohen_kappa_score,
                 statsmodels.stats.inter_rater.fleiss_kappa,
                 nltk.metrics.agreement.AnnotationTask
                 (Krippendorff's α), pingouin.intraclass_corr (ICC).
        R     — irr, psych, vcd, DescTools packages.

      The script must persist:
        - the per-segment label matrix
        - the agreement statistic + its 95% CI (bootstrap when not
          analytic)
        - the confusion matrix
        - per-code agreement (where does disagreement concentrate?)
        - prevalence of each code in the sample

      Save to workspace/.qualitative/irr_report.md (the AI writes the
      script via tool_python_exec; Research-OS does not compute IRR
      internally).

  - id: interpret_and_remediate
    name: Interpret + remediate if threshold not met
    description: |
      If threshold met: log + proceed.
      If threshold not met:
        - identify which codes drive disagreement (per-code kappa
          / per-code agreement matrix)
        - decide:
            REFINE CODEBOOK — split / merge / clarify the problem
              codes; return to methodology/coding_scheme_development;
              re-train raters; re-compute on a fresh sample.
            DROP CODES — retire codes that cannot be reliably
              applied (and explain in methods why).
            ACCEPT WITH CAVEAT — for exploratory analysis with
              explicit limitation in the discussion.

      Never silently lower the threshold to make the number meet it.

  - id: report
    name: Report IRR in Methods + Results
    description: |
      Methods section:
        - statistic chosen + why it fits the task
        - sample size + sampling method
        - rater training (when, how long, by whom)
        - threshold + citation for that threshold

      Results section (or supplement):
        - the IRR estimate + 95% CI
        - per-code agreement when codes vary in difficulty
        - drift reports if computed periodically
        - any remediation (refined codebook v<n> → v<n+1>)

      mem_methods_append method="IRR computation" with the statistic
      + threshold + result so the audit trail is intact.

expected_outputs:
  - workspace/.qualitative/irr_design.md
  - workspace/.qualitative/irr_report.md
  - workspace/<step>/scripts/<NN>_irr_compute_v<n>.py
  - (entries appended to methods.md via mem_methods_append)

quality_bar:
  statistic_choice_matches_rating_task: true
  sample_size_and_sampling_method_documented: true
  threshold_set_in_advance_with_field_justification: true
  agreement_reported_with_confidence_interval: true
  per_code_agreement_reported_when_codes_vary_in_difficulty: true
  remediation_plan_followed_if_threshold_not_met: true
  no_post_hoc_threshold_lowering: true

# Back-edge to methodology/coding_scheme_development removed to
# break a 2-cycle; re-enter coding_scheme_development via the
# dispatcher when remediation requires another codebook iteration.
next_protocol: null
on_failure: guidance/dead_end_routing
