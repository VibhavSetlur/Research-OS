id: pick_tool_stack
tier: 'plan'
name: Pick Tool Stack (language + library per analysis sub-task)
version: '4.0.0'
schema_version: '2.0'
scope_tags:
  domain: [any]
  audience: [researcher]
  workflow_shape: [experiment_pipeline]
last_reviewed: '2026-06-25'
see_also:
  - methodology/methodology_selection   # settles the METHOD; this settles the implementation language/library
  - methodology/polyglot_analysis       # the broader choose-+-run-+-record discipline this feeds
  - methodology/mixed_language_orchestration  # when one step must mix languages
description: |
  Sister protocol to `visualization/figure_guidelines`'s `pick_library`
  step — but for the ANALYSIS side, not the figure side. Asks the AI to
  pick the language + library combo per sub-task by reasoning over the
  domain + the method + the field's current practice, NOT to default-to-
  Python because Python is what it knows best.

  Distinct from `methodology_selection` (which settles WHICH method to
  use); this protocol settles HOW to implement an already-chosen method.

  Doctrine
  --------
  Research-OS is deliberately language-agnostic. `python_exec`,
  `r_exec`, `julia_exec`, `bash_exec` all exist. The AI's job is to
  match the implementation to current field practice, surfaced from the
  literature for THIS method in THIS domain via `tool_research_tool` —
  not to copy a language/library default from training memory. The
  canonical implementation of a method drifts across subfields and
  decades; the protocol therefore names the QUESTION ("where does this
  field validate findings for this method?") and demands the answer be
  grounded, never hard-codes the answer.

trigger: |
  Use when:
    - Starting a new analysis step and the language choice isn't
      already locked by the methodology_selection protocol's pick_tools.
    - The methodology requires a tool whose canonical implementation
      is in a language not currently used in the project.
    - The previous step used language X but the literature consensus
      for this step's method is in language Y.
    - The AI is about to default to Python without checking field
      practice.

  Do NOT use when:
    - The project's methodology_selection has already pinned a
      specific package for this method — proceed to write the script
      directly in that language.
    - The step is glue / reporting / data-shuffling with no
      method-specific tool dependency — any language the project
      already uses is fine.

prerequisites:
  - The step's method has been settled (via methodology_selection or
    inherited from analysis_plan).
  - The project's environment supports the candidate languages — check
    `workspace/environment/README.md` and `workspace/<step>/environment/`.

steps:
  - id: enumerate_language_candidates
    name: Enumerate candidate implementations for this method
    description: |
      For the method already settled (via methodology_selection or
      inherited from analysis_plan), name the languages where it has a
      maintained, field-validated implementation, and the canonical
      library in each. Do NOT enumerate from memory — surface the
      candidates from the literature for THIS method in THIS domain:

        tool_research_tool query="<method> <domain> implementation library"

      Capture the candidate set (language + library + a one-line note on
      maturity / maintenance) in the step's scratch/stack_plan.md. The
      goal is the list a domain reviewer would recognise, not the list
      the AI is most fluent in.

  - id: query_field_practice
    name: Break the tie on field practice (literature signal)
    description: |
      For the top candidates, score on which implementation appears in
      the methods sections of recent papers in THIS domain — the one a
      reviewer expects to see, not the one the AI types fastest. Pull
      that signal directly:

        tool_research_tool query="<method> <domain> <library>"

      If the literature doesn't break the tie, document that in
      stack_plan.md and prefer the implementation with the better
      reproducibility story (active maintenance, version discipline, a
      pinnable environment) — and cite the basis for that judgement.

  - id: check_env_compatibility
    name: Check env compatibility before committing
    description: |
      sys_env(operation='snapshot', scope='step', step_id='<NN_slug>')
      Confirm the chosen language + library is installed in the project
      env. If the field-practice choice isn't installed but a
      lower-fidelity alternative is, do NOT silently fall back —
      surface the install requirement instead:
        - Update environment/environment.yml or DESCRIPTION.
        - Note the install command in stack_plan.md.
        - Falling back to a more-convenient equivalent because it was
          already installed is how projects end up with
          non-field-standard analyses a reviewer flags.

  - id: decide_on_mixing
    name: Decide whether to mix languages within the step
    description: |
      If the analysis spans multiple sub-tasks where field practice
      differs (e.g. WGCNA in R + visualization in Python), consider:

        Option A — split into separate steps, one language per step
                   (cleaner, easier to reproduce, more boilerplate)
        Option B — single step, mix Python + R via subprocess
                   (faster, but logs + tools.md must cover both)

      Default: Option A unless the data hand-off would be expensive
      (large objects, slow re-load) or the step is genuinely a
      pipeline (R model fit → Python plot of same model object).

      If picking Option B, route through:
        methodology/mixed_language_orchestration

  - id: record_choice
    name: Record choice in stack_plan.md + analysis.md
    description: |
      Write a 3-line block to workspace/<step>/scratch/stack_plan.md:
        - language: <python|R|julia|bash|mixed>
        - library: <name + version pin>
        - rationale: <one-line "field practice for this method is X" + citation_key>

      Append the same block to workspace/analysis.md via
      `mem_log` so the project narrative captures the choice.

expected_outputs:
  - workspace/<step>/scratch/stack_plan.md
  - workspace/analysis.md (appended block)
  - workspace/<step>/environment/* (updated for the chosen language)

quality_bar:
  language_choice_grounded_in_field_practice: true
  library_pinned_to_version_in_env_snapshot: true
  rationale_cites_literature_or_documents_why_not: true

next_protocol: guidance/analysis_plan
next_protocol_kind: forward_default
on_failure: methodology/methodology_selection
