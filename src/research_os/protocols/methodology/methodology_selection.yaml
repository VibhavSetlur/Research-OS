id: methodology_selection
name: Methodology Selection
version: '5.0.0'
schema_version: '2.0'
description: Pick the statistical / computational method(s) to test the active hypotheses. Document implementation, parameters, and assumptions. Validates every choice in the literature.
trigger: After research_design (or directly from project_startup when the design is obviously fixed). Re-run if outcome class changes.

steps:
  - id: classify_problem
    name: Classify the Problem on 3 Axes
    description: |
      Decide:
        1. Outcome type:  continuous | binary | count | time-to-event | ordinal | nominal | text | image | network
        2. Data structure: independent | repeated | nested | spatial | temporal | sequential
        3. Dimensionality: univariate | low-D (p << n) | high-D (p ~ n or p >> n)
      Cross-check against the data profile reports from project_startup
      (outputs/reports/profile_*.md). Write the (type, structure, dim) triple
      to workspace/methods.md via mem_methods_append (one entry per hypothesis).

  - id: enumerate_candidates
    name: Enumerate 2-3 Candidate Methods
    description: |
      Starting points — verify with literature, never commit blindly:

        Continuous · independent · low-D  → OLS / Ridge / LASSO; MLR for multi-IV
        Continuous · repeated             → Mixed-effects (lme4 / statsmodels)
        Continuous · nested               → Multilevel / hierarchical Bayes
        Continuous · spatial              → Kriging / spatial regression
        Continuous · high-D               → LASSO / Elastic Net / PCA + reg
        Binary · independent              → Logistic / GLM
        Binary · time-varying covariates  → Time-varying logistic
        Count                             → Poisson / Negative Binomial / zero-inflated
        Time-to-event                     → Cox PH; Fine-Gray for competing risks
        Causal observational              → Propensity scoring, DiD, IV, RDD
        ML benchmark                      → Baseline + main + ablations
        Text                              → Pretrained transformer fine-tune + calibration
        Image                             → CNN baseline + domain transfer
      Document 2-3 candidates with pros/cons in workspace/methods.md.

  - id: ground_in_literature
    name: Ground Each Candidate (MANDATORY)
    description: |
      For each candidate, call tool_research_method query="<method> for <triple>".
      This writes a structured report to outputs/reports/method_research_*.md.
      Cite at least 2 sources supporting the winning method (in the
      mem_methods_append justification field) and at least 1 source for each
      runner-up.

      For ML / software-heavy methodologies, also call tool_research_tool to
      validate the chosen library is maintained and installable.

  - id: pick_tools
    name: Pick Tools / Libraries
    description: |
      tool_research_tool task="<method implementation>" language="<py|r|julia>"
      Prefer installable libraries (tag: installable_via_package_manager).
      If best option is external (website, paid, GUI) — call
      tool_external_tool_instructions and warn the researcher.
      Use tool_package_install on the winner; it appends to requirements.txt
      automatically.

  - id: record_choice_and_assumptions
    name: Record Choice, Implementation & Assumptions
    description: |
      For the WINNING method, call mem_methods_append with:
        method=<name>
        step_number=<NN>           # next experiment number
        step_name=<slug>
        dataset_name=<from intake>
        dataset_hash=<sha256 from intake>
        implementation=<library>==<version>
        parameters=<key hyperparams>
        justification=<1-2 sentences with citation keys>
        assumptions=[<list of assumptions to TEST>]
      Plus mem_decision_log (context / selected / rationale / options considered).

  - id: list_assumption_tests
    name: Plan Assumption Tests
    description: |
      For every assumption, name the diagnostic test to run during execution:
        Normality           → Shapiro-Wilk (n<5000) / Q-Q plot
        Homoscedasticity    → Levene / Breusch-Pagan
        Multicollinearity   → VIF (>10 = problem)
        Independence        → Durbin-Watson on residuals
        Proportional hazards → Schoenfeld residuals
        Calibration (binary)→ Hosmer-Lemeshow / calibration plot
        Class balance (ML)  → Class-frequency ratio + stratified split
      Write the test plan into workspace/methods.md under "Assumption tests planned".

expected_outputs:
  - workspace/methods.md

next_protocol: literature/literature_search
on_failure: guidance/dead_end_routing
