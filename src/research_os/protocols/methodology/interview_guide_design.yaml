id: interview_guide_design
name: Interview / Topic Guide Design (qualitative pre-collection)
version: '1.6.1'
schema_version: '2.0'
last_reviewed: '2026-06-02'
description: |
  Qualitative protocols in Research-OS pick up at open coding. This
  protocol covers the step BEFORE — designing the interview guide
  (sometimes called a topic guide or discussion guide) that
  participants are actually asked from.

  A weak guide produces unusable data. The reasoning the protocol
  scaffolds: WHO is interviewed (sampling frame), WHAT is asked (open
  vs closed, sensitive vs benign ordering), HOW it is asked (probes,
  follow-ups, silence tolerance), and HOW the guide is piloted +
  revised before full collection.

  Aligned with SRQR (O'Brien et al. 2014), COREQ (Tong et al. 2007),
  and (where applicable) the institutional IRB's reviewed protocol.

trigger: |
  Any of:
    - researcher says "interview guide", "topic guide", "discussion
      guide", "interview script", "questions to ask participants",
    - qualitative_research protocol is loaded but no guide exists in
      workspace/.qualitative/,
    - methodology/preregistration step for a qualitative study asks
      for the data-collection instrument.

prerequisites:
  - The research question is documented (it does not need to be final
    — qualitative questions evolve, but a starting question is
    required to design a guide).
  - The intended sampling frame is sketched (who, how many,
    purposive / theoretical / convenience).

editorial_voice:
  rules:
    - "A guide is a SCAFFOLD, not a script. The interviewer follows
       the participant; the guide ensures coverage. Over-scripted
       guides yield shallow data."
    - "Question order matters. Sensitive topics go after rapport is
       built; demographic questions go last (less context-poisoning,
       less self-presentation effect)."
    - "Pilot the guide. Two pilot interviews catch ~80% of bad
       questions. Pilots count as method work, not analysis — the
       transcripts inform guide revision, not the findings (unless
       the pilots were pre-registered as part of the corpus, which
       is the exception)."
    - "Match the question form to the epistemology. A phenomenological
       study uses 'tell me about a time when…'; a grounded theory
       study uses theoretical-sampling probes; a thematic analysis
       can use broader prompts. Don't mix paradigms within a guide."

steps:
  - id: clarify_paradigm
    name: Clarify the qualitative paradigm
    description: |
      Confirm (ask the researcher if ambiguous) which qualitative
      tradition the study sits in. The choice constrains question
      form:

        - Thematic analysis (Braun & Clarke): broad open prompts,
          probes for examples + meaning.
        - Grounded theory (Charmaz / Strauss-Corbin): theoretical
          sampling, evolving guide that adapts as theory emerges.
        - Phenomenology (IPA, Husserlian, hermeneutic): focus on
          lived experience; "tell me about the time when…".
        - Ethnography: observation + informal conversation; the
          guide is lighter, more contextual.
        - Discourse / narrative: focus on HOW participants speak;
          questions that elicit extended narrative.
        - Case study: question set tailored to the case logic
          (within-case + cross-case comparison).

      tool_research_method query="<paradigm> interview guide best
                           practice" when the field convention is
      not obvious.

      Write workspace/.qualitative/paradigm_choice.md with the
      tradition + a citation justifying its fit to the question.

  - id: map_research_question_to_topics
    name: Map the research question to interview topics
    description: |
      Decompose the research question into 4-8 topic areas the guide
      will cover. For each topic:
        - what aspect of the RQ does it inform?
        - what depth is needed (brief mention vs deep narrative)?
        - what kind of question form fits (open, scenario, hypothetical,
          historical)?

      Write workspace/.qualitative/topic_map.md as a table.

  - id: draft_questions
    name: Draft the questions per topic
    description: |
      For each topic, draft:
        - a MAIN question (one open-ended prompt that opens the
          topic)
        - 2-3 PROBES (follow-ups when the main question doesn't
          elicit enough — "tell me more about that", "what was that
          like?", "can you give an example?")
        - a TRANSITION (a sentence that moves to the next topic
          without breaking the participant's train of thought)

      Avoid:
        - leading questions ("don't you think…", "would you agree…")
        - double-barrelled questions (asking two things at once)
        - jargon the participant won't share
        - yes/no questions in the main prompt (probes can be yes/no)
        - question stacks (asking three in a row without letting them
          answer the first)

      For sensitive topics, add a transition sentence that warns
      gently and reminds the participant they can decline.

  - id: order_for_rapport_and_safety
    name: Order the guide for rapport, safety, and flow
    description: |
      Default opening: a low-stakes "tell me about your role / how
      you got here" question. Demographic + sensitive questions go
      at the END (after rapport, less self-presentation contamination).

      Within the body, group related topics; transitions matter more
      than a fixed sequence. Note where the interviewer can REORDER
      based on what the participant raises naturally.

      Closing: an open "is there anything I haven't asked that you'd
      want me to know?" — often surfaces the highest-value data.

  - id: pilot_design
    name: Plan the pilot (≥2 interviews) + revision triggers
    description: |
      Pilot interviews surface:
        - questions that don't elicit (rephrase)
        - questions that confuse (clarify or split)
        - missing topics the participant brought up unprompted
          (consider adding)
        - timing (a 60-min slot needs ~10 main questions; over-stuff
          and you'll cut depth)

      Pre-specify the revision triggers: what would cause a question
      to be cut, added, or reworded? Document the pilot debrief
      template (interviewer + 1 reader independently review the
      transcript + propose changes; consensus or PI tiebreak).

      Pilots are NORMALLY excluded from the analysis corpus (they
      were collected against a draft guide). State this explicitly
      in the methods + the IRB protocol. If pilots will be INCLUDED,
      the IRB approval must cover that and the guide revision must
      be minor.

  - id: irb_and_consent_alignment
    name: Align with IRB approval + consent script
    description: |
      The interview guide is typically an IRB appendix. Cross-check
      that:
        - the topics map to what the IRB approved (any new topic
          requires an amendment),
        - the consent script's data-use statement covers what the
          guide elicits,
        - the participant has a copy of the consent + can decline
          any question without penalty,
        - sensitive topics have a safety plan (referral list, debrief
          contact) where the topic warrants it.

      Surface mismatches as BLOCKERS — running interviews under
      an IRB protocol whose appendix doesn't match the guide is
      a real compliance risk.

  - id: finalize_and_log
    name: Finalize the guide + log the method
    description: |
      Write workspace/.qualitative/interview_guide_v<n>.md with:
        - paradigm + citation
        - topic map
        - full guide (opening, body topics with main + probes +
          transitions, closing)
        - pilot debrief template
        - IRB protocol reference + amendment status

      mem_methods_append method="semi-structured interviews" with
      the guide's content-hash so the audit trail is intact.

      The guide is a LIVING document for grounded theory and
      ethnography (it evolves with the data); for thematic analysis
      and IPA it is typically frozen after pilots. Mark which mode
      applies + how revisions will be versioned.

expected_outputs:
  - workspace/.qualitative/paradigm_choice.md
  - workspace/.qualitative/topic_map.md
  - workspace/.qualitative/interview_guide_v<n>.md
  - workspace/.qualitative/pilot_debrief_template.md

quality_bar:
  paradigm_named_with_citation: true
  every_topic_traces_to_a_research_question_aspect: true
  questions_open_ended_and_non_leading: true
  probes_and_transitions_drafted: true
  sensitive_topic_handling_specified_when_applicable: true
  pilot_plan_with_revision_triggers: true
  irb_alignment_explicitly_verified: true

next_protocol: methodology/coding_scheme_development
on_failure: guidance/scope_clarification
