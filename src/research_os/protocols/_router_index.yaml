      build_test:      "tool_build: design the testing regime + CI gate for the tool"
      build_benchmark: "tool_build: measure the tool against the right baseline(s)"
      build_release:   "tool_build: cut a versioned, reproducible release + changelog"
      build_publish:   "tool_build: publish the cut release to a registry (PyPI/crates/npm/conda)"
      explore_probe:   "exploration: one probe → observe → decide cycle in scratch"
      explore_promote: "exploration: graduate a probe into a real numbered step"
      notebook_run:    "notebook: author + run a notebook with cell-provenance discipline"
      notebook_reproduce: "notebook: harden a notebook so anyone can re-run it (pin env, declare inputs, parameterize)"
      notebook_promote: "notebook: graduate a trustworthy notebook into a script / step / figure"
      hybrid_run:      "hybrid: build a tool and use it for analysis in one project, provenance spanning both"
      hybrid_handoff:  "hybrid: cross the tool↔analysis boundary with the tool version pinned"
  methodology:
    label: "Methodology choice + study design"
    sub_intents:
      pick:         "Choose statistical / computational method"
      causal:       "Causal inference (DAG / IV / DiD)"
      ml:           "Supervised learning"
      rct:          "Randomised controlled trial"
      survey:       "Survey + psychometric"
      qualitative:  "Interviews / thematic / grounded theory"
      simulation:   "ADEMP simulation study"
      replication:  "Replication of a published analysis"
      ablation:     "Component-by-component ablation"
      pilot:        "Small-N feasibility before full study"
      mixed:        "Mixed methods (qual + quant)"
      meta:         "Meta-analysis / pooled effects"
      design:       "Study design"
      tool_pick:    "Find a candidate library / CLI"
      prereg:       "Freeze SAP + hypotheses before analysis"
      bayesian:     "Bayesian workflow (priors → posterior → checks)"
      timeseries:   "Time-aware analysis + forecasting"
      subfield_pipeline: "Identify the specific subfield + survey its canonical pipeline"
      eda:          "Exploratory data analysis + hypothesis generation"
      comparison:   "Head-to-head benchmark of N methods on one task"
