# ─────────────────────────────────────────────────────────────────────
# GUIDANCE protocols
# ─────────────────────────────────────────────────────────────────────
protocols:

  guidance/session_boot:
    intent_class: session
    sub_intent: boot
    summary: "First protocol of every session. Loads state + config + sets behaviour."
    # NOTE: bare "begin" / "open" / "boot" removed (v3.0.0) — they
    # grabbed unrelated prompts ("begin analysing", "open the data
    # file") and "boot" partial-matched "bootstrap" / "reboot". The
    # session greeting is carried by hi / hello / start session /
    # let's begin / good morning, which don't collide.
    triggers: ["hi", "hello", "start session", "boot up",
              "let's begin", "good morning", "start a session"]
    shortcut_tool: sys_boot
    token_estimate: 1500
    decomposition:
      - tool: sys_boot
        purpose: "Load state + config + history + dep inventory + next protocol in one call."
      - decision: "If pause_classification != 'fresh_session', route to session_resume."
      - decision: "Else greet researcher and wait for their first ask."

  guidance/session_resume:
    intent_class: session
    sub_intent: resume
    summary: "Re-enter a paused / interrupted / handed-off project."
    triggers:
