# ─────────────────────────────────────────────────────────────────────
# PROGRAM protocols (multi_study workspace mode)
# A research program — several sub-studies that share a codebook + prereg
# and roll up into a cross-study synthesis / meta-analysis.
# ─────────────────────────────────────────────────────────────────────

  program/program_setup:
    intent_class: plan
    sub_intent: program_setup
    summary: "Establish the program commons before any study runs: the shared codebook every study codes to, the program-level preregistration, and how the studies roll up."
    triggers:
      - "set up the program"
      - "set up a program"
      - "multi-study"
      - "multi study"
      - "research program"
      - "shared codebook"
      - "harmonise across studies"
      - "harmonize across studies"
      - "how do these studies combine"
      - "program prereg"
      - "roll up the studies"
      - "cross-study"
    token_estimate: 1700
    decomposition:
      - protocol: program/program_setup
        purpose: "Define the shared codebook, frame the program prereg, plan the roll-up, scaffold the first study."
      - tool: sys_file_write
        purpose: "Write shared/codebook.md, shared/preregistration.md, roll_up/README.md."
      - tool: sys_path
        purpose: "Scaffold the first sub-study under studies/."
      - tool: mem_log
        purpose: "Record the program-setup decision (shared commons frozen)."

  program/study_register:
    intent_class: plan
    sub_intent: study_register
    summary: "Register a new sub-study against the program commons: bind it to the shared codebook + program prereg, declare what it contributes to the roll-up, and scaffold it so it harmonizes by construction."
    triggers:
      - "add a study"
      - "add a sub-study"
      - "new study in the program"
      - "register a study"
      - "start another study"
      - "next study in the program"
      - "add a site"
      - "add a cohort"
    token_estimate: 1600
    decomposition:
      - protocol: program/study_register
        purpose: "Bind the study to the codebook + prereg, declare its roll-up contribution, scaffold it harmonized."
      - tool: sys_file_write
        purpose: "Materialise the new sub-study directory + README under studies/<slug>/ (NOT sys_path — a study is not a numbered analysis step)."
      - tool: mem_log
        purpose: "Record the study registration (bound to commons vX)."

  program/cross_study_synthesis:
    intent_class: synthesize
    sub_intent: cross_study_synthesis
    summary: "Roll the completed studies up into one program-level claim: confirm they're commensurable, choose pooling vs narrative honestly, examine heterogeneity as a finding, and qualify the synthesis to the evidence."
    triggers:
      - "combine the studies"
      - "roll up the studies"
      - "pool the studies"
      - "meta-analyze the studies"
      - "meta-analyse the studies"
      - "cross-study synthesis"
      - "what do the studies say together"
      - "program-level finding"
    token_estimate: 1800
    decomposition:
      - protocol: program/cross_study_synthesis
        purpose: "Check commensurability, choose pool vs narrative, treat heterogeneity as signal, qualify the claim."
      - tool: mem_log
        purpose: "Record the program-level synthesis (method + heterogeneity + claim strength)."

  program/pipeline_stage_handoff:
    intent_class: synthesize
    sub_intent: pipeline_stage_handoff
    summary: "Hand off one pipeline stage's OUTPUT (with provenance + a consumer contract) so a different actor can do the next stage."
    triggers:
      - "next step in the pipeline"
      - "hand off the output"
      - "send the output to"
      - "take it from here"
      - "next stage"
      - "next team"
      - "someone else continues"
      - "pass this folder"
      - "package this for the next step"
      - "share these results for the next step"
    token_estimate: 1400
    decomposition:
      - protocol: program/pipeline_stage_handoff
        purpose: "Scope the stage boundary, pin output provenance, write the output contract, package safely, confirm the return loop."
      - tool: mem_log
        purpose: "Record the handoff boundary + the consumer's expected deliverable."

  program/codebook_governance:
    intent_class: plan
    sub_intent: codebook_governance
    summary: "Amend the shared commons safely after studies have started coding: assess blast radius across studies, version the change, and decide re-coding vs crosswalk so the codebook stays a true common denominator."
    triggers:
