    tool: tool_judge_score

  progress_check:
    # Bare "status" removed — it hijacked phrases like "track my conjecture
    # status". Bounded phrases only (same de-greedy fix as map/coding in v3.0.0).
    triggers: ["progress", "project status", "status update", "where are we",
               "what's done", "progress digest", "digest"]
