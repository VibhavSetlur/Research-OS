  methodology/replication_study:
    intent_class: methodology
    sub_intent: replication
    summary: "Direct or conceptual replication of a published analysis."
    triggers: ["replicate", "replication", "reproduce paper", "does x hold"]

  methodology/ablation_study:
    intent_class: methodology
    sub_intent: ablation
    summary: "Component-by-component ablation of a model or pipeline."
    triggers: ["ablate", "ablation", "which part matters", "remove component"]

  methodology/pilot_study:
    intent_class: methodology
    sub_intent: pilot
    summary: "Small-N feasibility / variance estimation before the full study."
    triggers: ["pilot", "feasibility", "before the full study",
              "test the protocol"]

  methodology/mixed_methods:
    intent_class: methodology
    sub_intent: mixed
    summary: "Concurrent or sequential qual + quant integration."
    triggers: ["mixed methods", "qual and quant", "qualitative and quantitative",
              "convergent", "sequential explanatory"]

  methodology/tool_discovery:
    intent_class: methodology
    sub_intent: tool_pick
    summary: "Find candidate libraries / CLIs for a task."
    triggers: ["find a library", "what tool", "candidate libraries",
              "best package"]

  methodology/bayesian_analysis:
    intent_class: methodology
    sub_intent: bayesian
    summary: "Bayesian workflow: priors → posterior → diagnostics → checks → sensitivity."
    triggers: ["bayesian", "stan", "pymc", "brms", "posterior",
               "credible interval", "rope", "bayes factor",
               "hierarchical bayesian", "prior predictive"]

  methodology/timeseries_analysis:
    intent_class: methodology
    sub_intent: timeseries
    summary: "Time-aware analysis + forecasting (ARIMA/ETS/state-space/Prophet/ML)."
    triggers: ["time series", "timeseries", "forecasting", "forecast",
               "arima", "ets", "state-space", "kalman", "prophet",
               "interrupted time series", "structural break"]

  literature/literature_search:
    intent_class: literature
    sub_intent: search
    summary: "Broad literature pass on the research question."
    triggers: ["literature search", "find papers", "search the literature"]

  literature/systematic_review:
    intent_class: literature
    sub_intent: systematic
    summary: "PRISMA-compliant systematic review."
    triggers: ["systematic review", "prisma", "screen papers", "scoping review"]

  literature/evidence_synthesis:
    intent_class: literature
    sub_intent: evidence_grade
    summary: "Grade body of evidence (GRADE-style)."
    triggers: ["grade the evidence", "evidence synthesis", "body of evidence"]

