# MAINTAINER-ONLY index. AI clients never load this file directly; they
# route through `tool_route` (hybrid semantic + trigger) which reads
# this server-side. The semantic path retrieves over the pre-built
# embeddings in `_embeddings.npz`; this YAML supplies hierarchy +
# decompositions + the trigger lists that feed the exact-match boost.
#
# Anyone editing this file is a maintainer or protocol author. AI
# clients should treat this file as private implementation detail.
#
# Hierarchical routing registry — single source of truth for `tool_route`
# and `sys_boot`.
#
# Three levels of resolution:
#   L1  intent_class   — one of {session, discover, plan, execute,
#                                synthesize, audit_wrap, methodology,
#                                literature, memory, review}
#   L2  sub_intent     — narrows within an intent_class (e.g. execute →
#                        new_experiment | extend | branch | abandon | casual)
#   L3  protocol       — the specific YAML to load
#
# tool_route resolves to the DEEPEST unambiguous level. If multiple
# protocols tie at L3, it returns a non-null `ask_user` and the
# candidates. If multiple sub-intents tie at L2, same thing at L2.
#
# Per-protocol metadata:
#   intent_class      L1 class this protocol serves
#   sub_intent        L2 narrowing
#   summary           one-line description shown in alternatives
#   triggers          short trigger phrases (case-insensitive substring)
#   shortcut_tool     single tool the AI may call instead of the protocol
#   token_estimate    rough cost of full protocol load (helps the AI
#                     decide between format=summary vs full)
#   decomposition     planned tool sequence persisted to
#                     .os_state/active_plan.json on complex prompts
#
# When you add a new protocol, add an entry here too — preflight will
# complain if you don't.

version: 10

# ─────────────────────────────────────────────────────────────────────
# L1 ↔ L2 hierarchy (used for ambiguity resolution + ask_user prompts)
# ─────────────────────────────────────────────────────────────────────

hierarchy:
  session:
    label: "Session management"
    sub_intents:
      boot:          "Start of a session"
      resume:        "Continue a paused project"
      handoff:       "End session cleanly (AI → AI)"
      collaborator:  "Hand off to a HUMAN outside Research-OS"
      autopilot:     "Let the AI drive with explicit gates"
      disagree:      "Constructive disagreement — AI pushback rules"
  discover:
    label: "Project intake + question lock-in"
    sub_intents:
      intake:     "Read inputs and propose project metadata"
      mid_entry:  "Enter an in-progress project (prior work outside RO)"
      clarify:    "Narrow a vague / cross-disciplinary ask before picking a protocol"
  plan:
    label: "Planning + iteration"
    sub_intents:
      next_step:  "Propose the best next experiment"
      casual:     "Lightweight exploration"
  execute:
    label: "Experiment execution"
    sub_intents:
      new_experiment: "Create + run the next numbered step"
      extend:         "Iterate on the active step"
      branch:         "Fork into an alternative approach"
      abandon:        "Mark current path as a dead end"
  methodology:
    label: "Methodology choice + study design"
    sub_intents:
      pick:         "Choose statistical / computational method"
      causal:       "Causal inference (DAG / IV / DiD)"
      ml:           "Supervised learning"
      rct:          "Randomised controlled trial"
      survey:       "Survey + psychometric"
      qualitative:  "Interviews / thematic / grounded theory"
      simulation:   "ADEMP simulation study"
      replication:  "Replication of a published analysis"
      ablation:     "Component-by-component ablation"
      pilot:        "Small-N feasibility before full study"
      mixed:        "Mixed methods (qual + quant)"
      meta:         "Meta-analysis / pooled effects"
      design:       "Study design"
      tool_pick:    "Find a candidate library / CLI"
      prereg:       "Freeze SAP + hypotheses before analysis"
      bayesian:     "Bayesian workflow (priors → posterior → checks)"
      timeseries:   "Time-aware analysis + forecasting"
      subfield_pipeline: "Identify the specific subfield + survey its canonical pipeline"
      eda:          "Exploratory data analysis + hypothesis generation"
      comparison:   "Head-to-head benchmark of N methods on one task"
      data_audit:   "Standalone data quality / QC audit"
      power:        "Power / sample-size justification (standalone)"
      reproduce:    "Attempt to reproduce a published analysis"
      consult:      "Methodological consultation / explain / teach (no project commit)"
      eval_design:  "Design the train/val/test split, CV, metrics, comparison test"
      sweep:        "Design a hyperparameter sweep (search space, budget, strategy)"
      ethics:       "Data ethics review (IRB / privacy / consent / fairness)"
      tool_setup:   "Install + verify external tools (Node / Quarto / Docker / R / Julia / ffmpeg / LaTeX)"
      mcp_compose:  "Compose other MCP servers alongside Research OS (Postgres / Slack / GitHub / Figma / etc.)"
      dmp:          "Data Management Plan (funder-compliant, FAIR-aligned)"
      multiplicity: "Multiple-comparisons / multiplicity correction strategy"
      qual_design:  "Pre-collection qualitative — interview / topic guide"
      qual_coding:  "Codebook / coding-scheme development for qualitative data"
      irr:          "Inter-rater reliability design + computation"
      survey_design: "Pre-collection survey / questionnaire instrument design"
      fairness:     "Fairness audit for ML / decision systems"
      bootstrap:    "Bootstrap / resampling design"
      uq:           "Uncertainty quantification + calibration"
  literature:
    label: "Literature search + synthesis"
    sub_intents:
      search:           "Broad literature pass"
      systematic:       "PRISMA systematic review"
      evidence_grade:   "GRADE-style evidence synthesis"
      compare:          "Compare-and-contrast 2-N papers"
  synthesize:
    label: "Final deliverables"
    sub_intents:
      paper:     "IMRAD paper with verified citations"
      abstract:  "Structured / unstructured abstract"
      poster:    "LaTeX conference poster"
      dashboard: "Offline HTML dashboard"
      grant:     "Grant narrative"
      report:    "Technical / executive report"
      figures:   "Figure styling + guidelines"
      viz_build: "Build / polish a figure or figure deck (workflow)"
      writing:   "Writing rules (methods, citations, conclusions, ...)"
      null_findings: "Publishable companion for refuted / inconclusive / abandoned"
      slides:    "Talk / presentation deck (lab meeting / conference / defense)"
      lay:       "Lay summary / press release / outreach"
      update:    "Progress update for PI / advisor / lab"
      inputs_only: "Synthesis from inputs/ alone (no in-RO analysis ran)"
      cover_letter: "Journal cover letter for submission"
      title:     "Title workshop (single most-read sentence)"
      handout:   "Printable one-page handout / leave-behind"
      multi_panel: "Compose a multi-panel figure (Figure 2 = A / B / C / D)"
      figure_arc: "Order figures across a paper / talk / poster"
      a11y:      "Color-blind + WCAG accessibility audit"
      network:    "Network / graph visualization (DAGs, citation, knowledge graphs)"
      geo:        "Geospatial / map visualization (choropleth, points, raster)"
      animation:  "Animation for time-series / model behaviour / talks"
      uncertainty: "Uncertainty visualization (intervals, fans, posteriors)"
      distribution: "Distribution-comparison visualization (raincloud, halfeye, ridgeline)"
      interactive: "Interactive dashboard design (Observable, Streamlit, Shiny, deck.gl)"
      showcase: "Showcase / novel-research visualization (the visual IS the contribution)"
      end_matter: "Data / code availability + CRediT + funding + COI + ack"
      venue:     "Journal / venue selection + fit assessment"
      outline:   "Manuscript outline + narrative arc (pre-draft)"
      defense:   "Defense / talk Q&A preparation"
  audit_wrap:
    label: "Audit + reproducibility"
    sub_intents:
      audit:    "Audit a synthesis output"
      repro:    "Snapshot + verify everything reruns clean"
      submission: "Pre-submission checklist (final ready-to-submit gate)"
  memory:
    label: "Hypothesis + glossary bookkeeping"
    sub_intents:
      hypothesis: "Add / update / list hypotheses"
      glossary:   "Extend the glossary"
  review:
    label: "Review research artefacts"
    sub_intents:
      quick:     "Fast critical appraisal of an external paper"
      code:      "Code review of analysis scripts (yours or collaborator's)"
      respond:   "Draft response to peer-review comments on YOUR paper"
      figure:    "Critique a single figure (yours or theirs)"

# ─────────────────────────────────────────────────────────────────────
# GUIDANCE protocols
# ─────────────────────────────────────────────────────────────────────
protocols:

  guidance/session_boot:
    intent_class: session
    sub_intent: boot
    summary: "First protocol of every session. Loads state + config + sets behaviour."
    triggers: ["hi", "hello", "start session", "begin", "open", "boot",
              "let's begin", "good morning"]
    shortcut_tool: sys_boot
    token_estimate: 1500
    decomposition:
      - tool: sys_boot
        purpose: "Load state + config + history + dep inventory + next protocol in one call."
      - decision: "If pause_classification != 'fresh_session', route to session_resume."
      - decision: "Else greet researcher and wait for their first ask."

  guidance/session_resume:
    intent_class: session
    sub_intent: resume
    summary: "Re-enter a paused / interrupted / handed-off project."
    triggers:
      - "resume"
      - "pick up"
      - "where were we"
      - "continue from"
      - "what was I doing"
      - "back to work"
      - "another session"
      - "next day"
      - "i'm back"
    shortcut_tool: tool_session_resume
    token_estimate: 800
    decomposition:
      - tool: tool_session_resume
        purpose: "Reconstruct intent + status in one call."
      - tool: sys_protocol_next
        purpose: "Confirm pipeline-recommended next step."

  guidance/chat_handoff:
    intent_class: session
    sub_intent: handoff
    summary: "Hand off cleanly to another chat / AI / collaborator."
    triggers:
      - "wrap up"
      - "end session"
      - "handoff"
      - "hand off"
      - "switch chat"
      - "come back tomorrow"
      - "context filling up"
      - "different chat"
      - "going to lunch"
      - "done for today"
    shortcut_tool: sys_session_handoff
    token_estimate: 900
    decomposition:
      - tool: sys_checkpoint_create
        purpose: "Snapshot workspace as a rollback target."
      - tool: sys_session_handoff
        purpose: "Write the handoff doc with running tasks, hypotheses, dead-end lessons."

  guidance/autopilot:
    intent_class: session
    sub_intent: autopilot
    summary: "Drive the project hands-off; explicit gates only."
    triggers:
      - "autopilot"
      - "you drive"
      - "run with it"
      - "just do it"
      - "wake me up"
      - "hands off"
    token_estimate: 1100
    decomposition:
      - tool: sys_config_set
        args: {key: "interaction.autonomy_level", value: "autopilot"}
      - protocol: guidance/autopilot
        purpose: "Load gates + heartbeat policy."
      - protocol: guidance/analysis_plan
        purpose: "Start executing under autopilot."

  guidance/casual_exploration:
    intent_class: plan
    sub_intent: casual
    summary: "Lightweight mode — skip reproducibility paperwork, sandbox-first."
    triggers:
      - "just poke"
      - "casual"
      - "quick look"
      - "exploratory only"
      - "no publication"
      - "sanity check"
      - "just curious"
      - "totally side thing"
    token_estimate: 600
    decomposition:
      - protocol: guidance/casual_exploration
        purpose: "Confirm casual mode + create lightweight step."

  guidance/quick_paper_review:
    intent_class: review
    sub_intent: quick
    summary: "Fast 20-40 min critical appraisal of a paper."
    triggers:
      - "review this paper"
      - "tear apart"
      - "critique"
      - "tough reviewer"
      - "quick review"
      - "what do you think of this paper"
      - "peer review"
      - "brutal review"
    shortcut_tool: tool_quick_review
    token_estimate: 700
    decomposition:
      - tool: tool_quick_review
        purpose: "Stage the review skeleton."
      - protocol: guidance/quick_paper_review
        purpose: "Walk through the appraisal."

  guidance/project_startup:
    intent_class: discover
    sub_intent: intake
    summary: "First substantive protocol: intake + classify + question lock-in."
    triggers:
      - "fill the intake"
      - "fill intake"
      - "fill out the intake"
      - "fill out intake"
      - "do the intake"
      - "do intake"
      - "run the intake"
      - "run intake"
      - "intake autofill"
      - "autofill"
      - "autofill the intake"
      - "autofill intake"
      - "read my data"
      - "read my inputs"
      - "read the inputs"
      - "what do I have"
      - "what's in inputs"
      - "i dropped some files"
      - "i dropped a csv"
      - "dropped a csv"
      - "dropped some data"
      - "dropped a note"
      - "new project"
      - "figure out what's going on"
      - "tell me what you're going to do"
    shortcut_tool: tool_intake_autofill
    token_estimate: 1400
    decomposition:
      - tool: tool_context_intake
        purpose: "Route any loose files into inputs/ first."
      - tool: tool_intake_autofill
        purpose: "Infer domain + question + hypotheses from inputs."
      - tool: sys_state_get
        purpose: "Confirm registered hypotheses + new docs."

  guidance/analysis_plan:
    intent_class: execute
    sub_intent: new_experiment
    summary: "Iterative experiment loop — create step, script, audit, conclude."
    triggers:
      - "run a baseline"
      - "run an analysis"
      - "fit a model"
      - "do an eda"
      - "do a baseline"
      - "baseline eda"
      - "baseline analysis"
      - "eda on my"
      - "eda pass"
      - "first analysis"
      - "first experiment"
      - "exploratory data analysis"
      - "start the analysis"
      - "next experiment"
      - "new step"
      - "let's analyse"
      - "let's analyze"
      - "now run"
    token_estimate: 2100
    decomposition:
      - tool: sys_path_create
        purpose: "Create the next numbered experiment folder."
      - tool: tool_research_method
        purpose: "Ground methodology before coding."
      - tool: tool_plan_step
        purpose: "Decompose the step into atomic sub-tasks."
      - tool: sys_file_write
        purpose: "Write scripts/<NN>_<slug>_v1.<ext>."
      - tool: tool_python_exec
        purpose: "Run the script (or tool_r_exec / tool_julia_exec / tool_bash_exec)."
      - tool: mem_methods_append
        purpose: "Log method + parameters + justification."
      - tool: sys_file_write
        purpose: "Write conclusions.md for the step."

  guidance/iterative_planning:
    intent_class: plan
    sub_intent: next_step
    summary: "AI proposes the next best step based on state + literature + tools."
    triggers:
      - "what should i do next"
      - "what's next"
      - "propose next"
      - "iterate"
      - "i'm stuck"
      - "what now"
      - "what do i do"
    shortcut_tool: tool_plan_next_step
    token_estimate: 800
    decomposition:
      - tool: tool_plan_next_step
        purpose: "Survey state + search + propose options."
      - tool: mem_decision_log
        purpose: "Log the chosen direction."

  guidance/dead_end_routing:
    intent_class: execute
    sub_intent: abandon
    summary: "Abandon a path cleanly + decide where to go from here."
    triggers:
      - "dead end"
      - "this isn't working"
      - "abandon"
      - "scrap this"
      - "give up"
      - "wrong approach"
      - "not working"
    token_estimate: 700
    decomposition:
      - tool: sys_path_abandon
        purpose: "Mark folder as __DEAD_END with rationale."
      - tool: tool_dead_end_lessons
        purpose: "Capture the lesson for future steps."
      - tool: tool_plan_next_step
        purpose: "Propose alternative direction."

  guidance/hypothesis_tracking:
    intent_class: memory
    sub_intent: hypothesis
    summary: "Add / update / list hypotheses (registry across steps)."
    triggers:
      - "add hypothesis"
      - "register hypothesis"
      - "new hypothesis"
      - "update hypothesis"
      - "list hypotheses"
      - "hypothesis status"
    decomposition:
      - tool: mem_hypothesis_add
      - tool: mem_hypothesis_list

  guidance/glossary_update:
    intent_class: memory
    sub_intent: glossary
    summary: "Extend docs/glossary.md with new terms."
    triggers: ["add to glossary", "glossary", "define term", "explain term"]

  guidance/scope_clarification:
    intent_class: discover
    sub_intent: clarify
    summary: "Narrow a vague / open-ended / cross-disciplinary ask into a workable scope BEFORE picking a protocol."
    triggers:
      - "help me figure out where to start"
      - "help me figure this out"
      - "i'm not sure what this is"
      - "i have data and ideas"
      - "this might be x or y"
      - "is this even the right tool"
      - "i'm stuck before i even start"
      - "what is this problem"
      - "where should i start"
      - "where do i begin"
      - "cross-disciplinary"
      - "spans two fields"
      - "i don't know what to ask"
      - "narrow this down for me"
      - "scope this"
    token_estimate: 1200
    decomposition:
      - protocol: guidance/scope_clarification
        purpose: "Classify ambiguity → ask one narrowing question → re-route."

