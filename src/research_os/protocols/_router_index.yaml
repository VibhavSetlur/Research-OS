      disagree:      "Constructive disagreement — AI pushback rules"
  discover:
    label: "Project intake + question lock-in"
    sub_intents:
      intake:        "Read inputs and propose project metadata"
      mid_entry:     "Enter an in-progress project (prior work outside RO)"
      clarify:       "Narrow a vague / cross-disciplinary ask before picking a protocol"
      explore_triage: "exploration: rank cheap, high-information probes on fresh data"
  plan:
    label: "Planning + iteration"
    sub_intents:
      next_step:      "Propose the best next experiment"
      deep_plan:      "Build a rigorous, branchable research roadmap step by step"
      roadmap:        "Autonomously build toward a roadmap, re-planning from results"
      casual:         "Lightweight exploration"
