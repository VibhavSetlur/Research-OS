      - "fix the workspace"
      - "repair"
      - "repair the workspace"
    tool: tool_workspace_repair

  background_task:
    triggers: ["background", "long running", "kick off", "fire and forget"]
    tool: tool_task

  # tool_build mode — running the declared build/test/lint command is an
  # everyday execution action, NOT a protocol load. "run the tests" used to
  # dead-end (no trigger owned it) and "run the build" misrouted to
  # spec_and_design; the design protocols (build/test_strategy) own DECIDING
  # the regime, not RUNNING it. These bounded phrases route straight to the
  # tool that shells workspace.commands.{build,test,lint}; it returns a clear
  # error naming the key to set when the command isn't configured, so the
  # shortcut is harmless outside tool_build mode too.
  run_build_checks:
    triggers:
      - "run the tests"
      - "run tests"
      - "run the test suite"
      - "run the build"
      - "run the linter"
      - "run the linters"
      - "run the checks"
      - "run lint"
      - "rerun the tests"
    tool: tool_build

  scratch_sandbox:
    triggers: ["quick test", "syntax check", "scratch", "throwaway"]
    tool: tool_scratch

  step_iterate:
    triggers:
      - "iterate on this step"
      - "iterate the figure"
      - "iterate the analysis"
      - "iterate on figure"
      - "iterate on the figure"
      - "rerun with different"
      - "recolor figure"
      - "recolour figure"
      - "tighten the cutoff"
      - "tighten cutoff"
      - "swap the model"
      - "snapshot this version"
      - "version this iteration"
      - "design iteration"
      - "v2 of this step"
    tool: tool_step

  version_coherence:
    triggers:
      - "version drift"
      - "stale outputs"
      - "outputs out of sync"
      - "are my figures up to date"
      - "version coherence"
    tool: tool_audit          # scope='project', dimension='version_coherence'
