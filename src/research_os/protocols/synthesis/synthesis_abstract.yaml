id: synthesis_abstract
tier: 'synthesize'
name: Synthesis — Abstract (venue-tailored)
version: '3.0.0'
schema_version: '2.0'
scope_tags:
  domain: [any]
  audience: [auditor]
  workflow_shape: [any]
last_reviewed: '2026-06-16'
see_also:
  - synthesis/synthesis_paper
  - synthesis/synthesis_title_workshop
description: Generate a structured / unstructured abstract tuned to the target venue.
trigger: Researcher asks for "an abstract", OR `research_goal.output_types` includes "abstract", OR called from synthesis_paper.

quality_bar:
  causal_language_check: required        # the abstract is the most-copied claim
  citations_minimal: true               # abstracts rarely cite; an anchor or two
                                        # at most, within the venue's allowance
  every_number_has_unit: true

venue_profile:
  # Word targets below are illustrative of common conventions. The
  # target venue's OWN stated abstract limit always overrides them —
  # read it off the author guidelines and use that.
  journal:
    style: structured
    sections: [Background, Methods, Results, Conclusion]
    word_target: [200, 300]
    notes: |
      Default. ~250 words. 50 per section is a good rule of thumb.
  conference:
    style: unstructured
    sections: []
    word_target: [150, 250]
    notes: |
      Single paragraph. State problem → approach → results → significance.
  preprint:
    style: structured
    sections: [Background, Methods, Results, Conclusion]
    word_target: [250, 350]
    notes: |
      arXiv/bioRxiv. Slightly longer than journal abstract.
  poster:
    style: unstructured
    sections: []
    word_target: [80, 150]
    notes: |
      Very short — drives traffic to the poster.
  grant:
    style: structured
    sections: [Specific_Aims, Background, Approach, Innovation, Impact]
    word_target: [400, 500]
    notes: |
      NIH-style Project Summary / Specific Aims preview.

steps:
  - id: select_profile
    name: Select Venue Profile
    description: |
      Read research_goal.target_venue. If "abstract" was the only output type
      and no venue specified, ask: "Conference, journal, preprint, poster, or grant?"

  - id: gather_sources
    name: Gather Sources
    description: |
      sys_file_read each of synthesis/methods.md, synthesis/results.md,
      synthesis/discussion.md if present; otherwise fall back to
      workspace/methods.md + latest conclusions.md.

  - id: draft
    name: Draft Abstract
    description: |
      Author `synthesis/abstract.typ` directly (or `synthesis/abstract.md`
      when the venue requires markdown). Apply the venue's section
      structure (structured for journals/preprints, unstructured for
      conferences). Cite a verified reference only when an anchor is
      essential — abstracts rarely cite.

      QUALITY CHECK:
        - Word count inside the venue's stated abstract limit.
        - For structured: every required section heading present.
        - At least one quantitative finding with unit.
        - No causal language unless the design supports it.
        - No banned phrases.

  - id: validate
    name: Validate
    description: |
      tool_synthesis_check(file='synthesis/abstract.typ', mode='all')
      Address blockers (missing quantitative claim, missing method
      reference, missing conclusion verb) and re-draft.

expected_outputs:
  - synthesis/abstract.md

next_protocol: null
next_protocol_kind: terminal
on_failure: null
