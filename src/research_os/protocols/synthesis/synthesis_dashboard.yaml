id: synthesis_dashboard
tier: 'synthesize'
name: Synthesis — Dashboard (AI-authored single-file HTML)
version: '2.3.0'
schema_version: '2.0'
scope_tags:
  domain: [biology, wet_lab, qualitative, humanities]
  audience: [auditor]
  workflow_shape: [any]
last_reviewed: '2026-06-08'
description: |
  Guide the AI to author `synthesis/dashboard.html` directly as a
  custom, single-file, offline-capable presentation of the project's
  findings. Research-OS does not generate dashboards — the AI does.
  The previous auto-generator produced a rigid 3MB monolith; AI
  authoring yields a leaner, more readable artefact every time.

  **The dashboard's job.** A reader who opens the file in a browser
  understands the question, the headline findings, and the limitations
  in under ten minutes. They can click into deeper sections if they
  want; they don't need to in order to get the message. The reader
  does NOT need access to the project folder — every claim is
  self-contained inside the HTML.

  **What it is NOT.** Not a status overview. Not a screenshot gallery.
  Not a kitchen-sink dump of every figure. The dashboard tells the
  same story as the paper, in a form a non-expert can navigate.

trigger: |
  Researcher asks for "a dashboard" / "build me a dashboard" /
  "interactive findings page"; OR
  research_goal.output_types includes "dashboard".

design_principles: |
  - Single file. No external scripts, no external stylesheets, no
    fetches. The reader opens the file from email and it works.
  - Accessibility is not optional. Every <img> has alt text. Every
    <section> has an id. Heading hierarchy is meaningful. Colour
    contrast meets WCAG AA.
  - Information hierarchy. The first 800px tell the headline story.
    Deeper detail is reachable but not in the way.
  - Tell, don't dump. Order content by hypothesis or argument, not by
    workspace step number. Captions interpret figures; they don't
    repeat what's plotted.
  - Visual coherence with the paper. Same palette, same typography
    family, same spacing rhythm. The dashboard is the paper's sibling.
  - Editorial tone. Supportive, factual, never accusatory. No
    filesystem paths in visible text. No "TODO" / "Lorem ipsum" /
    "PLACEHOLDER" makes it into a shareable dashboard.

quality_standards: |
  - offline — no `<script src="http`, no `<link href="http`
  - accessibility — every <img> has alt text; every <section> has an
    id; at least one <h1>; at least two <h2>
  - structure — TL;DR section near the top; findings section; methods
    section; limitations section; references section
  - no_placeholders — zero `TODO` / `FIXME` / `XXX` / `Lorem ipsum` /
    `PLACEHOLDER` strings remain
  - no_path_leaks — filesystem paths like `workspace/<step>/...` do
    not appear in body text
  - size — under 5MB total (figures base64-embedded). If larger, the
    figures are too high-resolution or there are too many of them.

steps:
  - id: walk_workspace
    name: Walk the workspace
    description: |
      tool_synthesize_plan returns what's ready (per-step findings,
      focal figures, citations).

  - id: pick_audience
    name: Pick the audience
    description: |
      academic / executive / technical / teaching — density and
      section order adapt. Default academic when output_types includes
      paper, executive otherwise.

  - id: curate_figures
    name: Curate figures into synthesis/figures
    description: |
      tool_synthesis_curate_figures copies step focal figures into
      synthesis/figures/ with stable ordered names. The dashboard and
      paper share file names.

  - id: scaffold
    name: Scaffold dashboard.html
    description: |
      tool_synthesis_scaffold(kind='dashboard') writes a <=80-line
      starter synthesis/dashboard.html with section anchors, minimal
      accessible CSS, and `<!-- AI: ... -->` markers.

  - id: author
    name: Author the content
    description: |
      Embed figures as `<figure><img src="..." alt="..."><figcaption>
      ...</figcaption></figure>`. Use base64 inline OR relative file
      paths — pick one and stick with it.

  - id: audit
    name: Audit
    description: |
      tool_synthesis_check(file='synthesis/dashboard.html') catches
      missing alt-text, external scripts, placeholders, and path
      leaks.

  - id: share
    name: Share
    description: |
      The file IS the deliverable — no compilation step. Hand the
      path to the researcher and remind them it's portable (emailable,
      attachable, single-file).

tools: |
  - tool_synthesize_plan — what's ready in the workspace
  - tool_synthesis_scaffold — seed synthesis/dashboard.html (idempotent)
  - tool_synthesis_check — engineering invariants (offline, alt-text, semantic, placeholders)
  - tool_synthesis_curate_figures — copy step focal figures
  - tool_figure_palette — colour-blind-safe palette for any inline charts

expected_outputs:
  - synthesis/dashboard.html       # AI-authored
  - synthesis/figures/             # shared with paper.typ when both exist

next_protocol: null
next_protocol_kind: terminal
on_failure: null
