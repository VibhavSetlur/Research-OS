id: printable
tier: 'synthesize'
name: Synthesis — Printable Deliverable (poster | handout | one-pager)
version: '3.0.0'
schema_version: '2.0'
scope_tags:
  domain: [any]
  audience: [auditor]
  workflow_shape: [any]
last_reviewed: '2026-06-16'
see_also:
  - synthesis/synthesis_lay_summary   # public-facing handout profiles overlap
  - synthesis/synthesis_paper         # the poster/handout points back at the paper
description: |
  Guide the AI to author a printable deliverable directly. One
  protocol covers three print-first formats:

    * `format=poster`    — wall-mounted large-format Typst poster.
                           AI authors `synthesis/poster.typ`, compiles
                           via tool_typst_compile.
    * `format=handout`   — single-page A4/Letter take-away. AI
                           authors `synthesis/handout.typ`, compiles
                           via tool_typst_compile.
    * `format=one_pager` — alias for handout.

  Research-OS does not generate posters / handouts. The AI does, with
  protocol guidance + tool_synthesis_check validation.

  **Print constraints are real for every format.** Contrast survives
  greyscale photocopy. Small gridlines vanish. Serif <11pt is
  unreadable. QR codes must scan before printing.

trigger: |
  Researcher says: "make a poster", "make a handout", "make a
  one-pager", "printable handout", "leave-behind for the meeting".
  Pick format from wording (poster vs handout/one-pager).

prerequisites:
  - At least one workspace step has substantive conclusions OR a
    synthesis/* deliverable exists.
  - "Researcher's `research_goal.output_types`
    (inputs/researcher_config.yaml) includes the chosen format's
    keyword (`poster` or `handout`). If it doesn't,
    tool_synthesis_scaffold returns status=ask — confirm with the
    researcher first. Empty output_types is treated as 'open'."

design_principles: |
  - One headline dominates. Anything competing with the headline
    fights for attention and loses.
  - Posters live on the wall; handouts live in someone's hand. The
    unit of attention is across-the-room for posters; arm's-length
    for handouts. Pick fonts and figures accordingly.
  - QR codes earn their place by being SCANNED. A QR that points to
    a dead URL or paywalled paper costs trust. Test before printing.
  - White text on a coloured background loses contrast in greyscale
    photocopy. Design for the worst printer in the room.
  - Cut, don't compress. If a section is hard to fit, cut sentences,
    don't shrink fonts.

quality_standards: |
  Font sizes, figure counts, and citation caps are a function of the
  medium and the viewing distance, not fixed numbers — size type so it
  reads at the stated distance and cut content until it fits. The
  testable invariants below hold for every printable.
  Poster:
  - figures — only those that carry the argument; a wall of panels
    reads as a directory, not a finding.
  - citations — a poster is a conversation-starter, not a bibliography;
    keep the list short.
  - body + headline type — legible from across-the-room (the headline)
    and from a step closer (the body); a viewer should never lean in.
  - figure_dpi — print-resolution (a screen-resolution figure pixelates
    at poster scale); the print shop's required DPI is the floor.
  - whitespace — generous; a crowded poster loses the headline.
  - single_headline_test — a glance from a couple of metres back lands
    the message
  - qr_present_and_scannable — yes

  Handout:
  - pages — exactly 1 (a multi-page handout is a report; route there)
  - figures — one headline figure
  - citations — short list only
  - body type — comfortably legible at arm's length
  - contact_block — present
  - qr_present_and_scannable — yes
  - read_time — skimmable in well under two minutes end-to-end

audience_guidance: |
  Poster profiles:
  - academic_conference — blocks Background / Methods / Results /
    Conclusions / References; headline sized to read across the aisle.
  - symposium — Hypothesis / Approach / Results / Significance;
    smaller venue, big "so-what" framing.
  - industry — Problem / Solution / Impact / Validation / Contact;
    headline sized to grab a passing booth visitor; explicit Contact
    block bottom-right.
  - teaching — Question / Big_Idea / Activity / Takeaway; classroom
    display; minimal jargon.

  Handout profiles:
  - conference_poster_takeaway — Headline_finding /
    At_a_glance_method / Headline_figure_with_caption /
    Three_bullet_implications / QR / Contact.
  - meeting_leave_behind — Project_in_one_line / What_we_did /
    What_we_found / Why_it_matters_for_YOU / Where_next / Contact.
  - grant_lay_appendix — Plain_language_summary / Diagram /
    Outcomes_to_date / Public_benefit / Contact.
  - funder_milestone_brief — Project / Milestone_status /
    This_period / Next_period / Spend / Contact.
  - press_kit_one_pager — Headline / Backgrounder / Key_findings /
    Quote / Visual / Embargo_or_release / Contact.

steps:
  - id: pick_format
    name: Pick format + audience profile
    description: |
      Pick from researcher wording or redirect_params (poster vs
      handout vs one_pager).

  - id: curate_headline
    name: Curate headline asset(s)
    description: |
      Posters — the few figures with the clearest message, at print
      resolution. Handouts — exactly ONE figure that carries the
      headline. If no publication-grade figure exists, STOP and ask.

  - id: scaffold
    name: Scaffold the .typ
    description: |
      tool_synthesis_scaffold(kind='poster') for posters. For
      handouts, author synthesis/handout.typ directly.

  - id: author_text
    name: Author text per block / section
    description: |
      POSTER — a few sentences per block, bullets for Methods /
      Results; cut, don't shrink. HANDOUT — one or two sentences per
      section so the whole page is skimmable in well under two minutes.

  - id: generate_qr
    name: Generate the QR (mandatory)
    description: |
      Point at the paper preprint / DOI / dashboard URL / lab page.
      Author a short script with whatever QR library is on hand to
      render the code. Bottom-right placement. SCAN before printing —
      a QR to a dead or paywalled URL costs trust.

  - id: audit
    name: Audit + across-the-room test
    description: |
      tool_synthesis_check(file='synthesis/poster.typ') (or
      handout.typ) catches over-cap citations, short sections, path
      leaks. Combine with the headline test (print at physical scale,
      stand 1.5m back).

  - id: compile
    name: Compile to PDF
    description: |
      tool_typst_compile renders synthesis/poster.pdf (or
      handout.pdf).

tools: |
  - tool_synthesis_scaffold(kind='poster') — seed poster.typ
  - tool_synthesis_check — citation cap + section count + path leaks
  - tool_synthesis_curate_figures — copy step focal figures
  - tool_figure_palette — CVD-safe palette for public posters
  - tool_typst_compile — render poster.pdf / handout.pdf

expected_outputs:
  - synthesis/poster.typ            # when format=poster
  - synthesis/poster.pdf            # when format=poster
  - synthesis/poster_qr.png         # when format=poster
  - synthesis/handout.typ           # when format=handout / one_pager
  - synthesis/handout.pdf           # when format=handout / one_pager
  - synthesis/handout_qr.png        # when format=handout / one_pager

next_protocol: null
next_protocol_kind: terminal
on_failure: null
