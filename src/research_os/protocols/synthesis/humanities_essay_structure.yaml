id: humanities_essay_structure
tier: 'synthesize'
name: Humanities Essay Structure (interpretive, non-IMRAD, AI-authored Typst)
version: '2.3.0'
schema_version: '2.0'
scope_tags:
  domain: [humanities]
  audience: [auditor]
  workflow_shape: [linear_essay]
last_reviewed: '2026-06-08'
description: |
  Guide the AI to author `synthesis/essay.typ` directly as a
  humanities essay — literary criticism, history of ideas,
  philology, close-reading scholarship. IMRAD is the wrong shape for
  this form; an essay is a sustained ARGUMENT, not a report of an
  experiment.

  The interpretive shape humanities reviewers expect:
    1. Introduction + thesis (load-bearing sentence)
    2. Contextual framing (seat the argument in the field)
    3. Close readings (the evidentiary core — 3–5)
    4. Critical conversation (where you sit vs the secondary critics)
    5. Counter-argument + reply (steelmanned objection)
    6. Conclusion + stakes (why this reading matters beyond the text)

  The venue layer (1.25in margins, 12pt serif, footnote apparatus,
  block-quote indent) is the `humanities_essay.typ` Typst template
  the AI imports. Citation style auto-selects from
  `researcher_config.writing_preferences.citation_style` (mla /
  chicago_author_date / chicago_notes_bib).

trigger: |
  Researcher asks: "write the essay", "humanities essay", "literary
  criticism essay", "close-reading essay", "philology paper"; OR
  researcher_config.domain == humanities and a drafting request comes
  in; OR humanities/textual/close_reading.next_protocol fires after
  apparatus + critical ledger are sufficient.

prerequisites:
  - A workspace step with apparatus / transcription / close-reading
    notes exists (humanities/textual/close_reading produces this).
  - A working thesis sentence — even a one-line scratch claim is
    enough; the protocol refines it.
  - At least three primary-source passages identified for close
    reading. Below three this is a note, not an essay.
  - inputs/literature_index.yaml has ≥5 secondary-critic entries.

design_principles: |
  - The thesis is one sentence. Evaluative ("Milton's Satan is
    rhetorically Royalist where Milton is republican"), comparative
    ("Donne owes more to Aquinas than to Petrarch"), or revisionist
    ("the standard reading of Heart of Darkness misreads the framing
    narrator's irony"). Falsifiable BY EVIDENCE.
  - Block quote when the passage is long enough that paraphrase
    would distort the voice. >4 lines of verse or >40 words of prose
    per MLA. Sparingly — one block quote per close-reading section
    unless the form (metrical analysis) demands more.
  - Footnotes are the apparatus, not asides. A humanities footnote
    cites a source, qualifies a claim, or points to a parallel
    passage. Avoid the STEM habit of bracketing citations inline.
  - The counter-argument is not a strawman. Steelman the strongest
    reading against yours. Reply by showing the counter accounts for
    FEWER passages, or accounts for them less parsimoniously.
  - The stakes paragraph answers "why this matters beyond the text"
    — about the genre, the period, the reception of an idea.
    Without stakes the essay is exegesis, not argument.

quality_standards: |
  - thesis_one_sentence_falsifiable — yes
  - contextual_framing_present — yes
  - close_readings — 3-5; each quotes its passage; each links a
    formal feature to the thesis
  - critical_conversation — >=5 named secondary critics, each with
    your relation to their position (extends / qualifies / contests
    / ignores-and-replaces)
  - counter_argument_steelmanned — yes; reply present
  - conclusion_names_stakes — yes
  - apparatus — footnotes (not parenthetical), block quotes for
    long passages, no IMRAD headings

steps:
  - id: lock_thesis
    name: Lock the thesis sentence
    description: |
      Write the one-sentence thesis in workspace/.outline/thesis.md
      with rationale + the 3-5 passages you'll read closely. Test
      it (falsifiable? non-obvious? supported by the apparatus?).

  - id: scaffold
    name: Scaffold essay.typ
    description: |
      tool_synthesis_scaffold(kind='essay') writes synthesis/essay.typ
      with the six interpretive sections + AI markers. Idempotent.

  - id: close_readings
    name: Draft the close readings
    description: |
      One section per researcher turn. Each — quote the passage
      (block when long), identify the formal feature doing the work,
      link to the thesis, footnote the relevant secondary critic.

  - id: critical_conversation
    name: Draft the critical conversation
    description: |
      3-7 named critics + your relation to each (extends / qualifies
      / contests / ignores-and-replaces).

  - id: counter_argument
    name: Draft the counter-argument and reply
    description: |
      Steelman the strongest objection. Reply by showing the counter
      accounts for FEWER passages.

  - id: conclusion_stakes
    name: Draft the conclusion and stakes
    description: |
      Two-paragraph close. First — restate the thesis + evidence in
      compressed form. Second — stakes (why this matters beyond the
      text).

  - id: audit
    name: Audit
    description: |
      tool_synthesis_check(file='synthesis/essay.typ') runs the
      substantiveness checks (auto-detects Typst headings).

  - id: compile
    name: Compile to PDF
    description: |
      tool_typst_compile(source='synthesis/essay.typ') renders
      synthesis/essay.pdf using humanities_essay.typ.

tools: |
  - tool_synthesis_scaffold(kind='essay') — seed essay.typ with the
    six interpretive sections
  - tool_synthesis_check — content depth + cliche detection
  - tool_typst_compile — render essay.pdf
  - tool_writing_discussion_from_verdicts — only when the essay
    engages a critical conversation with literature verdicts in the
    workspace

expected_outputs:
  - synthesis/essay.typ
  - synthesis/essay.pdf
  - workspace/.outline/thesis.md

next_protocol: null
next_protocol_kind: terminal
on_failure: guidance/dead_end_routing
