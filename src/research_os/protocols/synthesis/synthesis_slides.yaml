id: synthesis_slides
tier: 'synthesize'
name: Synthesis — Slides / Talk Deck (AI-authored Touying)
version: '2.3.0'
schema_version: '2.0'
scope_tags:
  domain: [qualitative, theory_math, biology, engineering, humanities]
  audience: [auditor]
  workflow_shape: [proof, experiment_pipeline, any]
last_reviewed: '2026-06-08'
description: |
  Guide the AI to author `synthesis/slides.typ` directly (Touying
  template) for a talk — lab meeting, conference, defense, invited
  seminar, or job talk. Research-OS does not generate slide decks —
  the AI does. tool_typst_compile renders synthesis/slides.pdf; for
  HTML decks, author synthesis/slides.html directly.

  **What a talk is.** A sequential, paced presentation. The deck
  alone is not the talk — the SPEAKER carries the story, the slides
  support it. Speaker notes are therefore part of the deliverable,
  not a polish step.

  **Distinct from poster + dashboard.** A poster is a single static
  panel; a dashboard is interactive HTML; a deck is sequential. These
  shape the protocol's design constraints.

trigger: |
  Researcher asks: "make me slides", "build the talk", "lab meeting
  deck", "conference slides", "defense talk", "deck for tomorrow",
  "I'm presenting to <audience>".

prerequisites:
  - At least one workspace/<step>/conclusions.md has substantive
    findings, OR synthesis/paper.typ already exists.

design_principles: |
  - One claim per slide. The title bar makes the claim, not labels
    the slide. "Random forests recover the effect" beats "Random
    forest results."
  - Readable at the back of the room. >=24pt axis labels, >=36pt
    slide titles. If a figure has 8pt grid labels, it belongs in the
    paper, not the talk. Make a TALK VERSION when needed.
  - Speaker notes are mandatory. Every slide gets >=1 sentence (what
    to say, what to point at, what to skip if time is short).
  - Backup slides anticipate the questions you know are coming. A
    deck without a backup section is half-finished.
  - The arc fits the duration. 10-minute lightning != 45-minute talk
    in slide count, content density, OR depth of Q&A prep.
  - No filesystem paths visible. Audiences should never see
    `workspace/<step>/outputs/...`.

audience_guidance: |
  - lab_meeting — 12-20 slides; 25-30 min; informal; skip background;
    backup slides for likely lab questions.
  - conference_lightning — 6-10 slides; 8-12 min; ruthless
    one-idea-per-slide; headline finding on the title slide.
  - conference_talk — 18-28 slides; 20-25 min; include prior-work +
    a sensitivity / limitations slide.
  - defense — 30-45 slides; 45 min; one chapter ~ one mini-arc;
    backup deck is half the work.
  - invited_seminar — 25-40 slides; 50 min; story-first arc across
    multiple studies, not paper-by-paper.
  - teaching — 20-30 slides; 50 min; learning objectives at top;
    worked problem in the middle; common-mistakes slide earns its
    place here.

quality_standards: |
  - slide_count — >=4 (real talk has at least 8 for any audience)
  - speaker_notes — every slide carries >=1 sentence of notes
  - citation_cap — <=12 citations across the deck
  - no_path_leaks — zero `workspace/<step>/...` in slide-visible text
  - figure_readability — every figure passes the back-of-room test
    (>=24pt axis labels, >=36pt slide titles when authoring)

steps:
  - id: pick_audience
    name: Pick audience + duration
    description: |
      Ask the researcher in one line; default to lab_meeting / 30 min
      if not specified.

  - id: inspect
    name: Inspect what's ready
    description: |
      tool_synthesize_plan returns per-step conclusions + focal
      figures the deck can draw on.

  - id: scaffold
    name: Scaffold slides.typ
    description: |
      tool_synthesis_scaffold(kind='slides') writes a <=60-line
      synthesis/slides.typ (Touying) with section headers and
      `// AI: ...` markers. Refuses to overwrite an existing file.

  - id: author
    name: Author the slides
    description: |
      Map each audience-section to ONE source artefact. Cut sections
      that have no clear source for short formats; add placeholders
      for backup slides in long formats.

  - id: speaker_notes
    name: Speaker notes on EVERY slide
    description: |
      Every slide gets >=1 sentence of notes. For figure slides, the
      note names the one feature to point the audience at.

  - id: q_and_a
    name: Build the Q&A anticipation list
    description: |
      5+ anticipated questions, each with a one-bullet answer outline
      + a backup slide jump. Sources — workspace/<step>/conclusions.md
      Limitations sections, workspace/logs/audit_report.md, mem_log
      close-call decisions, sys_path dead-end paths.

  - id: audit
    name: Audit
    description: |
      tool_synthesis_check(file='synthesis/slides.typ') catches short
      decks, missing speaker notes, citation over-cap, path leaks.

  - id: compile
    name: Compile to PDF
    description: |
      tool_typst_compile(source='synthesis/slides.typ') renders
      synthesis/slides.pdf.

  - id: dry_run
    name: Dry-run guidance
    description: |
      Tell the researcher to time themselves. If it's a talk in <72h,
      suggest a recording to spot pacing problems the deck alone
      won't show.

tools: |
  - tool_synthesize_plan — what's ready
  - tool_synthesis_scaffold(kind='slides') — seed Touying starter
  - tool_synthesis_check — slide-count + speaker-notes + path-leak audit
  - tool_synthesis_curate_figures — TALK-version figures
  - tool_typst_compile — render synthesis/slides.pdf

expected_outputs:
  - synthesis/slides.typ
  - synthesis/slides.pdf
  - synthesis/figures/                  # shared with paper.typ

next_protocol: null
next_protocol_kind: terminal
on_failure: guidance/dead_end_routing
