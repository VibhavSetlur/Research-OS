id: synthesis_grant
tier: 'synthesize'
name: Synthesis — Grant Proposal (AI-authored, funder-tailored)
version: '2.3.0'
schema_version: '2.0'
scope_tags:
  domain: [biology, wet_lab, qualitative, theory_math, engineering, humanities]
  audience: [auditor]
  workflow_shape: [any]
last_reviewed: '2026-06-08'
description: |
  Guide the AI to author `synthesis/grant.typ` directly as a grant
  proposal narrative tuned to the target funder (NIH / NSF / Wellcome
  / ERC / DoE / industry). Research-OS does not generate grants —
  the AI does. tool_typst_compile renders synthesis/grant.pdf.

  **The single most important page** in any grant is the
  Specific Aims (or equivalent ≤1 page summary). Write it BEFORE any
  other section.

trigger: |
  Researcher asks "draft a grant" / "write the R01" / "Specific Aims
  page"; OR `research_goal.output_types` includes "grant".

prerequisites:
  - workspace/methods.md + workspace/citations.md exist
  - ≥1 completed analysis step with substantive findings (for
    preliminary data section)
  - inputs/literature_index.yaml or workspace/citations.md has ≥15
    verified entries

design_principles: |
  - The reviewer reads Specific Aims first and decides whether to
    keep reading. If the Aims don't sell the project, nothing else
    matters.
  - Every Aim has milestones + pitfalls + alternative approaches.
    Funders fund de-risked work.
  - Citations are verified. Funders DO check; an unverifiable
    citation costs the proposal credibility.
  - Preliminary data grounds every Aim. Link to workspace artefacts
    that show feasibility.
  - Rigour and Reproducibility is a HARD section (especially NIH) —
    statistical plan, sample-size justification, blinding,
    randomisation, biological variables (sex / age / ancestry when
    relevant), authentication of key resources.

quality_standards: |
  - specific_aims_words — <=500 (1 page)
  - significance_words — >=400
  - innovation_words — >=300
  - approach_words — >=1500
  - preliminary_data — link to >=1 workspace artefact per Aim
  - rigour_section — present (especially NIH)
  - citations — 15-60 (verified)
  - every_aim_has_milestones — yes
  - every_aim_has_pitfalls_and_alternatives — yes

funder_guidance: |
  - nih_r01 — 1pg Specific Aims + 12pg Research Strategy
    (Significance / Innovation / Approach); Vancouver style; Sex as
    a Biological Variable required; Authentication of Key Resources.
  - nsf — 1pg Project Summary (separate Intellectual Merit + Broader
    Impacts paragraphs) + 15pg Project Description; ACM style.
  - wellcome — 1pg Vision + 8pg Approach; Vision and Impact weighted
    equally with Approach; Vancouver style; less prescriptive.
  - erc — 5pg Extended Synopsis + 15pg Part B2; B1/B2 structure;
    high-risk/high-gain framing required; Nature style.
  - doe — 12pg Project Narrative; explicit timeline + deliverables
    for each task; IEEE style.
  - industry — <=8pg total; Executive Summary / Problem / Solution /
    Validation / Roadmap / Team / Budget; business framing; APA.

steps:
  - id: pick_funder
    name: Pick the funder
    description: |
      Read research_goal.target_venue or ask in one line.

  - id: aims_first
    name: Aims first
    description: |
      Author the <=500-word Specific Aims (or 1pg summary
      equivalent). Cite <=5 high-impact references. This is the
      page the reviewer reads.

  - id: preliminary_data
    name: Gather preliminary data
    description: |
      For every completed workspace experiment that supports an Aim,
      note the headline finding. These become "Preliminary Studies".

  - id: ground_literature
    name: Ground in literature
    description: |
      tool_research_method (deep) for each Aim. Verified citations
      only.

  - id: scaffold
    name: Scaffold grant.typ
    description: |
      tool_synthesis_scaffold(kind='paper') then rename to
      synthesis/grant.typ and adjust section headers to match the
      funder.

  - id: author_sections
    name: Author each funder section
    description: |
      Per turn (or autopilot iteration). Apply the funder-guidance
      word minimums.

  - id: approach_per_aim
    name: Draft the Approach section per Aim
    description: |
      Per Aim — Premise + Rationale + Experimental Design + Expected
      Outcomes + Potential Pitfalls + Alternative Approaches. Include
      preliminary-data figures. Include a timeline.

  - id: rigour_section
    name: Rigour and Reproducibility section
    description: |
      Always include for NIH; include where applicable elsewhere.

  - id: bibliography
    name: Assemble bibliography
    description: |
      Citations resolve via the Hayagriva biblio.yml that
      tool_typst_compile auto-generates from workspace/citations.md.

  - id: audit
    name: Audit
    description: |
      tool_synthesis_check(file='synthesis/grant.typ') catches
      section-coverage, cliches, and reference resolution issues.

  - id: compile
    name: Compile to PDF
    description: |
      tool_typst_compile(source='synthesis/grant.typ') renders
      synthesis/grant.pdf.

tools: |
  - tool_synthesize_plan — what's ready
  - tool_synthesis_scaffold(kind='paper') — structural base
  - tool_synthesis_check — substantiveness + structure + cliche audit
  - tool_research_method — funder-relevant literature sweep
  - tool_typst_compile — render synthesis/grant.pdf

expected_outputs:
  - synthesis/grant.typ
  - synthesis/grant.pdf
  - synthesis/biblio.yml

next_protocol: null
next_protocol_kind: terminal
on_failure: guidance/dead_end_routing
