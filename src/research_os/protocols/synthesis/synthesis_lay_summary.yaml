id: synthesis_lay_summary
name: Synthesis — Lay Summary (public / press / outreach)
version: '1.0.0'
schema_version: '2.0'
description: |
  Compile a plain-language summary of the project for a NON-EXPERT
  audience — funder lay-summary section, press release, university
  communications, blog post, social-media thread, donor newsletter,
  patient-facing explainer. Distinct from `synthesis_abstract` (still
  technical, just shorter) and from `synthesis_dashboard`'s "teaching"
  audience profile (still uses dashboard scaffolding).

  The defining constraint: the reader does not share the discipline's
  vocabulary. Every term that needs defining costs words. Every claim
  that depends on a method the reader has never heard of has to be
  re-framed in terms of what the reader cares about (a decision they
  might make, a question they have already asked).

trigger: |
  Researcher says any of: "lay summary", "press release", "explain this
  to a non-scientist", "for the public", "for the patient newsletter",
  "for a blog post", "for the funder's outreach section", "translate
  this for a non-expert", "social media summary", "twitter thread",
  "for my mom / family / grandma".

prerequisites:
  - "The project has a synthesis-eligible state — at least one
    conclusions.md with a substantive Findings section, OR an existing
    synthesis/* deliverable to derive from."

quality_bar:
  reading_grade_level_maximum: 9        # roughly US 9th grade
  jargon_terms_explained_inline: true
  word_count_band_by_audience: true     # see audience_profile below
  causal_language_audited: true         # the audience over-reads causal claims
  contact_line_present: true            # who to ask + where to go for more
  pronoun_voice_consistent: true        # pick "we" or third-person, stay
  no_acronyms_unless_unpacked: true

audience_profile:
  general_public:
    word_count: [200, 400]
    sections: [Hook, What_we_did, What_we_found, Why_it_matters, More_info]
    tone: accessible_warm
    notes: |
      A reader who clicked from a science-news site. Hook in one
      sentence ("X is something we still don't know much about, and
      our research is changing that"). Avoid disciplinary jargon
      entirely; if a term must appear, define it in the same sentence.
  press_release:
    word_count: [350, 600]
    sections: [Headline, Lede, Body, Quote, Background, Contact]
    tone: news_house_style
    notes: |
      Follows news-writing inverted pyramid. Headline is the finding,
      not the topic. Lede answers who-did-what-found-where. Body has
      the one or two numbers a journalist would lift. Quote from a
      named researcher, present-tense.
  funder_lay_section:
    word_count: [150, 300]
    sections: [Plain_language_research_question, Plain_language_approach, Plain_language_findings, Public_benefit]
    tone: funder_house_style
    notes: |
      NIH / NSF / Wellcome / charity funder lay sections are read by
      grant reviewers AND by the funder's own communications team.
      Follow whichever house style the funder specifies (most ask
      for ≤200 words; some specify reading-grade ≤ 8).
  patient_or_participant:
    word_count: [250, 500]
    sections: [Why_this_research_matters_to_you, What_we_did, What_we_found, What_this_means_for_you, Where_to_learn_more]
    tone: warm_clinical_responsible
    notes: |
      The reader may be a study participant, a patient with the
      condition under study, or a family member. Avoid clinical
      framings that read as cold; avoid promises a single study
      cannot deliver ("a cure" / "the answer"). Acknowledge what
      this study could NOT settle.
  social_thread:
    word_count: [350, 700]              # ~5-12 posts
    sections: [Hook_post, Why_we_did_it, How_we_did_it, The_finding, A_caveat, Where_to_read_more]
    tone: short_conversational
    notes: |
      A series of short posts (Twitter / Mastodon / Bluesky thread,
      LinkedIn carousel). Each post stands alone but the series
      tells a story. Lead with a hook that costs nothing to read.
      Include at least one caveat post — threads that omit the
      caveats age badly.
  blog_post:
    word_count: [600, 1200]
    sections: [Hook, Why_this_question, What_we_did, What_we_found, What_we_could_not_settle, What_comes_next]
    tone: long_form_conversational
    notes: |
      Lab or personal blog. Longer than a press release; can include
      a single figure. The author has room to discuss the path the
      project took, including failed branches — readers appreciate
      the texture professional writing usually strips out.

editorial_voice:
  mode: hybrid
  rules:
    - "Pick concrete words over abstract ones. 'Doubled' beats
       'increased substantially'. 'Three patients in 100' beats
       'a 3% incidence rate'."
    - "Anchor numbers in something the reader can compare to. '50
       mg/dL' means nothing on its own; 'about the level the FDA
       flags as concerning' or 'about a third of a soft-drink
       serving of sugar' means something."
    - "Every claim about cause-and-effect must match the study
       design. The lay reader hears 'X reduces Y' as a causal claim
       and acts on it — so when the design is observational, say
       so explicitly even when the technical paper hedges."
    - "Acknowledge the boundary. Lay readers who walk away knowing
       what the study CANNOT say trust the field more, not less."

steps:
  - id: select_audience
    name: Select audience profile
    description: |
      Ask: "Audience? general_public | press_release | funder_lay_section
      | patient_or_participant | social_thread | blog_post."
      For mixed audiences (the most common case for a press release),
      pick the strictest reading level (funder_lay_section is usually
      the tightest constraint).

  - id: source_the_headline_finding
    name: Source the headline finding from the workspace
    description: |
      Pull in ONE batch:
        - mem_hypothesis_list status=supported
        - the most recent conclusions.md per active step
        - synthesis/synthesis_spec.yaml#findings  (when present)
        - workspace/citations.md                   (for "more info" links)

      Distil the project to ONE headline finding the lay summary
      will lead with. If the project has more than one supported
      hypothesis, list them in priority order — the lay summary
      leads with one, the others appear as subordinate findings.

  - id: extract_and_translate_jargon
    name: Extract jargon + write a translation map
    description: |
      Walk the source artefacts (conclusions.md, methods.md, paper.md)
      and extract every disciplinary term that the audience cannot be
      assumed to know. For each, write:
        - the term
        - a one-phrase plain-language definition the audience would
          accept ("logistic regression" → "a way of estimating how
          likely an outcome is from a set of inputs")
        - the alternative WORD or PHRASE the lay summary will use in
          place of the term (often a shorter, looser word — "estimate"
          for "regression coefficient", "linked" for "associated")

      Save the translation map to workspace/scratch/lay_glossary.md.
      This becomes the reusable layer for future lay-summary work.

  - id: write_anchor_comparisons
    name: Write at least 2 anchor comparisons for every key number
    description: |
      Numbers without anchors are noise to the lay reader. For each
      number the summary intends to keep:
        - find at LEAST ONE anchor the reader can compare it to (a
          familiar scale, a daily-life equivalent, a previous-study
          benchmark) — prefer concrete over technical
        - find at LEAST ONE second anchor that is harder to over-read
          (a range from prior literature, a population baseline, a
          known noise floor) — prevents the number from being read as
          more impressive than it is

      Record the anchors inline in the draft so the audit step can
      verify each number has at least one survivor.

  - id: draft_per_section
    name: Draft each section in the audience profile
    description: |
      For each section in audience.sections:
        tool_synthesize section="<name>" output_type="lay_summary"
      Apply the audience profile's tone. Replace each occurrence of a
      jargon term with the translation map's alternative. Keep the
      reading grade level under the quality_bar floor.

      For press_release: write the headline as the FINDING, not the
      topic. "Vaccine cuts hospital admissions in half in over-65s"
      beats "Researchers study vaccine effects in over-65s."

      For social_thread: number each post (1/N) and write each post as
      a standalone unit; threads are skimmed, not read.

  - id: cite_minimally_and_link
    name: Cite minimally; link to the technical version
    description: |
      Lay summaries are not the place for a bibliography. Cap citations
      at the audience profile's `citations_maximum` (often 0-3). The
      one piece of citation work that ALWAYS belongs:

        - a "Read the technical version here:" link to the paper /
          preprint / dashboard
        - one or two anchor citations for the comparisons step (so
          the reader can chase down the source if they want to)

      For funder lay sections and patient-facing summaries, add a
      contact line — name, role, where to ask follow-up questions.

  - id: audit_for_overclaim_and_jargon
    name: Audit for overclaim, jargon, reading level
    description: |
      Walk the draft:
        - every causal verb in the draft licensed by the study design
          (no "X reduces Y" for observational data)
        - every disciplinary term either replaced or unpacked inline
        - reading grade level under the audience profile's floor
          (a public tool or the embedded textstat-style check applies
          here)
        - every retained number paired with at least one anchor
          comparison
        - acronyms unpacked the first time they appear (and re-unpacked
          for the patient/general_public profiles even on later mentions)
        - no untrue precision ("50.2%" reads as more precise than the
          study supports; round to the precision the data warrant)

      tool_audit_synthesis paper_path="synthesis/lay_summary.md"
      and tool_audit_claims if the source numbers came from the
      workspace.

  - id: handback
    name: Hand back + suggest the human review pass
    description: |
      Report:
        - section-by-section word counts
        - reading grade level
        - number of jargon terms replaced + number unpacked
        - link to the technical version

      For press releases, funder lay sections, and patient-facing
      summaries: recommend a human review pass by someone from the
      target audience (a comms officer, a patient advocate, a lay
      friend). LLM-drafted lay summaries pass technical audits but
      fail the "real person reads it cold" test more often than they
      should.

expected_outputs:
  - synthesis/lay_summary.md
  - workspace/scratch/lay_glossary.md

next_protocol: null
on_failure: guidance/dead_end_routing
