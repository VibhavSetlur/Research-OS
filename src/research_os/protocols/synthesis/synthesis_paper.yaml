id: synthesis_paper
tier: 'synthesize'
name: Synthesis — Paper (IMRAD, AI-authored Typst → PDF)
version: '3.0.0'
schema_version: '2.0'
scope_tags:
  domain: [any]
  audience: [auditor]
  workflow_shape: [any]
last_reviewed: '2026-06-16'
see_also:
  - synthesis/manuscript_outline      # lock the narrative arc BEFORE drafting
  - synthesis/journal_selection       # pick the venue the paper formats against
  - synthesis/synthesis_title_workshop
  - synthesis/synthesis_cover_letter
  - synthesis/reviewer_response       # red-team the draft before submission
description: |
  Guide the AI to author `synthesis/paper.typ` directly, section by
  section, as a publishable manuscript. Research-OS does not generate
  papers — the AI does. Tools support: tool_synthesize_plan inspects
  what's in the workspace, tool_synthesis_scaffold seeds a tiny
  skeleton, tool_synthesis_check audits the draft, tool_typst_compile
  renders synthesis/paper.pdf.

  **Canonical artefacts.** The paper deliverable is `synthesis/paper.typ`
  (source) + `synthesis/paper.pdf` (rendered). The Markdown-intermediate
  path (`synthesis/paper.md` → tool_typst_compile → paper.typ + paper.pdf)
  is supported for AIs that prefer drafting in Markdown, but the final
  state on disk MUST include `paper.pdf`. A `paper.md` that never
  compiles to a PDF is a stranded draft, not a deliverable, and the
  pre-submission audit will flag it as a blocker.

  **Forbidden artefact names** (the dashboard / preview tools do NOT
  recognise these, and downstream synthesis stages will not pick them
  up):
    - `synthesis/paper-lay.md` → use `synthesis/lay_summary.md`
      (synthesis_lay_summary protocol writes there).
    - `synthesis/REPRODUCIBILITY.md` → reproducibility belongs in the
      paper's Methods + Data Availability sections, OR in
      `workspace/logs/reproducibility_report.md` (produced by the
      reproducibility protocol's tool_audit). Do not author a top-level
      REPRODUCIBILITY.md in synthesis/.
    - `synthesis/METHODS.md` / `synthesis/CITATIONS.md` (upper-case
      stand-alones) → these duplicate `workspace/methods.md` /
      `workspace/citations.md` (the canonical rolling logs) and the
      paper's Methods + References sections. Update the workspace logs
      instead and let the paper's Methods + References render from them.

  **What "publishable" means here.** The reader can follow every
  factual claim back to a workspace artefact (numbers come from
  outputs/, citations resolve in workspace/citations.md, methods
  match workspace/<step>/conclusions.md). The structure matches the
  target venue's IMRAD (or domain-equivalent) shape. Length lands in
  the venue's range. Citations are verified.

  **Multi-turn cadence.** A real paper is not a single-turn output.
  One section per researcher prompt is the rhythm — it keeps the
  context window healthy AND forces the AI to deliberate. In
  autopilot mode the AI may proceed automatically through sections,
  but each section is still its own focused authoring pass + its own
  tool_synthesis_check audit.

trigger: |
  Researcher asks for "the paper" / "draft the manuscript" / "write
  it up" after at least one analysis step is finished.

prerequisites:
  - workspace/methods.md, workspace/citations.md exist with real content
  - At least one workspace/<step>/conclusions.md exists with substantive findings
  - inputs/literature_index.yaml has at least 3 entries (or workspace/citations.md does)
  - "Researcher's `research_goal.output_types` (in
    inputs/researcher_config.yaml) includes `paper`. If it doesn't,
    tool_synthesis_scaffold returns status=ask instead of writing —
    surface the message to the researcher and only re-call with
    confirmed=true after they say yes. Empty output_types is treated
    as 'open' so unfilled projects don't trip the gate."

# Machine-checkable subset (precondition gate): the foundation files must
# exist. "Real content" / "substantive" / output_types stay prose — those
# are the AI's judgement, only existence is hardened.
requires:
  checks:
    - kind: file_exists
      path: workspace/methods.md
      non_empty: true
      because: the paper's methods section builds on recorded methods
    - kind: file_exists
      path: workspace/citations.md
      because: the paper grounds claims in gathered citations
    - kind: glob_min
      pattern: workspace/**/conclusions.md
      min: 1
      because: the paper reports findings from completed steps

design_principles: |
  - Every quantitative claim is grounded in a real workspace artefact.
    The reader can audit the path (claim → conclusions.md → script →
    raw data). If a claim has no traceable origin, cut it or qualify it.
  - Citations are verified. Unverifiable citations are dropped, never
    silently retained. tool_synthesis_check flags hallucinated keys.
  - Figures support the narrative; they don't substitute for it. Each
    figure has a caption that names what to look at AND why it matters.
  - The voice matches the venue. Conferences favour terse claims;
    journals tolerate exposition; theses earn the right to repeat.
  - Limitations are honest. A paper that omits its weaknesses gets
    desk-rejected by a careful editor; a paper that names them frames
    the conversation.

quality_standards: |
  Length, section structure, and citation caps are VENUE-SPECIFIC —
  read them off the target venue's author guidelines (pick_venue step),
  not from a default. The roles below are timeless; the numbers are
  whatever the venue specifies.
  - abstract — carries >=1 quantitative finding; structured vs
    single-paragraph form follows the venue (most journals/preprints
    structure; most conferences run a single paragraph). Word band
    from the venue's abstract limit.
  - introduction — frames the question with the prior works the field
    expects; ends with an explicit "in this study, we ..." pivot. How
    many citations and how long is a function of the venue's norms.
  - methods — every workspace step's primary method/tool named;
    implementation + version + parameters + assumptions for non-trivial
    choices so the work is reproducible. Depth scales with the venue.
  - results — every primary finding carries the inferential statistic
    the field reports for that design; every focal figure is referenced.
  - discussion — a Limitations paragraph is present; a future-work
    direction is named; every DISAGREES/EXTENDS verdict from
    findings_vs_literature.md is addressed in a paragraph.
  - references — every cited key resolves in the bibliography; the
    citation count and any cap come from the venue, not a fixed number.

steps:
  - id: verify_intent
    name: Confirm the researcher actually wants a paper
    description: |
      Read `inputs/researcher_config.yaml#research_goal.output_types`.
      - Empty list: the researcher hasn't declared preferences; proceed
        (and consider asking them to add `paper` to make the intent
        explicit for future sessions).
      - List includes `paper`: proceed silently.
      - List does NOT include `paper`: STOP. Ask the researcher
        "Your declared output_types is <list>; do you want me to add
        a paper, or skip and use one of <list>?". Do NOT scaffold
        until they confirm. A paper is never auto-created for a
        project that asked only for a dashboard, slides, or a report.

  - id: inspect_workspace
    name: Inspect what's ready
    description: |
      tool_synthesize_plan returns recommended section ordering +
      per-section source paths + gaps. Read it before authoring
      anything.

  - id: pick_venue
    name: Pick the target venue
    description: |
      Read writing_preferences.venue_template from researcher_config.yaml
      (default generic_two_column). Tell the researcher the venue +
      expected length + format. Confirm before scaffolding.

  - id: scaffold
    name: Scaffold paper.typ
    description: |
      tool_synthesis_scaffold(kind='paper') writes a <=60-line
      synthesis/paper.typ with section headers and venue import.
      Refuses to overwrite an existing file. Idempotent.

  - id: author_sections
    name: Author each section in its own turn
    description: |
      Author inside-out: the sections grounded directly in workspace
      artefacts (methods, results) before the framing sections
      (discussion, introduction, abstract) that depend on them. The
      common default — methods, results, discussion, introduction,
      abstract — exists because the abstract and introduction can only
      be written once the contribution is locked; depart from it when
      the venue or the argument calls for it. Each section is grounded
      in the workspace artefact the plan named for it. In autopilot
      mode the AI may proceed through sections automatically; each is
      still its own focused authoring pass. This protocol authors the
      whole paper section by section; if a venue needs separately-
      assembled sections, draft them with the per-section writing/*
      protocols and stitch them here.

  - id: per_section_check
    name: Check after every section
    description: |
      tool_synthesis_check(file='synthesis/paper.typ',
      mode='substantiveness') after every section. Address blockers
      before continuing.

  - id: embed_figures
    name: Embed figures
    description: |
      Inline Typst blocks: #figure(image("figures/figXX.png"),
      caption: [...]) <fig:slug>. Curate with
      tool_synthesis_curate_figures so paper + dashboard share names.

  - id: title_workshop
    name: Workshop the title
    description: |
      Load synthesis/synthesis_title_workshop. The title is the
      single most-read sentence in the paper.

  - id: end_matter
    name: Build end matter
    description: |
      Load writing/writing_data_availability for data / code / CRediT
      / funding / COI / acknowledgements.

  - id: cover_letter
    name: Draft the cover letter
    description: |
      Load synthesis/synthesis_cover_letter.

  - id: compile
    name: Compile to PDF (mandatory before declaring the paper done)
    description: |
      tool_typst_compile produces synthesis/paper.pdf from paper.typ
      (and the Markdown-intermediate path also compiles paper.md →
      paper.typ → paper.pdf). Read typst_warnings / typst_errors on
      failure and iterate on the .typ source.

      The paper deliverable is NOT done until `synthesis/paper.pdf`
      exists on disk. A `paper.md` or `paper.typ` source with no
      rendered PDF is a stranded draft, not a deliverable. The
      pre-submission gate (step `pre_submission`, below) and
      tool_audit(scope='synthesis', dimension='all') will both flag
      a missing paper.pdf as a BLOCKER.

  - id: pre_submission
    name: Pre-submission gate
    description: |
      Load audit/pre_submission_checklist. Walks every check a journal
      will run, returns GREEN / YELLOW / RED + punch list.

tools: |
  - tool_synthesize_plan — what's ready in the workspace
  - tool_synthesis_scaffold — seed synthesis/paper.typ (idempotent)
  - tool_synthesis_check — per-IMRAD-section audit (substantiveness, structure, cliches)
  - tool_synthesis_curate_figures — copy step focal figures to synthesis/figures/
  - tool_writing_discussion_from_verdicts — mechanical merge of literature verdicts
  - tool_discussion_coverage_audit — gate, every DISAGREES/EXTENDS verdict addressed
  - tool_typst_compile — render synthesis/paper.pdf
  - tool_latex_compile — only when the journal requires .tex submission

expected_outputs:
  - synthesis/paper.typ            # AI-authored
  - synthesis/paper.pdf            # tool_typst_compile output
  - synthesis/biblio.yml           # Hayagriva citations (auto-generated)
  - synthesis/figures/fig*_*.png   # curated focal figures

next_protocol: null
next_protocol_kind: terminal
on_failure: guidance/dead_end_routing
