id: synthesis_paper
name: Synthesis — Paper (IMRAD, venue-tailored)
version: '1.3.3'
schema_version: '2.0'
description: |
  Compile the final IMRAD paper into synthesis/paper.md (and
  synthesis/paper.tex → PDF when requested), tuned to the target venue.
  Uses pandoc for the LaTeX render when available; otherwise our own
  inline-formatting + table-aware fallback (no more raw-escaped text).
  Server-side completeness gate blocks the assembly until every active
  step has a focal figure + caption + summary + non-stub conclusions.

  **v1.3.3 multi-turn enforcement.** A paper is the highest-stakes
  artefact in the project. Producing a publishable draft in ONE
  research-os call is the anti-pattern — context fills, the AI stops
  introspecting between sections, and the result is a 900-word sketch
  that uses 10 of 17 figures (the failure mode observed in the v1.3.2
  e2e). This protocol now enforces ONE section per researcher prompt:

    - turn 1: "outline the paper" → produces synthesis/outline.md
    - turn 2: "draft methods" → writes ONLY the Methods section
    - turn 3: "draft results" → writes ONLY the Results section
    - turn 4: "draft discussion" → writes ONLY the Discussion section
    - turn 5: "draft introduction" → writes ONLY the Introduction
    - turn 6: "draft abstract" → writes ONLY the Abstract
    - turn 7: "assemble + compile to PDF" → final_assembly + compile_pdf
    - turn 8: "workshop the title" → title.md
    - turn 9: "audit + revise" → audit_synthesis + revision pass
    - turn 10: "build end matter + cover letter"

  The AI refuses to chain >1 of these sections in a single turn. The
  researcher initiates each section as a separate prompt — that
  enforces the deliberative pace a real paper deserves AND keeps the
  context window healthy. If `interaction.autonomy_level` is
  `autopilot` the AI may proceed automatically through turns 2-10
  WITHOUT a fresh prompt, but each section is still its own
  tool_synthesize call + its own audit pass.

  Citation auto-verify is now part of final_assembly — `tool_citations_verify`
  runs as a HARD gate; any citation still in `pending verification`
  state blocks the assembly until the AI runs the actual lookup.

  Related per-section / supporting protocols this one calls into:
    - `synthesis/synthesis_title_workshop` — workshop the title
      (the single most-read sentence) before assembly
    - `writing/writing_methods` — Methods drafting
    - `writing/writing_results` — Results drafting
    - `writing/writing_discussion` — Discussion drafting
    - `writing/writing_limitations` — Limitations sub-section
    - `writing/writing_data_availability` — end-matter (data /
      code / CRediT / funding / COI / acknowledgements)
    - `synthesis/synthesis_cover_letter` — journal cover letter
    - `audit/pre_submission_checklist` — final ready-to-submit gate
trigger: After audit_and_validation passes. Final pipeline step. The researcher asks "write the paper" / "draft the manuscript".
prerequisites:
  - workspace/logs/audit_report.md exists with no BLOCKER lines
  - workspace/logs/step_completeness.md shows no per-step BLOCKERS
  - At least one experiment step has a substantive conclusions.md (>200 chars under "## Findings")
  - workspace/methods.md, workspace/citations.md exist with real content
  - inputs/literature_index.yaml has at least 3 entries

# ── Quality bars — every paper must meet ALL ─────────────────────────
quality_bar:
  abstract_words: [200, 300]            # APA / most journals
  introduction_words: [400, 800]
  methods_words_minimum: 400
  results_words_minimum: 400
  discussion_words_minimum: 500
  conclusion_words_minimum: 100
  figures_minimum: 1
  tables_minimum: 0
  citations_minimum: 8
  citations_maximum: 40                 # capped by output_type
  every_claim_grounded: true            # quantitative claim → workspace artifact OR cited paper
  no_causal_language_for_observational: true
  reproducibility_block_present: true

# ── Venue-specific overrides ─────────────────────────────────────────
venue_profile:
  journal:                              # default
    structure: [abstract, introduction, methods, results, discussion, conclusion, references]
    abstract_style: structured           # Background / Methods / Results / Conclusion
    sample_length_words: 4000
    figure_dpi_minimum: 300
    file_format: [markdown, latex]
    notes: |
      Default. Long-form, exhaustive methods, structured abstract, ~30-40 citations.
  conference:
    structure: [abstract, introduction, related_work, methods, results, discussion, references]
    abstract_style: unstructured         # one paragraph
    sample_length_words: 3000
    figure_dpi_minimum: 300
    file_format: [latex]                # most CS confs require LaTeX
    notes: |
      Tighter abstract; "Related Work" replaces deep "Discussion". ACL/NeurIPS-style.
  preprint:
    structure: [abstract, introduction, methods, results, discussion, conclusion, references]
    abstract_style: structured
    sample_length_words: 5000
    figure_dpi_minimum: 150              # web display ok
    file_format: [markdown, latex]
    notes: |
      arXiv / bioRxiv / SSRN. Longer; can include extended appendix.
  dissertation:
    structure: [abstract, introduction, literature_review, methods, results, discussion, conclusion, references]
    abstract_style: structured
    sample_length_words: 15000          # per chapter
    figure_dpi_minimum: 300
    file_format: [latex]
    notes: |
      Massive. Explicit "Literature review" chapter. Often per-chapter abstracts.
  report:                                # internal / technical
    structure: [executive_summary, background, methods, results, recommendations, references]
    abstract_style: executive_summary    # ~150 words, business focus
    sample_length_words: 2500
    figure_dpi_minimum: 150
    file_format: [markdown]
    notes: |
      Internal / industry. Prefers "Executive summary" + "Recommendations". Lighter on citations.

steps:
  - id: gate_completeness
    name: Run Completeness Gate (BLOCKING)
    description: |
      tool_audit_step_completeness
      The first step. If any active step has BLOCKERS (missing focal
      figure, missing caption sidecar, missing summary sidecar, stub
      conclusions sections), tool_synthesize REFUSES to assemble and
      this protocol cannot proceed. Fix the blockers in the listed
      steps (use an AI-authored plotting script for missing figures —
      auto-generates both sidecars) and re-run.

      Override only when the researcher explicitly asks for a partial
      paper (e.g. "draft what we have so far, mark the gaps"). The
      override is `override_completeness_gate=true` on tool_synthesize.

  - id: select_venue_profile
    name: Select Venue Profile
    description: |
      Read research_goal.target_venue from researcher_config.yaml.
      Pick the matching venue_profile (default: journal). Tell the researcher:
        "Targeting: <venue> · structure: <list> · length: ~<words>w
         · figure DPI: ≥<dpi> · output format: <fmt>"
      Confirm before any drafting.

  - id: plan_sections
    name: Plan the Synthesis
    description: |
      tool_synthesize_plan — returns the available sources and recommended ordering.
      Read it. In supervised/autopilot, discuss any deviation from the default
      ordering (methods → results → discussion → introduction → abstract).

  - id: draft_methods
    name: Draft Methods Section
    description: |
      tool_synthesize section="methods" output_type="paper"
      Pulls workspace/methods.md verbatim into synthesis/methods.md, attaches
      verified citations relevant to the methodology.

      QUALITY CHECK after generation:
        - Word count ≥ methods_words_minimum.
        - Every method block has implementation + version + parameters + assumptions.
        - Every cited reference resolves (tool_citations_verify called).
      Iterate via mem_methods_append if the word/grounding bar fails.

  - id: draft_results
    name: Draft Results Section
    description: |
      tool_synthesize section="results" output_type="paper"
      Aggregates workspace/*/conclusions.md + outputs/reports/*.md.

      QUALITY CHECK:
        - Every p-value formatted to 3 decimals (or "p < 0.001").
        - Every effect estimate paired with 95% CI.
        - Every figure cited and present in synthesis/figures/.
        - Word count ≥ results_words_minimum.

  - id: draft_discussion
    name: Draft Discussion Section
    description: |
      tool_synthesize section="discussion" output_type="paper"

      QUALITY CHECK:
        - Directly answers research_overview.md.
        - Mentions limitations (from conclusions.md > Limitations + audit warnings).
        - For observational designs: ZERO causal-language hits (the audit will flag this).
        - At least 5 citations.

  - id: draft_introduction
    name: Draft Introduction Section
    description: |
      tool_synthesize section="introduction" output_type="paper"

      QUALITY CHECK:
        - Cites at least 3 prior works that frame the research question.
        - Ends with explicit "In this study, we …" sentence.
        - Word count within introduction_words range.

  - id: draft_abstract
    name: Draft Abstract Section
    description: |
      tool_synthesize section="abstract" output_type="paper"
      Apply venue_profile.abstract_style (structured for journals/preprints,
      unstructured for conferences).

      QUALITY CHECK:
        - Word count within abstract_words range.
        - At most 3 citations (often 0).
        - Includes one quantitative finding.

  - id: final_assembly
    name: Final Assembly + Audit
    description: |
      tool_synthesize (no section) output_type="paper" output_format=<fmt>
      Assembles paper.md (+ paper.tex if requested), writes synthesis/references.bib
      with deduplicated verified citations capped at 40.

      Then:
        tool_audit_synthesis paper_path="synthesis/paper.md"
        tool_citations_verify
      Read both reports. Address BLOCKER warnings (missing sections, hallucinated
      citations, causal-language hits). Re-assemble.

  - id: compile_pdf
    name: Compile to PDF (DEFAULT for any serious draft, not optional)
    description: |
      v1.3.1: paper.md is the WORKING DRAFT. A markdown file is not a
      publication artefact. EVERY journal-track / grant-track / poster-
      track deliverable must compile to PDF — either via LaTeX or
      Typst. Skip ONLY for purely-internal lab-meeting summaries.

      Decision tree:
        Target journal accepts .tex / has a class file
          (Nature, Cell, Science, PLOS, eLife, JCO, NEJM, PNAS, ...)
            → LaTeX. `tool_latex_compile`. Use the journal's bst /
              class file from inputs/literature/templates/.
        Target is a preprint / thesis / general manuscript
            → **Typst** (modern LaTeX alternative; faster compile,
              cleaner syntax, growing journal support). Convert the
              paper.md to paper.typ via the rules below.
        Target is a poster
            → Use `synthesis/synthesis_poster` (separate protocol).
        Target is HTML/dashboard
            → Use `synthesis/synthesis_dashboard` (separate protocol).

      Typst conversion when requested:
        - Write `synthesis/paper.typ` with proper #set page() +
          #set text(font: "...") + #show heading.where(level: 1):
          set text(size: 18pt, weight: "bold") preamble.
        - Inline figures via `#figure(image("../workspace/<step>/
          outputs/figures/<NN>.svg", width: 80%), caption: [...])`.
        - Bibliography via `#bibliography("references.bib",
          style: "ieee")` or any IEEE/APA/Vancouver/Nature CSL.
        - Compile: `typst compile synthesis/paper.typ
          synthesis/paper.pdf`.

      LaTeX conversion when requested:
        - Standard `\documentclass{...}` per journal; preamble
          loads graphicx, hyperref, natbib OR biblatex.
        - Generate via tool_latex_compile (handles pdflatex →
          biber → pdflatex × 2).

      The PDF lives at `synthesis/paper.pdf` regardless of source.
      `tool_audit_synthesis` MUST re-run on the compiled artefact
      (PDF text extraction) to catch any LaTeX-only hallucination
      (citations resolving differently after \bibliography expansion).

  - id: workshop_the_title
    name: Workshop the title (single most-read sentence)
    description: |
      Load `synthesis/synthesis_title_workshop` to generate, iterate,
      and pick the title. The title is the single most-read sentence
      in the paper — first-draft titles age badly.

      Skip this step only when the title was already workshopped
      this session (synthesis/title.md exists and is recent).

  - id: build_end_matter
    name: Build the end matter (data / code / CRediT / funding / COI / ack)
    description: |
      Load `writing/writing_data_availability` to draft:
        - data availability statement
        - code availability statement
        - author contributions (CRediT)
        - funding statement
        - conflicts of interest
        - acknowledgements

      Append to synthesis/paper.md in the order most journals expect
      (acknowledgements → author contributions → funding → conflicts
      → data availability → code availability). Re-order per the
      target venue's house style.

  - id: draft_cover_letter
    name: Draft the cover letter
    description: |
      Load `synthesis/synthesis_cover_letter` to draft the cover
      letter the editor will see first. Cover letters are
      frequently the difference between desk-review and desk-
      reject; the protocol handles fit + significance +
      reviewers.

  - id: run_pre_submission_checklist
    name: Run the pre-submission checklist
    description: |
      Load `audit/pre_submission_checklist` for the final
      ready-to-submit gate. Produces a single GREEN / YELLOW /
      RED verdict + a punch list. RED blocks submission; YELLOW
      means proceed-after-addressing.

  - id: report_to_researcher
    name: Report to Researcher
    description: |
      Report:
        - Word count by section
        - Citation count + verified ratio
        - Figure count
        - Output files (paper.md, paper.tex, paper.pdf, references.bib)
        - End-matter status (each statement present + audited)
        - Cover letter status
        - Pre-submission checklist verdict (GREEN / YELLOW / RED +
          punch list)
        - Audit summary (any non-BLOCKER warnings to address)

expected_outputs:
  - synthesis/paper.md
  - synthesis/abstract.md
  - synthesis/methods.md
  - synthesis/results.md
  - synthesis/discussion.md
  - synthesis/references.bib

next_protocol: null
on_failure: guidance/dead_end_routing
