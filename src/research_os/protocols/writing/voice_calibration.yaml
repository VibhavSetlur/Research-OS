id: voice_calibration
tier: 'synthesize'
name: Voice Calibration (learn the researcher's writing voice + apply it)
version: '3.12.0'
schema_version: '2.0'
scope_tags:
  domain: [any]
  audience: [researcher, naive_ai]
  workflow_shape: [any]
last_reviewed: '2026-06-24'
see_also:
  - writing/writing_core           # the universal voice rules this profile layers under
  - synthesis/synthesis_paper      # the deliverable the calibrated voice flows into
  - synthesis/synthesis_lay_summary # register-shifting; the voice profile is register-aware
description: |
  Learn how THIS researcher writes, record it as a reusable voice profile,
  and apply it when drafting on their behalf — so the prose reads like them,
  not like a generic model. Distinct from every other voice rule in the
  system: writing_core and the venue templates match the FIELD's or the
  VENUE's voice ("write like Nature wants"); this matches the AUTHOR's voice
  ("write like Maya writes"). The two compose — venue conventions set the
  formal floor, the author's voice fills the discretionary space above it.

  Why this matters: a researcher reading a draft that doesn't sound like them
  has to rewrite it sentence by sentence, which defeats the point of drafting
  help. Capturing the voice once — from writing they already did — lets every
  later draft land closer to final, and lets the researcher keep their own
  fingerprint on work an AI helped produce.

  The profile is on-disk in the project (workspace/.style/voice_profile.md),
  so it works regardless of which AI client is driving — Hermes, Claude Code,
  Cursor, a bare model. Any agent that loads writing_core inherits it. It also
  composes with the agent_notes learning loop: a one-off correction goes to
  agent_notes; a durable, structured picture of the researcher's voice lives
  here.

  This is a SCAFFOLD, not a style guide. It does NOT prescribe a voice —
  short sentences vs long, hedged vs assertive, first-person vs passive are
  the researcher's to own. It names the DIMENSIONS to observe in their writing
  and the discipline for applying what is observed, then gets out of the way.

  What stays non-negotiable regardless of voice: claim grounding, banned
  AI-isms, honest hedging, and the venue's hard requirements. Voice shapes HOW
  something is said, never WHETHER a claim is grounded. A researcher whose
  natural voice is assertive does not get to state ungrounded claims
  assertively — calibration tunes style, not rigor.

trigger: |
  Researcher says any of: "write like me", "match my writing style", "make it
  sound like me", "mimic my voice", "here's how I write", "use my voice",
  "this doesn't sound like me", "calibrate to my writing", "learn my style",
  "I write more like this". Also offered proactively the first time the AI is
  about to draft substantial prose for a researcher with no voice profile yet
  and samples of their writing are available.

prerequisites:
  - At least one sample of the researcher's OWN writing exists, or can be
    pointed to (a prior paper, a draft they wrote, an email/blog in their
    voice, or a passage they edited heavily). Without a real sample there is
    nothing to learn — do not invent a voice.

steps:
  - id: gather_samples
    name: Gather genuine samples of the researcher's writing
    description: |
      Collect 1–N passages the researcher actually wrote (or heavily edited),
      ideally in or near the register of the target deliverable — a prior
      paper for paper drafting, informal notes for a blog, a grant for a
      grant. Note the register of each sample, because voice is
      register-dependent: the same person writes a methods section and a
      tweet differently, and the profile should say so.

      Be honest about provenance: a passage the AI drafted and the researcher
      lightly approved is NOT a sample of the researcher's voice. Use writing
      that originated with them. If no genuine sample exists, stop and ask for
      one rather than fabricating a style.

  - id: observe_voice_dimensions
    name: Observe the dimensions of their voice (don't judge them)
    description: |
      Read the samples and characterise the voice along its observable
      dimensions — describe what IS there, never what "should" be:
        - SENTENCE RHYTHM — typical length + variation; short and punchy,
          long and subordinated, or mixed; how clauses are joined.
        - STANCE — assertive vs hedged; how certainty and uncertainty are
          expressed; comfort with strong claims.
        - PERSON + VOICE — first-person ("we found"), impersonal ("it was
          found"), or mixed; active vs passive tendency.
        - DICTION — plain vs technical-dense; Latinate vs Anglo-Saxon; any
          characteristic words or constructions they favour or avoid.
        - SIGNPOSTING — how they structure an argument and signal transitions
          (explicit "First… Second…", or flowing); paragraph shape.
        - FIGURES OF SPEECH — do they use analogy, rhetorical questions,
          understatement, humour, or keep it strictly literal?
        - PUNCTUATION HABITS — em-dashes, semicolons, parentheticals,
          lists — the small marks that fingerprint a writer.

      Distinguish STABLE voice (recurs across samples — genuinely theirs)
      from one-off quirks of a single passage. Only stable features go in the
      profile. Where samples span registers, record per-register notes.

  - id: write_voice_profile
    name: Distil the observations into a voice profile
    description: |
      Write workspace/.style/voice_profile.md: a concise, USABLE description
      of the researcher's voice — concrete enough that a draft written to it
      reads like them. Favour specific, applicable guidance over abstract
      labels:
        - "prefers short declarative sentences; rarely subordinates" beats
          "concise style".
        - quote 2–3 SHORT exemplar sentences from the samples that typify the
          voice (the AI calibrates better against examples than adjectives).
        - record per-register variants where they differ.
        - note explicit DO and AVOID items the samples reveal (e.g. "avoids
          first person in formal writing", "uses em-dashes freely").

      Keep it lean — this is loaded at drafting time, so it pays a token cost
      every draft. A page is plenty; a treatise is self-defeating.

  - id: reconcile_with_venue_and_rigor
    name: Reconcile personal voice with venue + rigor constraints
    description: |
      State the precedence explicitly in the profile so later drafting never
      has to guess:
        - HARD CONSTRAINTS win over voice: the venue's required structure +
          tense + citation style (writing_core, the venue template), claim
          grounding, banned AI-isms, honest hedging. Voice never overrides
          these.
        - Voice OWNS the discretionary space: within the venue's rules, the
          sentence rhythm, diction, signposting, and stance follow the
          researcher's profile.
      Where the researcher's natural voice clashes with a hard rule (e.g.
      they write first-person but the venue forbids it), the rule wins for
      that deliverable and the profile notes the exception — don't silently
      override either.

  - id: apply_and_confirm
    name: Apply the voice to a draft + confirm the fit with the researcher
    description: |
      Draft (or re-draft) a real passage applying the profile, then show the
      researcher and ask whether it sounds like them. Their reaction is the
      ground truth — a profile is only as good as the drafts it produces.
      Refine the profile from their feedback ("more clipped", "I'd never say
      'leverage'", "too informal for this venue"), and record durable,
      cross-project preferences via sys_config(operation='note') so they
      persist even outside this project's voice profile.

      From here on, writing_core consults workspace/.style/voice_profile.md
      when present, so every section drafted under the writing/* and
      synthesis/* protocols inherits the calibrated voice automatically.

expected_outputs:
  - workspace/.style/voice_profile.md

quality_bar: |
  - The profile is built ONLY from genuine samples of the researcher's
    writing; no voice is invented when samples are absent.
  - Voice is described as observed dimensions + concrete exemplars, not
    prescribed; stable features only, register-aware where relevant.
  - Precedence is explicit: hard venue/rigor constraints over voice; voice
    owns the discretionary space.
  - Voice tunes HOW things are said, never WHETHER a claim is grounded.
  - A draft written to the profile was confirmed against the researcher's own
    reaction, and durable preferences were persisted via sys_config note.

next_protocol: null
next_protocol_kind: terminal
on_failure: guidance/dead_end_routing
