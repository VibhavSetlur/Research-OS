id: writing_core
tier: 'synthesize'
name: Writing — Core Rules
version: '1.11.0'
schema_version: '2.0'
last_reviewed: '2026-06-04'
description: |
  Universal writing rules. Loaded implicitly by every writing/* and
  synthesis/* protocol. The single source of truth for voice, claim
  grounding, banned phrases, number formatting, and tense. Invoke
  directly only when auditing an arbitrary markdown file.

  Per-section drafting protocols live alongside this one:
    - writing/writing_methods       — methods section
    - writing/writing_results       — results section
    - writing/writing_discussion    — discussion section
    - writing/writing_limitations   — limitations sub-section
    - writing/writing_conclusions   — per-step conclusions
    - writing/writing_citations     — bibliography maintenance
    - writing/writing_readme        — project + per-step READMEs
    - writing/writing_analysis_log  — narrative analysis log
    - writing/writing_data_availability — end-matter (data / code /
                                          CRediT / funding / COI /
                                          ack)

editorial_voice:
  default_tense: past for what was done, present for what the evidence supports
  mode: prescription
  rules:
    - "Every quantitative claim must trace to a workspace artefact or a
       verified citation. 'It is well known' is not grounding."
    - "Use supportive, professional research voice in any deliverable
       reviewing prior work — 'would benefit from', 'consider', 'the
       alternative interpretation is'."
    - "No first-person voice in deliverables. Methods + Results in
       past tense; Discussion in present tense; Future Work in future."

rules:
  voice_and_tense:
    methods: "past tense; either active ('We fit a model') or passive
              ('Models were fit') — be consistent within a section."
    results: "past tense; no causal language unless the design warrants
              it (RCT / IV / RDD / DiD / mathematical proof)."
    discussion: "present tense for what the evidence supports; past
                 tense for what was done."
    conclusion: "present + future ('These results suggest', 'Future work
                 should')."
  claim_grounding:
    - "Every number, comparison, and method choice must be traceable
       to a specific row in workspace/methods.md, an output in
       workspace/<step>/outputs/, or a verified citation."
    - "No vague-evidence phrasing ('many studies have shown', 'most
       researchers agree'); cite explicitly."
    - "tool_audit_claims and tool_verify enforce this at
       synthesis time."
  banned_phrases:
    - "it is important to note that"
    - "interestingly,"
    - "it is well known"
    - "obviously"
    - "naively"
    - "trivially"
    - "intuitively"
    - "as a language model"
    - "needless to say"
    - "in order to"
    - "due to the fact that"
    - "novel approach"
    - "many studies have shown"
    - "most researchers"
    - "perfectly"
    - "100% accurate"
  vague_quantifier_audit:
    rule: |
      Replace vague quantifiers with the SPECIFIC count or fraction
      they refer to. Vague quantifiers read as hedging when the
      number is uncertain, and as carelessness when the number is
      known but unstated.
    replacements:
      - "'a few'        → '<n>'"
      - "'several'      → '<n>'"
      - "'many'         → '<n>' or '<percentage>%'"
      - "'most'         → '<percentage>%'"
      - "'some'         → '<n>' or '<percentage>%'"
      - "'a number of'  → '<n>'"
      - "'a significant amount of' → '<exact quantity>'"
      - "'considerable' → '<the measured amount>'"
      - "'substantial'  → '<the measured amount>'"
  anti_bullshit_signals:
    rule: |
      Watch for sentences that PERFORM rigour without delivering
      it. Each pattern is a smell; rewrite when it appears.
    patterns:
      - 'sentences like `X demonstrates Y` without naming the comparison X was demonstrated against'
      - 'sentences like `X significantly Y` with no statistical test cited'
      - '`robust` / `robustly` without naming the robustness check'
      - '`principled` without naming the principle'
      - '`we leverage` / `we harness` instead of `we use`'
      - '`rich` / `deep` / `powerful` used as method adjectives rather than measured properties'
      - '`extensive experiments` without enumeration in Methods'
      - '`we observe` used to soft-pedal a quantitative claim that should be stated with its statistic'
      - 'claim sentences ending with `(Figure N)` when the figure does not actually support the claim'
  numbered_claim_grounding:
    rule: |
      For high-stakes drafts (papers, grants, dashboards), assign
      each substantive claim a `[C<n>]` tag and maintain a claim
      ledger that maps tag → evidence. This makes the claims audit
      mechanical instead of subjective.
    workflow: |
      1. As you write, append `[C<n>]` after each claim that
         requires grounding (every quantitative claim;
         every methodological claim; every comparative claim).
      2. Maintain workspace/scratch/claim_ledger.md as a markdown
         table:
           | tag | claim | evidence_type | source_path | citation_key |
      3. `evidence_type` is one of:
           - workspace_output (an output file path)
           - workspace_decision (a mem_log entry)
           - cited_paper (a citation_key)
           - figure (a figure path)
           - table (a table path)
      4. tool_audit_claims reads the ledger when present —
         every `[C<n>]` in the draft must have a ledger entry
         that resolves to a real artefact / verified citation.
      5. Before final assembly, strip the tags from the prose
         (or convert them to footnotes, depending on venue).
      6. The ledger persists; it documents grounding for future
         audits, peer review, and reproductions.
  causal_language:
    permitted_when: ["RCT", "instrumental variable", "regression discontinuity",
                     "difference-in-differences", "mathematical proof"]
    permitted_terms_when_warranted:
      ["causes", "leads to", "results in", "impacts", "proves"]
    observational_alternatives:
      ["is associated with", "is correlated with", "suggests",
       "is consistent with", "would be expected under"]
  number_formatting:
    p_values: "3 decimals (p = 0.042); 'p < 0.001' for very small."
    confidence_intervals: "Always report a 95% CI alongside the point
                           estimate (12.3, 95% CI 10.1–14.5)."
    scientific_notation: "For |x| < 1e-3 or > 1e5 (e.g. 3.2e-5)."
    units: "Always include where applicable ('1.2 mg/dL', '12.5 °C',
            '0.85 AUROC', '423 patients')."
    significant_figures: "Match the precision of the underlying
                          measurement; do not over-report digits."
  figure_referencing:
    - "Every figure cited in prose must exist on disk."
    - "Reference by its file name or by 'Figure N' once numbered."
    - "Captions live in <name>.caption.md (technical) and
       <name>.summary.md (plain-English) sidecars."

steps:
  - id: voice_and_tense_check
    name: Voice + tense check (during drafting)
    description: |
      Before committing any paragraph, self-check the tense matches
      the section it lives in. Methods/Results past, Discussion
      present, Future Work future. Consistency within a section
      matters more than the specific choice.

  - id: claim_grounding_check
    name: Every claim grounded
    description: |
      For each quantitative claim, identify the source. If it lives
      in a workspace output, the claim is grounded; if it lives in a
      citation, ensure the citation is verified
      (`tool_citations_verify`). If it lives in neither, either
      remove the claim or generate the supporting artefact first.

      CoVe-style verification on the top-N most load-bearing claims
      (the ones that anchor abstract / discussion paragraphs):

        tool_verify
            claim="<verbatim from draft>"
            questions=[
              "Does the cited paper measure the same thing?",
              "Same effect direction?",
              "Same population / cohort / units?",
              "Quantitative anchor in the same range?",
            ]
            supports=[true|false per question]

      A claim is VERIFIED only if all questions support==true. Any
      `false` flips the draft sentence into a caveated form ("…in
      contrast to <paper>, which reports …") OR the claim is removed.

      tool_verify (project-wide scan) runs the audit gate
      at finalize:
        - walks workspace/analysis.md decision blocks
        - confirms each decision has a grounding record or inline cite
        - writes workspace/logs/grounding_audit.md
        - BLOCKS pre-submission checklist if any decision is bare

  - id: banned_phrase_check
    name: Banned phrases + causal over-reach
    description: |
      Self-scan for the banned phrase list above. Verify any causal
      term is licensed by the study design. When in doubt, use the
      observational alternative — over-claiming costs more than
      under-claiming.

  - id: vague_quantifier_check
    name: Vague quantifier check
    description: |
      Walk the draft for "a few / several / many / most / some /
      a number of / a significant amount of / considerable /
      substantial". For each:
        - if the exact count is known → replace with the count or
          percentage
        - if the exact count is unknown → either run a quick
          count or remove the claim
      The vague form is acceptable only when the count would be
      meaningless to the reader (e.g. "several other reasons" in
      an introduction's framing).

  - id: anti_bullshit_check
    name: Anti-bullshit signals check
    description: |
      Walk the draft for the patterns listed in
      `anti_bullshit_signals` above. For each hit:
        - state what's being claimed in concrete terms
        - cite the evidence that supports the claim, OR
        - delete the sentence

      Sentences that perform rigour without delivering it survive
      first drafts because they sound right; the audit's job is
      to make them die.

  - id: optional_validation
    name: Programmatic validation (optional)
    description: |
      For substantial drafts:
        sys_file_validate_md filepath="<path>" protocol_name="writing_core"
      Flags banned phrases and missing structural headers.

expected_outputs: []

next_protocol: null
next_protocol_kind: terminal
on_failure: null
