id: network_visualization
name: Network / Graph Visualization (DAGs, citation networks, knowledge graphs)
version: '1.9.3'
schema_version: '2.0'
last_reviewed: '2026-06-02'
description: |
  When relationships matter more than aggregates — co-authorship,
  citation networks, social ties, gene regulatory networks, model
  computation graphs, causal DAGs, entity-relation diagrams,
  conversation flows — a network plot communicates what a bar chart
  can't.

  This protocol scaffolds the REASONING about network visualization:
  which layout algorithm fits the structure, how to handle scale
  (50 nodes vs 50,000), what visual channels to use (size, color,
  edge weight, label), how to make the result intelligible vs a
  "hairball", and when to use interactive vs static.

  References: Munzner (2014) Visualization Analysis and Design;
  Newman (2018) Networks; Bostock et al. d3.js documentation; Csardi
  & Nepusz (2006) igraph; van Ham & Rogowitz (2008) on perception
  of node-link diagrams.

trigger: |
  Any of:
    - researcher says "network", "graph", "node-link", "DAG",
      "citation network", "co-authorship", "knowledge graph",
      "force-directed", "gephi", "cytoscape", "edge bundling",
    - data has explicit relationships (edge list, adjacency, triples),
    - methodology/causal_inference_deep wants a DAG diagram,
    - the audit flags a relational story being told with bar charts
      ("this hides the structure").

prerequisites:
  - Edge data exists (edge list, adjacency matrix, or NetworkX /
    igraph object) OR the AI can extract one from a relational source.
  - Node attributes (type, group, weight) documented if relevant.

editorial_voice:
  rules:
    - "If the network has > ~500 nodes, force-directed layouts produce
       hairballs. Switch to clustered layouts (community detection +
       layout per cluster), matrix views, or aggregated representations
       (super-node summaries) BEFORE drawing."
    - "Layout choice is not aesthetic — it encodes structure. Tree
       layouts assume hierarchy; force-directed assumes spring
       equilibrium; circular emphasizes order; arc diagrams compare
       within a fixed sequence. Pick by the structural question."
    - "Visual encoding budget is finite. Size = degree or weight,
       color = community or type, label = SELECTED nodes only.
       Labelling every node makes a network unreadable above ~30
       nodes."
    - "Static for publications; interactive for exploration. A
       publication figure should answer ONE question; an exploration
       tool should let the reader pan, zoom, and filter."

steps:
  - id: characterize_graph
    name: Characterise the graph structure
    description: |
      Capture before plotting anything:
        - directed or undirected? weighted or unweighted?
        - bipartite, tripartite, multigraph?
        - node count + edge count + density
        - connected components (1 giant or many?)
        - degree distribution (uniform vs power-law)
        - any natural hierarchy (tree-like) or community structure?

      Use networkx / igraph / graph-tool to compute these numbers and
      write to workspace/<step>/outputs/reports/network_profile.md.

      The profile dictates the layout family in step 3.

  - id: pick_visualization_goal
    name: Pick the visualization GOAL (and therefore the encoding)
    description: |
      What single question should the figure answer? Common goals
      and the encodings that serve each:

        SHOW STRUCTURE — overview of who connects to whom. Force-
          directed layout (FR / Kamada-Kawai / ForceAtlas2). Edge
          bundling if many edges cross.
        SHOW COMMUNITIES — what clusters exist? Run community
          detection (Louvain / Leiden / spectral) FIRST, then
          colour-by-community. Hide intra-community edges in dense
          clusters.
        SHOW HIERARCHY — parent-child or DAG structure. Use a tree
          layout (Sugiyama / Reingold-Tilford / dot via graphviz).
        SHOW FLOW — directional movement (traffic, citation flow).
          Use a Sankey, arc diagram, or directed force-layout with
          arrowheads.
        SHOW INFLUENCE — who is central? Compute centralities
          (degree / betweenness / eigenvector / PageRank); size
          nodes by chosen metric; report which centrality + why.
        SHOW CHANGE OVER TIME — evolving network. Use small
          multiples (snapshots) OR an animation OR a dynamic
          network diagram. See visualization/animation_design.

      Write workspace/.network_viz/goal.md.

  - id: pick_layout_algorithm
    name: Pick the layout algorithm — reasoning, not default
    description: |
      Layout families + when they fit:

        FORCE-DIRECTED (Fruchterman-Reingold, Kamada-Kawai,
          ForceAtlas2, OpenORD) — best for small-medium networks
          (~< 500 nodes) with natural community structure. Bad for
          dense or scale-free graphs (hairball).

        HIERARCHICAL (graphviz `dot`, Sugiyama) — best for DAGs,
          trees, layered structures (causal DAGs, computation
          graphs, organisational charts).

        CIRCULAR / ARC — best for ordered nodes or comparing
          within a sequence (genome circos plots, chord diagrams
          for migration).

        MATRIX / HEATMAP-OF-ADJACENCY — best for dense graphs
          where node positions are nuisance. Reordering matters
          (spectral, BEA, optimal leaf-ordering).

        GEOGRAPHIC — when nodes have spatial position. See
          visualization/geospatial_visualization for that path.

        EMBEDDING-BASED (node2vec / GNN embeddings + UMAP / t-SNE)
          — when the graph is too large for layout-as-meaning, you
          can embed nodes and 2D-project. See
          visualization/dimensionality_reduction_viz.

      Document choice + tradeoff + library:
        Python: networkx (default layouts), graph-tool (fast +
          beautiful), igraph (best community detection),
          pyvis (interactive HTML), bokeh / plotly (interactive),
          datashader (massive graphs).
        R: igraph, ggraph, tidygraph, visNetwork.
        Dedicated: Gephi (interactive desktop), Cytoscape
          (biological), graphviz (DAGs / trees).
        Top-tier interactive / showcase: D3 force layout with
          custom edge bundling, deck.gl GraphLayer for
          WebGL-scale (>100k edges), Observable + Plot for
          publishable interactive essays, Three.js for 3D /
          embedding-space network views. When the network IS the
          contribution, route to visualization/showcase_visualization
          and visualization/interactive_dashboard_design — basic
          static node-link is rarely the right ceiling.

  - id: pick_visual_encoding
    name: Pick the visual encoding (size / colour / label / edge weight)
    description: |
      Encoding budget — what each channel encodes + the trade:

        NODE SIZE — best for ONE numeric attribute (degree, weight,
          centrality). Don't double-encode (size + colour for the
          same variable adds nothing).
        NODE COLOUR — best for categorical (community, type). For
          ordinal, use a sequential palette. Cap to ~7-8 categories;
          otherwise legend explodes.
        NODE LABELS — show selectively. Top-k by chosen centrality;
          or only nodes the story names. NEVER all nodes above ~30.
        EDGE WEIGHT — line thickness. Use alpha or thickness, not
          both. Saturate values above the 95th percentile so a few
          mega-edges don't drown the rest.
        EDGE COLOUR — categorical edges only (relation type).
          Otherwise neutral grey.
        ARROWS — directed graphs only. Open arrows + slight curve
          (Bezier) for legibility when many edges run parallel.

      Reference: Munzner Ch. 9 on networks; ColorBrewer for palettes.

  - id: implement_and_render
    name: Implement + render in an AI-authored plotting script or tool_python_exec
    description: |
      For a static publication figure: follow visualization/figure_guidelines
      with kind=network if supported, OR tool_python_exec with the
      chosen library. The script must:
        - load the graph (edge list / adjacency / pickle)
        - compute the chosen layout with a FIXED random seed (force-
          directed layouts are stochastic; non-reproducible figures
          fail the audit)
        - compute the chosen centrality / community labels
        - render to workspace/<step>/outputs/figures/network_<topic>.png
          (raster) + .svg (vector for the manuscript)
        - emit the standard 4 sidecars: .caption.md, .summary.md,
          .prov.json, .svg
        - persist the laid-out coordinates to
          data/output/network_coords.parquet so reruns can reproduce
          the figure WITHOUT re-running the stochastic layout.

      For an interactive figure: route to
      visualization/interactive_dashboard_design (or skip if it
      doesn't exist yet — pyvis / bokeh / plotly directly).

  - id: legibility_audit
    name: Audit the rendered figure for legibility
    description: |
      Run through the legibility checklist:
        - is the figure interpretable without zoom?
        - are labels readable (font size ≥ 7pt in the rendered size)?
        - does the chosen layout actually convey the structure or
          is it a hairball?
        - are the visual encodings (size, colour) explained in the
          caption + legend?
        - do edge colours / widths discriminate without colour vision?
          (Route to visualization/color_accessibility_audit.)
        - is the relevant centrality / community / structural claim
          REALLY visible, or buried under visual noise?

      If the network is a hairball, GO BACK to step 2 / 3: simpler
      goal, different layout, aggregated nodes. Don't ship a hairball.

  - id: caption_and_methods
    name: Write the caption + log to methods
    description: |
      Caption must state:
        - what the nodes represent + what the edges represent
        - directed / weighted / N nodes + M edges
        - layout algorithm + random seed
        - what node size encodes + what node colour encodes
        - centrality / community detection method (with citation)
        - the ONE claim the figure supports

      mem_methods_append the network construction + layout choices
      so the audit trail is intact.

expected_outputs:
  - workspace/<step>/outputs/reports/network_profile.md
  - workspace/.network_viz/goal.md
  - workspace/<step>/outputs/figures/network_<topic>.{png,svg}
  - workspace/<step>/outputs/figures/network_<topic>.{caption.md,summary.md,prov.json}
  - workspace/<step>/data/output/network_coords.parquet

quality_bar:
  graph_profile_with_n_nodes_m_edges_density: true
  layout_algorithm_named_with_rationale_and_seed: true
  visual_encoding_explained_in_caption_and_legend: true
  hairball_check_passed: true
  reproducible_coords_persisted: true
  accessibility_audit_passed_or_routed: true

next_protocol: visualization/figure_critique
next_protocol_kind: forward_default
on_failure: visualization/figure_guidelines
