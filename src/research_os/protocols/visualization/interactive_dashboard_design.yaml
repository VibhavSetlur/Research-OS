id: interactive_dashboard_design
tier: 'synthesize'
name: Interactive Dashboard Design (showcase-tier, beyond static HTML)
version: '2.0.0'
schema_version: '2.0'
scope_tags:
  domain: [humanities, engineering]
  audience: [maintainer]
  workflow_shape: [experiment_pipeline]
last_reviewed: '2026-06-04'
description: |
  `synthesis_dashboard` produces a single-file offline HTML — the
  workhorse "email this to my advisor" deliverable. THIS protocol is
  for the next tier: a multi-page interactive dashboard that the
  researcher demos at a conference booth, embeds in a paper landing
  page, or uses as the analytical surface for a stakeholder team.

  The reasoning the protocol scaffolds: WHO interacts with it, WHAT
  the interactive vocabulary is (filter, brush-and-link, drill-down,
  parameterised view), WHICH stack fits (Observable framework,
  Streamlit, Shiny, Dash, Panel, Quarto-with-shinylive, kepler.gl,
  deck.gl, custom React + D3 / Vega-Lite), and HOW to keep the
  interactive deliverable reproducible + cite-able even though
  HTML+JS doesn't fit a journal PDF.

  Quality bar: better than what a non-technical reviewer expects
  from "academic dashboards". Tableau-tier polish is the floor, not
  the ceiling. The output should explain itself without a tour.

  References: Munzner (2014) Visualization Analysis and Design;
  Heer & Shneiderman (2012) Interactive Dynamics for Visual
  Analysis; Observable Framework docs; Streamlit / Shiny / Dash
  best-practices guides; Bostock's "Three Little Circles" tutorial.

trigger: |
  Any of:
    - researcher says "dashboard", "interactive", "demo", "stakeholder
      tool", "Observable", "Streamlit", "Shiny", "Dash", "Panel",
      "kepler", "deck.gl", "vega-lite", "interactive figure",
      "brush and link", "linked views", "parameterised view",
    - synthesis_dashboard produced a static HTML and the researcher
      wants the next tier (interactivity, linked filters, deployable),
    - the deliverable is a conference demo, a paper landing page, a
      live analytical tool — not a journal figure.

prerequisites:
  - The data is staged in a queryable format (parquet / DuckDB /
    sqlite / arrow), OR a Python / R analysis function exists.
  - The intended audience + interaction vocabulary is at least
    sketched (this protocol refines it but needs a starting point).

editorial_voice:
  rules:
    - "Pick the stack by who deploys + who consumes. A solo
       researcher demoing to one PI uses Streamlit / Shiny in 30
       minutes. A research group with a JS engineer demoing to a
       conference audience uses Observable Framework or
       React + D3 / Vega-Lite. A geospatial team uses kepler.gl /
       deck.gl. Don't reach for React if a 50-line Streamlit
       script ships today."
    - "Interactivity is a vocabulary, not a feature. Pick from:
       FILTER (subset the data), BRUSH-AND-LINK (selection in one
       view highlights in others), DRILL-DOWN (click to expand),
       PARAMETERISED VIEW (change an input → re-derive), TEMPORAL
       SCRUB (slider over a time dimension), MAP-PAN (geospatial).
       Pick 2-3 that serve the questions; don't bolt on
       interactivity for its own sake."
    - "Showcase-tier means it doesn't look like an academic
       dashboard. Typography, spacing, transitions, copy. Use
       Tufte's tenets — high data-ink, no chartjunk — but with
       modern web polish. Look at Observable's gallery + The
       Pudding for the bar."
    - "Reproducibility is non-negotiable. The dashboard reads from
       a versioned data snapshot (parquet pinned to a content
       hash), the source code is in workspace/synthesis/, and the
       deployable build is checked in or container-shipped. A
       dashboard that works once and disappears is not research."

steps:
  - id: characterize_audience_and_questions
    name: Characterise audience + the questions the dashboard answers
    description: |
      Document:
        - AUDIENCE — solo PI? lab group? conference audience?
          stakeholder team? mixed-technical-literacy reviewers?
        - DEPLOYMENT — local-only (researcher's laptop)? internal
          (intranet, university cluster)? public (project site,
          conference URL)? embedded (paper landing page)?
        - DEVICE — laptop projector, large-format display, mobile
          (no), tablet?
        - QUESTIONS — list the 3-7 questions a user should be able
          to answer interactively. Each question maps to an
          interaction.

      Write workspace/.dashboard/audience.md.

  - id: pick_the_stack
    name: Pick the stack by author skillset + audience + interactivity
    description: |
      Reason through, then commit:

        STREAMLIT (Python) — fastest path. Solo researcher, Python
          familiarity, one page, simple widgets. Best for "demo to my
          PI tomorrow". Deploy via streamlit.io or huggingface
          spaces. Caveat: looks dated by default; needs CSS tweaks
          for showcase tier.

        SHINY for R / SHINY for Python — R researchers, statistical
          dashboards. Excellent reactivity model. shinyapps.io for
          deploy. Caveat: same look-and-feel issue as Streamlit
          out of the box.

        DASH (Python) — Plotly's framework. More flexible than
          Streamlit; component-based; deployable as a Flask app.
          Best for "interactive plotly dashboards with multi-page
          structure". Caveat: more boilerplate.

        PANEL / HOLOVIZ (Python) — declarative; integrates with
          bokeh + plotly + vega + matplotlib. Best for someone who
          wants both notebook-driven exploration AND a deployable
          dashboard from the same code.

        OBSERVABLE FRAMEWORK — static-site generator backed by
          Observable JS notebooks. Top-tier polish, fastest load
          times (pre-built static + reactive JS), publishes to
          any static host. Best for "next-tier polish, public
          deployment, willing to write some JS". Strong with
          D3 + Plot + Vega-Lite under the hood. Quarto integrates.

        QUARTO + SHINYLIVE / OBSERVABLE — for academic publishing
          context. Quarto compiles to HTML / PDF / docx; shinylive
          embeds R Shiny as WASM (no server needed); Observable
          interactive cells embed natively. Best for "paper landing
          page that's interactive".

        REACT + D3 / VEGA-LITE / VISX — custom builds. Maximum
          control; significant engineering. Best for "the
          dashboard IS the deliverable, we have a JS engineer".

        KEPLER.GL / DECK.GL — geospatial-flagship. Beautiful out
          of the box. Best for any heavy geospatial story.

        TABLEAU / POWER BI — when the audience already lives in
          those tools (enterprise, clinical reporting, government).
          Don't ignore them just because they're commercial.

      Document choice + why + deploy target. Surface the trade
      explicitly (e.g. "Streamlit ships in a day but I'll spend
      another half-day on CSS to reach showcase tier; Observable
      Framework takes 3 days to learn but ships polished").

  - id: design_the_interactive_vocabulary
    name: Design the interactive vocabulary (2-3 idioms, not more)
    description: |
      For each question in step 1, pick the SINGLE interactive
      idiom that answers it. Common idioms + when they fit:

        OVERVIEW + DETAIL — main chart + a "drill-in" pane. Best
          when one summary view doesn't capture the granularity.

        FILTER + RE-AGGREGATE — sidebar of filters; main view
          recomputes. Best for multi-dimensional data ("show me
          patients aged 50-70 in the treatment arm").

        BRUSH AND LINK — selecting a region in one chart
          highlights matching data in others. Best for exploring
          correlated views.

        SMALL-MULTIPLE WITH SCRUBBER — multiple panels, one slider
          (time, parameter). Best for parameter sweeps + time
          evolution.

        MAP-PAN + LAYER TOGGLE — geospatial. Best for any spatial
          story.

        DAG-LIKE WALKTHROUGH — guided sequence with branches.
          Best for tutorials + explainers (look at Distill.pub for
          the standard).

      Avoid adding 6+ idioms. Each idiom is a learning cost for
      the user; pick the smallest set that answers the questions.

  - id: data_layer
    name: Design the data layer (versioned, queryable, reproducible)
    description: |
      For a dashboard to be reproducible:
        - data is a VERSIONED snapshot (parquet + content hash, or
          a checkpointed DuckDB / sqlite file) — NOT a live
          connection to a moving database (which makes the
          dashboard's outputs un-replayable).
        - queries run client-side where possible (DuckDB-WASM,
          Arrow, vega-lite expressions) for speed + offline use,
          OR server-side via a thin API.
        - row counts + column types are documented; missingness
          handling is explicit.

      Persist the data snapshot + hash to workspace/synthesis/
      dashboard_data/ alongside the dashboard source.

  - id: polish_pass
    name: Polish pass (typography, palette, copy, transitions)
    description: |
      Showcase tier means:
        - typography is consistent + readable (not browser default)
        - palette is intentional + colour-vision-safe (route to
          visualization/color_accessibility_audit)
        - copy is hand-written for the audience (no chart titles
          like "fig 1")
        - transitions are subtle (200-400ms, ease-in-out, NOT bouncy)
        - empty states + loading states are designed (a blank
          chart on first paint reads as broken)
        - default view is informative (no "select a filter to begin")
        - mobile is gracefully degraded (or explicit "desktop only"
          notice + link to PDF version)

      Reference Observable, The Pudding, Bloomberg Graphics for
      the bar.

  - id: reproducibility_and_cite
    name: Reproducibility + how to cite
    description: |
      A dashboard that lives at one URL with no source is not
      research. Ship:
        - source code in workspace/synthesis/<dashboard_name>/
        - data snapshot + hash
        - build script (Docker image OR a make-style README that
          a stranger can follow)
        - VERSION the dashboard (semver: v1.0 first conference
          demo, v1.1 fixed filters, v2.0 added new view)
        - cite-able URL (Zenodo / OSF the source release; include
          a DOI on the dashboard footer)
        - a STATIC PDF EXPORT of the headline views for archival
          journal supplements (because journal PDFs can't embed
          the live dashboard).

  - id: deploy_and_monitor
    name: Deploy + monitor
    description: |
      Deploy paths by stack:
        - Streamlit: streamlit.io free; HF Spaces; custom Docker.
        - Shiny: shinyapps.io; posit Connect; shinylive (WASM).
        - Dash: Heroku / Fly.io / Cloud Run.
        - Observable Framework / Quarto: any static host (Netlify,
          Vercel, GitHub Pages, S3).
        - Custom React: Vercel / Netlify / static host.
        - kepler.gl: kepler.gl/demo (anonymous) or self-host.

      Add basic monitoring: error tracking (Sentry free tier),
      analytics if appropriate (Plausible, Fathom — privacy-
      preserving; avoid GA for research dashboards unless
      stakeholders demand it).

      For conference demos: have an OFFLINE fallback (the static
      HTML build) on a USB stick in case the venue wifi dies.

  - id: caption_and_methods
    name: Caption + methods entry
    description: |
      The dashboard's "About" page must include:
        - what data, what time period, what filters
        - methods (or link to the paper / preprint)
        - version + last-updated date + source / data hash
        - contact + cite-able DOI

      mem_log the stack choice + data hash so the
      paper's methods section can reference it.

expected_outputs:
  - workspace/.dashboard/audience.md
  - workspace/synthesis/<dashboard_name>/  (source + data snapshot + build script)
  - workspace/synthesis/<dashboard_name>/README.md  (deploy + cite)
  - workspace/synthesis/<dashboard_name>/static_export.pdf  (for archival)

quality_bar:
  audience_deployment_device_explicit: true
  stack_choice_rationalised_against_skillset_and_audience: true
  interactive_vocabulary_capped_at_3_idioms: true
  data_layer_is_versioned_snapshot_with_hash: true
  polish_pass_completed_typography_palette_copy_transitions: true
  accessibility_audit_passed_or_routed: true
  reproducible_source_and_data_shipped: true
  static_pdf_export_for_archival_present: true

# AUTONOMY + OUTPUT_TYPES GATE: in manual / supervised /
# coaching, surface "Next: synthesis/synthesis_dashboard" as a
# SUGGESTION; only autopilot auto-chains. The dashboard scaffold ALSO
# gates on `dashboard` ∈ research_goal.output_types — see
# tool_synthesis_scaffold's `status=ask` envelope.
next_protocol: synthesis/synthesis_dashboard
next_protocol_kind: forward_default
on_failure: visualization/figure_guidelines
