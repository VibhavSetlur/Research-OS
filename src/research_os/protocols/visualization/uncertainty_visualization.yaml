id: uncertainty_visualization
name: Uncertainty Visualization (intervals, fans, ensembles, posteriors)
version: '1.6.0'
schema_version: '2.0'
last_reviewed: '2026-06-02'
description: |
  Point estimates without uncertainty mislead. A bar with no error,
  a forecast line with no fan, a prediction with no calibration —
  these are confidence theatre. This protocol scaffolds visualizations
  that COMMUNICATE uncertainty rather than hide it.

  Companion to methodology/uncertainty_quantification (which fits the
  uncertainty); this protocol decides how to SHOW it.

  References: Padilla et al. (2021) Uncertainty Visualization; Hullman
  (2020) Why Authors Don't Visualize Uncertainty; Gneiting & Katzfuss
  (2014) Probabilistic Forecasting; Spiegelhalter et al. (2011)
  Visualizing Uncertainty about the Future.

trigger: |
  Any of:
    - researcher says "uncertainty", "confidence interval", "credible
      interval", "prediction interval", "fan chart", "error bar",
      "posterior plot", "spaghetti", "ensemble forecast", "calibration
      plot", "reliability diagram",
    - any figure shows a point estimate where the analysis produced an
      interval (audit/audit_and_validation flags this),
    - methodology/uncertainty_quantification handed off a fitted
      calibrator that needs visual reporting,
    - methodology/bayesian_analysis produced a posterior that needs
      display.

prerequisites:
  - The data is an INTERVAL, DISTRIBUTION, ENSEMBLE, or SAMPLE — not
    a point estimate. (If only points exist, route back to the
    methodology protocol to compute uncertainty first.)
  - The kind of uncertainty (aleatoric / epistemic / both) is
    documented; affects how it's communicated.

editorial_voice:
  rules:
    - "Show the WHOLE distribution when you have it. A 95% interval
       hides everything outside the tails; show the full posterior,
       the ensemble, the bootstrap distribution. Point + interval is
       a summary, not a display."
    - "Error bars on bar charts are read as additive ranges and
       under-perceived (Correll & Gleicher 2014). For comparisons of
       means, prefer gradient bands, violin / strip overlays, or
       dot-and-whisker plots."
    - "Cone-of-uncertainty / fan charts must label the percentile
       bands EXPLICITLY. An unlabelled fan reads as 'the data does
       this' rather than 'we're 80% confident the data does this
       within this band'."
    - "Subgroup calibration matters. A model that is well-calibrated
       in aggregate can be badly miscalibrated in important
       subgroups. Show the reliability curve PER SUBGROUP when the
       analysis demands it (route to methodology/fairness_audit)."

steps:
  - id: characterize_uncertainty
    name: Characterise the uncertainty
    description: |
      Document:
        - SHAPE — symmetric (Gaussian-ish) or skewed?
        - SOURCE — measurement (aleatoric) or model (epistemic) or
          both? They may need separate channels.
        - REPRESENTATION — interval, distribution, ensemble samples,
          posterior samples, Bayesian credible bands, frequentist
          confidence bands?
        - GRANULARITY — one quantity, a few, or many (whole forecast
          curve, image-pixel-level)?

      Write workspace/.uq_viz/uncertainty_profile.md.

  - id: pick_visual_idiom
    name: Pick the visual idiom by what is being shown
    description: |
      A non-exhaustive map from data type to recommended idiom:

        SINGLE INTERVAL — dot + whisker (preferred to bar + error
          bar; Cleveland 1985). Add the raw N + p-value / CI bound
          in the caption.

        MULTIPLE INTERVALS (forest plot) — horizontal dot-whisker
          per group; pooled estimate at the bottom; vertical line
          at null. Standard in meta-analysis + clinical trials.

        FULL DISTRIBUTION — VIOLIN PLOT (kernel density),
          RAINCLOUD (violin + box + strip; Allen et al. 2019),
          BEESWARM (each point shown, jittered to avoid overlap),
          RIDGELINE PLOT / JOY DIVISION (many distributions stacked).

        TIME-SERIES FORECAST — FAN CHART (multiple percentile
          bands shaded with decreasing alpha by extremity); MUST
          label which bands (e.g. 50% / 80% / 95%); cite ECMWF /
          Bank of England as standard references for fan
          conventions.

        ENSEMBLE / SPAGHETTI — overlay all member curves with low
          alpha. Add the median in bold. Works well when N members
          ≤ ~30; above that, switch to fan + median.

        POSTERIOR DENSITY — solid curve with HDI (highest density
          interval) shaded; mark the posterior mean / median; add a
          ROPE band when defined (Bayesian decision context).
          Use a `posterior` chart per the guidance in visualization/figure_guidelines or arviz.

        PREDICTIVE PROBABILITY ATLAS — pixel-level uncertainty on
          a map / image. Bivariate colour scheme (value + uncertainty)
          OR separate maps side-by-side OR hatching density.

        CALIBRATION (RELIABILITY DIAGRAM) — predicted-probability
          bins on x, observed frequency on y, with diagonal reference;
          bin counts as histogram below or as point size. Don't
          forget the bin count.

        ECE / SHARPNESS BARS — paired bar chart showing both
          calibration error (lower = better) AND sharpness (mean
          interval width, lower = sharper). A perfectly calibrated
          useless model wins on ECE but loses on sharpness.

        HYPOTHETICAL OUTCOME PLOT (HOP) — animated frames each
          drawing one possible outcome from the predictive
          distribution. Hullman et al. (2015) showed HOPs aid
          uncertainty cognition. Route to
          visualization/animation_design.

      Document the choice + citation justifying it for the audience.

  - id: encode_uncertainty_visually
    name: Encode uncertainty in the right visual channel
    description: |
      Channels for uncertainty (and what they cost):

        WIDTH / EXTENT — error bars, fan widths. Most familiar but
          under-perceived for differences.
        SHADING / OPACITY — alpha-blended density. Works when
          continuous; harder to compare across plots.
        SHAPE / TEXTURE — hatching, stippling. Good for maps with
          missing/low-confidence regions.
        ANIMATION — frame-sampled outcomes (HOP). Most cognitively
          honest; only works in animatable deliverables.
        EXPLICIT QUANTILE BANDS — labelled percentiles in a fan.
          Best for forecast time-series.
        TWO-VARIABLE (BIVARIATE) COLOUR — encodes value and
          uncertainty in one channel; powerful but hard to learn.

      Pick channel by the deliverable + audience expertise + the
      kind of uncertainty (frequentist intervals vs Bayesian
      posteriors get different conventional encodings).

  - id: implement_and_render
    name: Implement + render
    description: |
      Libraries (Python):
        - matplotlib + seaborn (errorbar, fill_between, violinplot,
          boxenplot)
        - arviz (Bayesian posteriors + HDI + ROPE — the standard)
        - plotnine (ggplot2-in-python — great for raincloud /
          ridgeline via plotnine.themes + raincloud add-on)
        - probscale (calibration + reliability)
        - matplotlib-ext for fan charts
      R: ggplot2 + ggridges, ggdist (for dot/interval, halfeye,
        slabinterval), bayesplot.

      Interactive / top-tier:
        - Vega-Lite errorband + ridgeline (declarative; great
          for embedded paper figures)
        - Observable Plot (concise, polished, integrates with
          notebooks + Framework)
        - bokeh / holoviews for interactive ribbon + ensemble
          plots
        - For Hypothetical Outcome Plots that need animation:
          route to visualization/animation_design
        - For interactive uncertainty exploration (slider over
          confidence levels, brush-and-filter on subgroups):
          route to visualization/interactive_dashboard_design

      The script must:
        - load the distribution / interval source data
        - compute the chosen summary statistics + intervals with
          documented method (analytic vs bootstrap vs Bayesian
          posterior); cite the method
        - render to png + svg
        - emit sidecars including .prov.json with the interval
          method + percentage band convention
        - include the bin counts / N / posterior draws on the
          figure (or in the caption).

  - id: legibility_and_honesty_audit
    name: Audit for legibility + honesty
    description: |
      Checks:
        - are the interval percentages LABELLED on the figure (not
          just the caption)?
        - is the missing-data / out-of-distribution region marked?
        - for calibration: are bin counts visible?
        - for ensemble: is N members stated?
        - for posterior: is HDI shaded vs just lines + numbers?
        - does the figure pair calibration with sharpness when both
          matter?
        - does the colour encoding survive grayscale printing
          (route to visualization/color_accessibility_audit)?
        - is the visual idiom familiar to the target audience
          (clinical readers expect forest plots; ML readers expect
          reliability diagrams; lay readers may need annotated
          fan charts)?

  - id: caption_and_methods
    name: Caption + methods entry
    description: |
      Caption must state:
        - the uncertainty source (CI / posterior / bootstrap /
          ensemble / conformal coverage)
        - the percentage bands shown + their construction method
        - N (sample size, ensemble members, posterior draws)
        - any reference line (calibration diagonal, null effect)
        - the citation for any non-obvious idiom (raincloud,
          halfeye, dot-interval)

      mem_methods_append the uncertainty representation choices so
      the audit trail is intact.

expected_outputs:
  - workspace/.uq_viz/uncertainty_profile.md
  - workspace/<step>/outputs/figures/uncertainty_<topic>.{png,svg}
  - workspace/<step>/outputs/figures/uncertainty_<topic>.{caption.md,summary.md,prov.json}

quality_bar:
  uncertainty_source_and_method_named: true
  visual_idiom_matches_data_type_and_audience: true
  interval_percentages_labelled_on_figure: true
  sample_size_or_ensemble_member_count_visible: true
  calibration_paired_with_sharpness_when_relevant: true
  accessibility_audit_passed_or_routed: true

next_protocol: methodology/uncertainty_quantification
on_failure: visualization/figure_guidelines
