id: project_startup
name: Project Startup
version: '1.9.3'
schema_version: '2.0'
last_reviewed: '2026-06-04'
description: First substantive protocol. Auto-fills intake from researcher dumps, locks in research question, classifies domain, snapshots the base environment.
trigger: Second protocol every new project — and any time inputs/ changes substantially.
prerequisites:
  - session_boot has completed this session (sys_boot was called)
  - inputs/researcher_config.yaml exists (auto-created on `research-os init`)

steps:
  - id: route_first
    name: Route Through tool_route Before Loading the Full Protocol
    description: |
      If you got here via session_boot's tool_route call, you already have
      the right protocol — skip this step.

      Otherwise, before loading this YAML at format='full', call
      tool_route(prompt=<researcher's ask>). For an intake-shaped ask
      ("fill the intake", "I dropped files", "what do I have") tool_route
      will recommend tool_intake_autofill as a SHORTCUT — you can call
      that directly without the full project_startup load.

  - id: scan_inputs
    name: Scan inputs/ at Coarse Granularity
    description: |
      In ONE batch:
        - sys_file_list directory="inputs/raw_data"
        - sys_file_list directory="inputs/literature"
        - sys_file_list directory="inputs/context"
      If all three are empty, ask the researcher to drop their data + papers +
      notes into the relevant folders. Do NOT proceed further until at least
      one input exists.

  - id: check_intake_freshness
    name: Skip / refresh / regenerate based on intake freshness
    description: |
      MANDATORY before autofill_intake. Avoids regenerating an
      already-approved intake mid-pipeline.

        tool_intake_freshness  → returns {recommended_depth, mid_pipeline_entry_recommended}

      recommended_depth values:
        full         — intake.md missing, stub, or contains template
                       markers. Continue to autofill_intake.
        refresh-only — intake.md is substantive but > 90 days old. Read
                       it, surface a 2-sentence summary to the
                       researcher, ask whether anything has changed.
                       Do NOT regenerate.
        skip         — intake.md is substantive and < 90 days old. Skip
                       autofill_intake entirely; jump to
                       profile_each_dataset.

      mid_pipeline_entry_recommended == true means at least one numbered
      step has conclusions.md. Load `guidance/mid_pipeline_entry`
      instead of continuing project_startup — the researcher is
      resuming, not starting.

  - id: autofill_intake
    name: Auto-fill Intake from Researcher Dumps
    description: |
      ONLY when check_intake_freshness returned recommended_depth='full'.
      Skip otherwise.

      Call tool_intake_autofill (no args).
      This:
        - infers domain from columns / file extensions / context keywords
        - extracts research_question from context notes (looks for explicit
          "Research question:" / "Aim:" / "Objective:" or the first
          sentence ending in "?")
        - extracts hypotheses (H1/H2/H3 lines, or "Hypothesis:")
        - rewrites inputs/intake.md with the proposal
        - fills the BLANK fields in researcher_config.yaml
        - registers each inferred hypothesis in state.active_hypotheses
      Then show the researcher the proposed (question, domain, hypotheses) in
      one short message and ask "Approve, or refine?"
      Wait for approval before any code is written.

  - id: profile_each_dataset
    name: Profile Each Data File (sampled)
    description: |
      For every tabular file (csv|tsv|parquet|feather|xlsx|json|jsonl) in
      inputs/raw_data/, call tool_data_profile filepath=<that file>.
      Read the resulting reports — note any high-missingness columns or tiny
      sample sizes. These constraints feed methodology_selection later.
      For non-tabular files (.fasta, .nii, .dcm, …) just note their presence
      and size; defer specialised inspection to the methodology protocol.

  - id: snapshot_global_environment
    name: Initialise Global Environment
    description: |
      sys_env_snapshot — writes the current interpreter's packages to
      environment/requirements.txt. Per-experiment environments inherit from
      this baseline. R / Julia / conda lockfiles are picked up automatically
      if they exist at the project root.

  - id: ground_in_recent_literature
    name: Ground the project in CURRENT literature (mandatory)
    description: |
      Before declaring startup complete, run AT LEAST ONE online
      literature pass. The AI's pre-training cutoff is months old; the
      research-recency story has to start with whatever's actually
      published THIS year, not what the model remembers.

      Required calls (parallel; use whichever providers the
      researcher has API keys for — see researcher_config.api_keys):

        tool_search_semantic_scholar query=<domain + research_question>
                                     year_min=<current_year-3>
        tool_search_pubmed         query=<domain + research_question>
                                     year_min=<current_year-3>
        tool_search_web            query=<central method or dataset name>
                                     recency_days=180
        tool_research_method       method=<the canonical method the
                                           PI likely expects> domain=<domain>

      Specific patterns:
        - PI brief named papers ("Cite Himes 2014", "GTEx airway
          atlas") → tool_literature_search_and_save for each.
        - intake_autofill returned a `named_paper_references` list
          → fetch every entry.
        - Domain is a recently-active area (single-cell, foundation
          models, LLM-as-judge, …) → also do a -1-year
          tool_search_arxiv pass.

      Save successful hits to inputs/literature/. Record the search
      itself in workspace/logs/search_log.md (tool_search_* logs
      automatically). Note the empty searches too — "no hits" is a
      meaningful finding.

      Why this is mandatory: the AI must NOT silently pretend its
      pre-training memory is current literature. A reviewer will ask
      "did you check the 2026 work on X?" and the answer must be
      verifiable in the search log.

      Register the PI brief / context files as the FIRST grounding
      records, so every downstream decision can trace back to the
      source brief:
        tool_ground_from_context
            decision="project_intake"
            context_files=["inputs/context/<brief.md>", ...]
            notes="initial project framing — used to derive the
                   question, hypotheses, and per-step scope"
      Writes to workspace/.grounding/grounding.jsonl. Subsequent
      grounding_register / grounding_verify calls can reference
      decision_id="project_intake" as the upstream anchor.

  - id: present_startup_summary
    name: Summarise to Researcher
    description: |
      Format:
        **Startup summary**
        - Inputs: N data files (top types), M PDFs, K notes
        - Domain: <classified domain> · reporting standard candidate: <name>
        - Question: <confirmed question>
        - Hypotheses: <H1, H2, ...> (each tracked in state)
        - Data quality flags: <missingness / small-n / class imbalance>
        - Recommended next: domain_analysis (light formal classification + bias list)
                            OR jump straight to analysis_plan if exploratory and tiny.

expected_outputs:
  - inputs/intake.md
  - docs/research_overview.md

next_protocol: domain/domain_analysis
on_failure: guidance/dead_end_routing
