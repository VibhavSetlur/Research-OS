id: analysis_plan
name: Analysis Plan (Core Loop)
version: '1.4.0'
schema_version: '2.0'
description: Per-step loop. Scope → plan-breakdown → literature-ground → execute (atomic versioned scripts) → document → snapshot. Iterates once per experiment step.
trigger: After methodology_selection — or whenever the researcher asks for "the next experiment" / "now run X".
prerequisites:
  - workspace/methods.md exists with at least one substantive entry
  - workspace/citations.md exists (literature_search has run, even if minimally)

steps:
  - id: orient_lean
    name: Orient Cheaply Before the Loop
    description: |
      Token-budget note: this protocol is ~2K tokens at format='full'. If
      you only need a refresher mid-session, load it with
      sys_protocol_get format='summary' (~300 tokens) to see step
      headings, then format='step' + step_id='<id>' for the one step
      you're about to execute.

      Also: if you haven't called sys_boot this session, do so once now
      to pick up state + autonomy. Never re-call sys_state_get +
      sys_config_get separately while sys_boot's payload is still fresh.

      v1.4.0: BEFORE starting a non-trivial step, optionally:
        tool_lessons_consult tags=[<step_kind>, <method>, <data_type>]
          → retrieves lessons from prior similar steps (recency +
            tag-overlap scored) as a prompt block to prepend
        tool_plan_step_grounded step_id=<NN_slug>
          → returns a Thought / Required-Grounding / Action /
            Verification scaffold per sub-task (ReAct + CoVe). Use
            when scope_step flagged the step as method-heavy or
            multi-script.

      These are CHEAP and don't gate. Use them when uncertain, skip
      when the step is rote.

  - id: scope_step
    name: Scope the Step (≤2 sentences)
    description: |
      State the goal in 1-2 sentences. Examples:
        - "Baseline EDA: distributions, missingness, basic correlations."
        - "Fit logistic regression with X1..Xk covariates; report AUROC + calibration."
      Identify:
        - Input data (from previous step's data/output/, symlinked).
        - The hypothesis (or hypotheses) this step targets — by ID, e.g. H2.

      AUTONOMY GATE:
        manual / supervised → present the scope; ask for confirmation.
        autopilot           → state the scope and proceed; do NOT ask.

      SIZE GATE: if scope mentions >3 distinct methods OR multiple subgroups
      OR custom pipelines, you MUST call tool_plan_step before coding. The
      plan markdown becomes part of the experiment record.

      STEPS CAN GROW. A single step is allowed to get long (many
      sub-tasks, dozens of figures, a 500-line conclusions.md) when the
      researcher wants that depth on ONE coherent goal. There is no
      artificial cap. What changes the answer is the GOAL, not the line
      count — see the "When to suggest a new step" block in
      create_step_folder below.

      v1.4.0 LANGUAGE/TOOL-STACK SUB-STEP: if the step's method choice
      is non-trivial (e.g. DESeq2 vs pydeseq2, Seurat vs scanpy, R survival
      vs lifelines, WGCNA vs PyWGCNA) — i.e. ANY case where a reasonable
      reviewer might ask "why this language/library?" — invoke
        sys_protocol_get format='full' name='methodology/pick_tool_stack'
      and persist the choice to workspace/<NN_slug>/scratch/stack_plan.md
      BEFORE writing code. Skip ONLY for pure-glue / data-shuffling work
      where the language is field-irrelevant. v1.4.0 audit emits a WARN
      when a step has scripts but no stack_plan.md; v1.5.0 promotes to
      BLOCK.

  - id: ground_methods
    name: Ground Methodology in Literature (HARD GATE) — STEP-SCOPED
    description: |
      You MUST search literature BEFORE choosing any method. Selecting from
      training memory alone is FORBIDDEN — `tool_path_finalize` warns if
      `conclusions.md` cites references but no `tool_search_*` calls
      were logged for the project (workspace/logs/searches.log). The
      pre-submission audit BLOCKS synthesis on this warning.

      The rule isn't "feel free to skip when you remember a relevant
      paper". The rule is: every method decision is grounded in a
      RECENT, VERIFIABLE online lookup that the audit gate can replay.
      The reviewer will ask "where did this prior come from?" and the
      answer must be a DOI in `inputs/literature/` or
      `workspace/<step>/literature/`, not the AI's training cutoff.

      MANDATORY per step (do ALL of these — they are cheap):

        (1) **Surface candidate methods online.** For the analytical
            question this step targets, run:
              tool_research_method query="<question> + <data shape>"
                — writes a structured report into outputs/reports/
                  comparing 2-3 candidate methods.
            OR (if you already know the candidates):
              parallel:
                tool_search_semantic_scholar query="<method> <domain>"
                tool_search_pubmed         query="<method> <domain>"
                tool_search_web            query="best <method> 2024 2025"

        (2) **Ground each decision in a SPECIFIC paper.** For each
            non-trivial methods choice (which normalization, which
            FDR cutoff, which model family, which sensitivity test),
            cite the actual paper that justifies the choice. The
            citation MUST be saved into the step's literature folder:
              tool_literature_search_and_save
                query="<canonical paper for the method>"
                source="semantic_scholar"
                step_id="<this step's NN_slug>"
                limit=5  download_top=2
            Each PDF gets a .meta.yaml sidecar (title/authors/year/doi).
            `tool_path_finalize` auto-folds the per-step
            `conclusions.md` `## References to ground` section into
            project-wide `workspace/citations.md` AND
            per-step `literature/key_papers.md`.

        (3) **Compare findings to current literature.** If your DEG
            count / pathway enrichment / effect size differs from
            recent published work, NOTE the divergence + the
            specific paper you're comparing against. Reviewers will
            ask whether your numbers replicate; you should have
            already checked.

        (4) **Record the decision-with-citation chain.**
              mem_methods_append (method, dataset, dataset_hash,
                implementation, parameters, justification WITH
                citation_key, assumptions list).
              mem_decision_log (context / selected / rationale /
                options considered / linked citation_keys).
              mem_hypothesis_update for each hypothesis touched,
                status='testing'.

      Anti-pattern (caught at audit):
        "We use DESeq2 because it's standard." → not grounded.
        Correct:
        "We use DESeq2 (Love, Huber, Anders 2014, Genome Biology
        15:550, doi:10.1186/s13059-014-0550-8 — saved at
        `literature/love2014_deseq2.pdf`) because the n=8 design
        benefits from its empirical-Bayes dispersion shrinkage
        (Section 2.3 of that paper)."

  - id: pick_tools
    name: Pick Tools / Libraries (validated, not guessed)
    description: |
      If you're uncertain which library to use:
        tool_research_tool task="<concrete task>" language="<python|r|julia|any>"
      For external/paid/GUI tools that you cannot run:
        tool_external_tool_instructions tool_name=<X> purpose=<Y> url=<Z>
      Then commit the tool decision via mem_decision_log.

      Reproducibility check: every tool used must be installable
      (tool_package_install if Python) and snapshotted later.

  - id: create_step_folder
    name: Create the Numbered Experiment Folder
    description: |
      sys_path_create name="<slug>" hypothesis="<H<id>: <text>>"

      NAMING — the AI picks the slug based on what THIS step actually does.
      There are NO canonical names. Derive the slug from the step's goal,
      the chosen method, and the domain context. Rules:

        - lowercase, words joined by underscores (no spaces / dashes / dots)
        - ≤ 40 chars, descriptive but compact
        - mention the METHOD when one was selected
          (e.g. `cox_ph_treatment_effect`, not `survival_analysis`)
        - mention the SUB-POPULATION if the step is restricted
          (e.g. `logistic_under_65` vs `logistic_all`)
        - re-use the same slug + version-bump scripts (_v1, _v2) when
          iterating on the SAME goal; create a NEW step (different slug)
          only when the goal changes

      Examples ACROSS domains (illustrative — do not copy verbatim):
        EDA              :  baseline_eda  /  distribution_scan  /  missingness_map
        Cleaning         :  imputation_mice  /  outlier_winsorise  /  schema_harmonise
        Feature work     :  pca_demographics  /  one_hot_encode_diagnoses
        Stats modelling  :  logistic_baseline  /  cox_ph  /  mixed_effects_school
        Causal           :  ipw_treatment  /  did_policy_change  /  rdd_age_threshold
        ML               :  rf_baseline  /  xgb_tuned  /  cnn_transfer
        NLP              :  bert_finetune_sentiment  /  ner_clinical_notes
        Genomics         :  deseq2_de  /  gsea_pathway  /  variant_call_strelka
        Audit            :  power_recheck  /  calibration_curve  /  sensitivity_unmeasured

      Creates workspace/NN_<slug>/{scripts,literature,data/{input,output},outputs/{reports,figures,tables},environment}
      and sets it as current_path. NN is auto-assigned (next free number).

      WHEN TO SUGGEST A NEW STEP (proactive — surface to researcher,
      don't just decide on your own unless autopilot):
        - conclusions.md > Findings now covers ≥2 distinct hypothesis
          IDs that aren't tightly coupled (mem_hypothesis_list shows
          H1 + H3 in this step's evidence)
        - the scope has drifted past its original ≤2 sentence charter
          ("we also tried…", "while we were at it…")
        - methodology changed: switching estimator family (linear →
          tree-based) or unit of analysis (subject → cluster) — that
          usually deserves its own slug
        - sub-population restriction was added mid-stream (was "all
          patients", now mostly "patients < 65"): create a sibling step
          for the restricted analysis so the original stays clean
        - the conclusion would be hard to caption with ONE focal figure

      How to suggest: in supervised/manual mode, say once: "this step
      is starting to cover two questions — want me to spin off a new
      step for <X> so both stay easy to read?" In autopilot, call
      `tool_branch_recommendation reason="<why>"` and act on its
      output. NEVER force a new step on the researcher — long, focused
      steps are fine and often preferable to step-fragmentation.

      For script filenames inside the step, the convention is
      `<NN>_<slug>_v<n>.<ext>` for the main script, and
      `<NN>_<slug>_<subtask>_v<n>.<ext>` for atomic sub-tasks. Sub-task
      names follow the SAME naming rules (descriptive, lowercase,
      underscore-joined).

  - id: write_atomic_scripts
    name: Write Atomic Versioned Scripts AS A SUB-TASK DAG
    description: |
      DO NOT one-shot a 400-line mega-script. The canonical structure
      for a serious analysis step is a SUB-TASK PIPELINE:

         ingest → validate → clean → featurize → split → fit
                                                  ↘ diagnose → visualize → report

      Declare it once via tool_step_pipeline_define which seeds
      workspace/<step>/pipeline.yaml with the 7-node template; edit
      the script + inputs + outputs per node; run with
      tool_step_pipeline_run. The runner topologically orders nodes,
      content-hash-caches inputs+params+script (so editing the
      clean script only re-runs clean → fit → diagnose → report),
      writes a .pipeline_run/run_<ts>.json audit trail, and drops a
      .prov.json sidecar for every output a node produces.

      One script per sub-task. Two equivalent naming styles —
      pick the one that fits the step's shape:

      A) **Letter-suffix chronological order** (preferred when the
         sub-tasks ARE meant to run end-to-end in a fixed sequence
         and a fresh reader should run `ls scripts/` and immediately
         see the order):

           workspace/<step>/scripts/
              <NN>a_<short_name>_v<k>.<ext>   # runs first
              <NN>b_<short_name>_v<k>.<ext>   # runs second
              <NN>c_<short_name>_v<k>.<ext>   # ...
              <NN>d_<short_name>_v<k>.<ext>

         e.g.
           01a_load_counts_v1.py
           01b_library_size_qc_v1.py
           01c_sample_correlation_v1.py
           01d_pca_v1.py

         The letter encodes execution order; `ls` shows it naturally.
         The pipeline.yaml DAG can omit explicit dependencies because
         the alphabetical order IS the dependency order.

      B) **Descriptive-only** (when sub-tasks form a true DAG with
         non-linear dependencies — `pipeline.yaml` declares the edges,
         not the filename):

           workspace/<step>/scripts/
              <NN>_fit_baseline_v<k>.<ext>
              <NN>_calibration_v<k>.<ext>
              <NN>_feature_eng_v<k>.<ext>

      Use style A by default — chronological order is the common case
      and the encoded order survives someone re-running the step
      manually. Use style B only when sub-tasks branch.

      In BOTH styles: `_v<k>` is the iteration suffix; bump it via
      `tool_step_iterate` when materially changing a sub-task.

      Server-enforced gates (no fast path through them):
        - tool_audit_step_completeness BLOCKS multi-script steps (>2)
          without a pipeline.yaml, missing focal figures, missing
          caption / summary sidecars, missing provenance coverage <50%.
        - tool_audit_code_quality BLOCKS scripts with bare `except`,
          `import *`, `eval`/`exec`, hardcoded absolute paths, or
          functions >150 lines / complexity >20.
        - tool_audit_quality_full runs every gate together before
          synthesis. tool_plan_advance refuses to walk past a
          deliverable tool until the gate is green.

      Allowed script types (pick the right tool for the language):
        Python (.py)        → tool_python_exec
        R (.R)              → tool_r_exec
        Julia (.jl)         → tool_julia_exec
        Bash (.sh)          → tool_bash_exec
        Jupyter (.ipynb)    → tool_notebook_exec
        R-markdown (.Rmd)   → tool_rmarkdown_render
        Quarto (.qmd)       → tool_rmarkdown_render

      LONG-RUNNING (estimated > runtime.long_running_threshold_seconds, or
      on shared_server=true): use tool_task_run instead of blocking exec, then
      poll tool_task_status. Tell the researcher "task <id> backgrounded;
      checking every <interval>".

      Every script MUST produce all three OUTPUT CATEGORIES — reports,
      tables, figures — unless the step is genuinely non-numeric
      (qualitative coding, pure data plumbing, etc.). Default to all
      three; explain the omission in conclusions.md if you skip one.

        - Read from workspace/<step>/data/input/ (auto-symlinked).
        - Write derived data to workspace/<step>/data/output/.

        - REPORTS (outputs/reports/, .md): at least one markdown
          summary with numbers + interpretation. This is the readable
          narrative of what the script did and what it found.

        - TABLES (outputs/tables/, .csv preferred, .tsv / .parquet
          allowed): at least one CSV when the step has numeric
          findings. One table per analytic question; bare numbers go
          in tables so the report can stay narrative. Filename
          convention: <step_number>_<descriptor>.csv. For a fitted
          model: include a coefficients table (param, estimate,
          ci_lo, ci_hi, p_value) at minimum. For a comparison: a
          methods × metrics row/column matrix. Skip ONLY when the
          step has no numeric outputs at all (rare).

        - FIGURES (outputs/figures/, PNG ≥ 300 DPI): at least one
          FOCAL figure named <step_number>_<short_descriptor>.png
          (e.g. 03_attitude_by_demographic.png). PREFER
          an AI-authored script (visualization/figure_guidelines covers
          Okabe-Ito / DPI / dual PNG+SVG export / both caption
          sidecars in one call. The focal figure is the one
          promoted into the dashboard + paper.

          BEYOND THE FOCAL FIGURE: for any step producing a
          statistical or ML model, also emit the diagnostic +
          comparison family (high-quality is the default; basic only
          when the researcher explicitly asks for "just the headline
          figure"):
            * diagnostic suite (residuals, QQ, calibration, etc.)
            * summary (effect + 95% CI)
            * comparison (vs baseline or alternative spec)
          For domain-specific steps, generate the figure types that
          domain expects (survival curve + Schoenfeld for Cox; trace
          + posterior predictive for Bayesian; ROC + PR + calibration
          for ML classifiers; forest + funnel for meta-analysis). Use
          the visualization protocol that matches the work
          (visualization/uncertainty_visualization,
          visualization/distribution_comparison,
          visualization/network_visualization, etc.) when the focal
          chart is non-trivial.

          Pair every figure with a sibling <name>.caption.md
          (technical; one-sentence finding) AND <name>.summary.md
          (plain-English; 2-3 short paragraphs for non-expert
          audiences). An AI-authored script writes both when you pass
          `caption` + `plain_english`. Otherwise
          tool_figure_caption_synthesise auto-drafts the summary from
          the caption + the step's Findings.

        - Set RNG seeds explicitly; print library versions to stderr.

      Empty outputs/figures/ is a HARD FAIL — tool_audit_step_completeness
      BLOCKS the final synthesis until cleared. A step with numeric
      findings but empty outputs/tables/ surfaces as a WARNING from
      the same audit (a missing table is a research-record gap, not a
      block-the-paper gap).

      Outputs spanning multiple categories (figures + tables + reports)
      WITHOUT a pipeline.yaml is ALSO a HARD FAIL — the mega-script
      anti-pattern. Separate scripts per sub-task (one for the fit,
      one per figure, one per table, one for the report) and declare
      them via tool_step_pipeline_define.

      Versioning has TWO distinct modes:

        - BUG FIX → bump `_v<n>` on the affected script, re-run; the
          content-hash cache invalidates downstream nodes automatically.
        - DELIBERATE ITERATION (recolour Fig 2, tighten a cutoff, swap
          a model spec) → call tool_step_iterate with a rationale FIRST.
          It snapshots the current scripts + outputs + captions +
          conclusion into .versions/v<n>/ as a coordinated unit so the
          prior version is preserved before you edit anything. Then
          rename the live scripts using the suggested _v<n+1> suffix
          and re-run. Use tool_audit_version_coherence to confirm
          every output traces to the highest-version script on disk.

      Bump _v<n> on every meaningful re-run; do NOT silently overwrite.

  - id: document_conclusions
    name: Document Conclusions for This Step
    description: |
      Two files matter, with deliberately different audiences:

      **conclusions.md** — the THOROUGH record (statistical + reproducible):
        ## Plain-language summary
          - 2-3 sentences a non-statistician could follow. Surfaces in
            the dashboard's executive and teaching audience views.
        ## Findings
          - 2-5 quantitative bullets (numbers + units; effect sizes
            preferred over p-values; 95% CI where applicable).
        ## Hypothesis evidence
          - For each hypothesis touched: mem_hypothesis_update H<id>
            status=<supported|refuted|inconclusive> evidence=<one-line>.
        ## Methods (full detail)
          - Dataset shape, transforms, model spec, params, RNG seed, versions.
        ## Methodological notes
          - Assumption checks, sensitivity, robustness. Supportive tone.
        ## Limitations
          - What this step CANNOT conclude, and why. Honest framing
            ("no detectable difference" beats "no effect" when underpowered).
        ## Decision
          - proceed | branch (new experiment, why) | dead-end (call dead_end_routing).
        ## Next steps
          - 2-3 concrete candidate experiments with brief rationale.

      **README.md** — the 60-SECOND overview (non-experts):
        The finalize step (below) rewrites this from conclusions.md +
        decisions + outputs. DO NOT manually rewrite it. If you want
        the dashboard to surface a particular plain-English summary,
        write it in context/notes.md under "## Plain-language summary"
        — finalize promotes it into the README and the appendix.

      Also: mem_analysis_log entry="<step_id> done: <one-line summary>".

  - id: ground_findings_in_literature
    name: Ground Findings in Literature (v1.4.0 — per-step loop)
    description: |
      AFTER conclusions.md is written but BEFORE finalize_step, run the
      per-step literature loop. The methods choice was grounded above
      (`ground_methods`); now the FINDINGS themselves must be compared
      to what the literature says.

      Load and follow:
        sys_protocol_get format='full' name='literature/literature_per_step'

      The protocol:
        1. Extracts top-5 claims from conclusions.md `## Findings`
        2. Searches Semantic Scholar / PubMed / Crossref per claim
        3. Downloads top-3 PDFs per claim into
           workspace/<step>/literature/ (auto-skipped if paywalled)
        4. Writes workspace/<step>/literature/findings_vs_literature.md
           with one block per claim:
             ## Claim: <one-line>
             **Our finding:** ...
             **Literature says:** ...
             **Verdict:** AGREES | DISAGREES | EXTENDS | DEFERRED
             **Evidence:** [@key] (year) — sentence
             **Discussion implication:** ...
        5. Calls tool_grounding_register per non-deferred claim
        6. Calls tool_claim_verify on the top-3 highest-stakes claims
        7. Updates step_summary.yaml with a `literature:` block

      Then GATE:
        tool_audit_step_literature step_id="<NN_slug>"

      Blocks if findings_vs_literature.md missing, claims lack verdicts,
      DISAGREES verdicts have no discussion, or all-deferred without
      documented reason.

      Skip ONLY when the step is pure data engineering (QC,
      normalization, format conversion) — in that case add to
      step_summary.yaml:
        literature_required: false

      The synthesis-level audit (`tool_audit_synthesis`) blocks final
      assembly when any step has literature_deferred non-empty or
      literature.claims_grounded == 0 without `literature_required: false`.

  - id: snapshot_step_environment
    name: Snapshot the Environment (every step that actually ran code)
    description: |
      Default (v1.3.0): call sys_env_snapshot EVERY step that ran code.
      It's cheap, idempotent, and the cost of skipping is a published
      result you can't rerun.

        sys_env_snapshot                              # legacy default
        sys_env_snapshot step_id="<NN_slug>"          # explicit per-step
        sys_env_snapshot scope="project"              # project-global

      Variants:
        - The step uses identical packages to every prior step →
          `sys_env_snapshot scope="project"` once is enough; per-step
          snapshots add noise without information.
        - The step needs a different version of even one package →
          `sys_env_snapshot step_id="<NN_slug>"` so the per-step
          requirements.txt captures the variance.
        - Pure-data step (no scripts ran) → skip. finalize_step will
          surface a warning, which is fine.

      Reproducibility is the deal you make with future-you. If the
      audit warns "no environment snapshotted", treat it as a real
      gap to close, not noise.

  - id: finalize_step
    name: Finalize the Step (mandatory before decide_next)
    description: |
      tool_path_finalize — runs the v1.3.0 finalize sequence:

      Per-step file refresh (rewrites the step's stub README + every
      subfolder README from what actually got produced):
        - environment/README.md ← "used global env" OR bespoke listing.
        - literature/README.md ← "used global corpus + decisions"
          OR step-specific sources + the decisions they informed.
        - context/README.md ← "no prose needed" OR narrative inventory
          + plain-language summary from notes.md.
        - data/output/README.md ← every persisted artefact + which
          downstream step consumes it (from the workflow DAG).
        - outputs/README.md ← inventory of figures / tables / reports.
        - README.md ← stub Methods / Outputs / Decision sections
          populated from conclusions.md + per-step decision log.

      Project-scope log refresh (the v1.3.0 piece — used to be
      manual):
        - workspace/analysis.md ← step-finalized heading + headline
          + output counts + decision count (idempotent on the marker).
        - workspace/methods.md ← if conclusions.md has a `## Methods
          (full detail)` or `## Methods` section, mirror it under a
          step-tagged subsection (idempotent on the marker).
        - workspace/citations.md ← regenerated from project +
          per-step literature/.meta.yaml sidecars.

      Plain-English summaries: for every figure without
      `<name>.summary.md`, the caption synthesiser drafts one from the
      caption + Findings.

      Warnings returned (act on these before decide_next):
        - conclusions.md > Findings / Decision still a stub
        - Plain-language summary still a stub
        - No environment snapshot for a step that produced outputs

      Captions: each figure MUST have a sibling `<name>.caption.md`
      describing what the reader is looking at (one technical
      sentence). Add one whenever you save a figure;
      `an AI-authored script (write both sidecars inline)` writes both
      sidecars in one call.

      Idempotent — safe to re-run after edits.

  - id: lightweight_step_audit
    name: Lightweight In-Step Audit
    description: |
      Whichever apply:
        - tool_audit_figure on the primary figure (DPI / size).
        - tool_audit_power if a statistical test with known n was run.
        - tool_audit_assumptions if residuals were saved.
        - tool_audit_step_literature step_id=<NN_slug> — v1.4.0 gate
          for the per-step literature loop (blocks finalize if
          findings_vs_literature.md missing or verdicts incomplete).
        - tool_grounding_verify step_id=<NN_slug> — v1.4.0: confirms
          every decision logged in workspace/analysis.md has a
          grounding record in .grounding/grounding.jsonl or an
          inline citation. Writes workspace/logs/grounding_audit.md.
      Append warnings to conclusions.md > Limitations.

      AFTER the audit passes, log a Reflexion record so future steps
      can learn:
        tool_lessons_record step_id=<NN_slug>
            outcome=<one-line>
            reflection=<what you'd do differently>
            what_worked=[...]
            what_didnt=[...]
            recommendation=<for similar future steps>
            tags=[<step_kind>, <method>, <data_type>]
            scope=<step|project|methodology>

  - id: present_to_researcher
    name: Present to Researcher (anti-one-shot MANDATORY pause)
    description: |
      v1.3.3 MANDATORY GATE — must run after `finalize_step`. The AI
      MUST stop here and present the step's status to the researcher,
      then WAIT for their choice before any further tool call.

      Why: AI agents tend to "complete" long plans as fast as possible.
      Context fills, the AI stops introspecting, and the researcher
      loses oversight. The output is poor because no one paused to
      ask "is this actually good?" between steps. Forcing a mandatory
      pause at this checkpoint — with concrete revision options the
      AI generates from the step's actual artefacts — gives the
      researcher a moment to redirect.

      Mechanics:

        1. Call `tool_step_revision_options step_id="<NN_slug>"`.
           This returns:
             - would_benefit_from_revision (bool)
             - risk_signals (e.g. citations claimed but no
               tool_search_* calls logged)
             - suggested_revisions (specific fixes; e.g. "Findings
               section is only 120 chars — should be ≥300 with
               specific numbers")
             - alternative_paths (stratified / sensitivity / method-
               comparison branches the researcher could fork)
             - handoff_recommended (true when ≥5 steps finalized
               this conversation — context is getting long)

        2. Present those VERBATIM to the researcher. Format:

             **Step `<NN_slug>` complete.**
             - Headline: <conclusions.md headline>
             - Outputs: <N figures, M tables, K reports>
             - Audit warnings: <count> (see workspace/logs/audit_report.md)

             *Suggested revisions (would_benefit_from_revision={bool}):*
             - <each suggested_revision>

             *Alternative paths to consider:*
             - <each alternative_path>

             *What would you like to do?*
               (a) Proceed to the next analysis step
               (b) Revise this step — I'll walk you through the
                   suggested fixes
               (c) Branch into an alternative (stratified /
                   sensitivity / method-comparison)
               (d) Pause + handoff for a fresh chat (recommended
                   when handoff_recommended=true)

        3. WAIT for the researcher's choice. DO NOT auto-scaffold
           the next step in the same turn — even when autopilot is
           on, the pause-and-present is mandatory; only the
           auto-proceed afterwards is autopilot-dependent.

      AUTONOMY GATE:
        manual / supervised → wait for the researcher's reply (a/b/c/d).
        autopilot           → present the summary + options; if
                              would_benefit_from_revision is False
                              AND audit warnings == 0, proceed to
                              decide_next in the SAME turn. Otherwise
                              still wait for the researcher.

      ONE-SHOT GUARD: if the AI calls `sys_path_create` immediately
      after `tool_path_finalize` without calling
      `tool_step_revision_options` first, the next routing log will
      flag this as a protocol violation. Don't do it.

  - id: decide_next
    name: Decide Next Step (don't loop forever)
    description: |
      ONLY reachable AFTER `present_to_researcher` has surfaced the
      pause-and-revise options + the researcher has chosen.

      One of (per researcher choice):
        - Proceed → return to scope_step for the next experiment.
        - Revise → load `guidance/scope_clarification` for a focused
                   revision pass on the same step (re-iterate the
                   sub-task that needs fixing; bump the script's
                   `_v<n>` via `tool_step_iterate`).
        - Branch → create a parallel experiment via `sys_path_create`
                   with `branch_of=<this step>` and a different
                   methodology (kept active alongside this one).
        - Handoff → load `guidance/chat_handoff` + run
                    `sys_session_handoff` so the next chat resumes
                    cleanly with all the step's state intact.
        - Abandon → `sys_path_abandon` + load
                    `guidance/dead_end_routing`.
        - Advance to reproducibility — only when ALL planned
          experiments have non-empty `conclusions.md` (decisions are
          'proceed' or 'branch', NONE 'dead-end') AND at least one
          terminal experiment has a publishable finding.

      AUTONOMY GATE:
        manual / supervised → wait for the explicit answer from
                              `present_to_researcher`.
        autopilot           → already-confirmed in
                              `present_to_researcher`; proceed to the
                              chosen action.

      v1.4.0 — log the decision as a ReAct trace entry so future audit
      can reconstruct WHY each step branched / proceeded / died:

        tool_thought_log
            step_id=<NN_slug>
            entry_type=decision
            content=<one-line decision + rationale>
            decision_id=<NN_slug>_<proceed|revise|branch|handoff|abandon>

      Cheap (single-line write to .thoughts/thoughts.jsonl); makes
      `tool_thought_trace` actually useful during synthesis.

expected_outputs:
  - workspace/*/README.md
  - workspace/*/conclusions.md
  - workspace/*/scripts
  - workspace/*/environment
  - workspace/logs

next_protocol: reproducibility/reproducibility
on_failure: guidance/dead_end_routing
