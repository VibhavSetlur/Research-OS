id: exploration_promote
tier: 'execute'
name: Promote a Probe to a Real Step
version: '3.5.0'
schema_version: '2.0'
scope_tags:
  domain: [any]
  audience: [researcher, naive_ai]
  workflow_shape: [exploration, promotion]
last_reviewed: '2026-06-16'
see_also:
  - exploration/exploration_loop               # the loop a promotable probe comes from
  - guidance/analysis_plan                      # the rigorous loop the promoted step enters
  - methodology/methodology_selection           # grounds the method the promoted step formalises
description: |
  The bridge out of exploration mode: take a scratch probe that earned it
  and graduate it into a proper numbered analysis step where gates,
  provenance, literature grounding, and synthesis apply. Nothing the probe
  produced is thrown away — it is back-filled into the rigorous record.

  This is a SCAFFOLD, not a script. The judgement it scaffolds is "is this
  probe actually worth the weight of a real experiment, and what would
  make it rigorous?" — which depends on what the probe found and what a
  reviewer of THIS work would demand. Promotion is the moment the cheap
  "no it can come back negative" looking turns into a claim the project
  will stand behind, so it deliberately re-introduces the rigor that
  exploration mode deferred.

  Distinct from:
    - `exploration/exploration_loop` — the cheap loop; this is the
      one-way door out of it for a probe that earned promotion.
    - `guidance/casual_exploration` → optional_promotion — the analogous
      promotion for the conversational casual surface; this one is the
      exploration-mode workspace's native graduation path.
trigger: |
  The exploration loop decided PROMOTE, or the researcher says "promote
  this", "make this a real step", "let's keep this and do it properly",
  "turn this probe into an experiment".
prerequisites:
  - A scratch probe exists with a recorded observation (workspace/scratch/probe_log.md), OR the researcher has pointed at a specific scratch artefact to promote
  - workspace.mode is exploration (sys_boot reports workspace_mode)

steps:
  - id: confirm_worth_promoting
    name: Confirm the probe is worth the weight
    description: |
      Promotion is not free — it commits the project to grounding,
      provenance, and gates for this line of work. Before promoting,
      reason honestly about whether the probe earned it:
        - Is the observation real and reproducible, or a one-off artefact
          of the sample / a lucky cut?
        - Is the question worth a publication-grade answer, or was it
          satisfied by the cheap look?
        - Could a sharper probe (one more exploration_loop iteration)
          still kill it cheaply, saving the promotion cost?

      If the honest answer is "not yet", return to exploration_loop. Only
      promote what will survive the rigor you're about to apply.

      AUTONOMY GATE:
        Risk: reversible + cheap — promote-or-iterate keeps work in scratch
        until it's earned a real step; nothing here is hard to undo.
        adaptive (default) → if the observation is reproducible and
          material, promote; otherwise iterate once more in scratch.
        manual / supervised → state your recommendation (promote / one
          more probe) and wait for the researcher.
        autopilot → if the observation is reproducible and material,
          promote; otherwise iterate once more in scratch.

  - id: state_the_hypothesis
    name: Turn the probe's question into a hypothesis
    description: |
      The probe asked a cheap, falsifiable question; the step needs a
      hypothesis. Promote the question into a hypothesis statement the
      real loop can test, and register it:
        mem_hypothesis_add statement="<H: the claim the probe hinted at>"

      Keep the framing honest to what the probe actually observed — don't
      inflate "there's a weak positive correlation" into "X causes Y".
      The promoted step's job is to test the hypothesis properly, which
      includes the possibility of refuting it.

  - id: create_real_step
    name: Create the numbered step + carry the probe artefacts in
    description: |
      Create the proper step folder:
        sys_path name="<slug>" hypothesis="<H<id>: <text>>"

      Then carry the probe's work into the step rather than re-deriving it:
        - Move the relevant scratch script(s) into
          workspace/<NN_slug>/scripts/ (rename to the
          <NN>_<slug>_v1 convention) — the probe code is the first draft.
        - Move any kept figure into workspace/<NN_slug>/outputs/figures/.
        - Copy the probe_log.md entry that motivated this into the step's
          context/notes.md as "Origin: promoted from exploration probe".

      The scratch original can stay (it's gitignored); the point is the
      step now OWNS the work so the gates apply to it.

  - id: backfill_rigor
    name: Back-fill the rigor exploration deferred
    description: |
      Exploration mode deferred grounding + provenance; promotion pays it
      back. The promoted step must now meet the same bar as any
      analysis_plan step:
        - mem_log the method choice WITH a citation — the probe
          guessed a method cheaply; now ground it (the literature loop in
          analysis_plan / methodology_selection applies).
        - Re-run the analysis as a real, seeded, versioned script (not the
          throw-away probe) so the numbers are reproducible and
          provenance-tracked.
        - Plan the focal figure + table + report the step owes (per
          analysis_plan), not just the eyeball chart from the probe.

      Do NOT carry a probe's casual number into the step as a finding
      without re-computing it under the step's discipline. The probe
      bought the decision to invest; the step earns the claim.

  - id: handoff_to_analysis_plan
    name: Hand off to the rigorous loop
    description: |
      The step now exists with its hypothesis registered and the probe's
      work carried in. Log the promotion so the trail is intact:
        sys_protocol_log status="completed"   # for this promotion
        mem_log entry="promoted probe '<question>' → step <NN_slug>"

      Then enter guidance/analysis_plan on the new step to run it
      properly — scope, ground methods in literature, write atomic
      versioned scripts, document conclusions, finalize. From here the
      work is ordinary rigorous research; exploration mode did its job by
      finding it cheaply.

      AUTONOMY GATE:
        Risk: reversible + cheap — entering analysis_plan on the new step
        runs no expensive or irreversible action by itself.
        adaptive (default) → proceed into analysis_plan on the new step.
        manual / supervised → present the new step + the planned
          analysis_plan entry; wait before running the loop.
        autopilot → proceed into analysis_plan on the new step.

expected_outputs:
  - workspace/<NN_slug>/  (the promoted numbered step)
  - workspace/<NN_slug>/scripts/  (the probe code, versioned)
  - workspace/<NN_slug>/context/notes.md  (origin note)

quality_bar: |
  - Only probes with a reproducible, material observation are promoted.
  - The hypothesis is honest to what the probe observed (no inflation).
  - The probe's casual numbers are RE-COMPUTED under the step's
    discipline before being treated as findings.
  - The promotion is logged so the cheap-probe → real-step trail is
    auditable.

next_protocol: guidance/analysis_plan
next_protocol_kind: forward_default
on_failure: exploration/exploration_loop
